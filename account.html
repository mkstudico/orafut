<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ORAFUT · My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #293136; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Poppins', sans-serif; }
    
    /* Sharp corners - no border radius on phone frame */
    .mobile-container { width: 100%; max-width: 480px; background-color: #ffffff; height: 100vh; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
    
    :root { --vibrant-green: #9CE800; --header-bg: #252A2D; --section-bg: #353B40; --left-tab-bg: #2D3337; --white: #FFFFFF; --black: #1A1A1A; --bottom-nav-height: 70px; }
    
    .main-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--header-bg); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .menu-btn { background: transparent; border: 2px solid var(--vibrant-green); color: var(--vibrant-green); font-size: 18px; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
    .brand { font-size: 24px; font-weight: 800; font-style: italic; text-transform: uppercase; }
    .brand .ora { color: var(--white); } .brand .fut { color: var(--vibrant-green); }
    
    .content-area { flex: 1; overflow-y: auto; padding: 16px; background: #f8fafc; min-height: 0; scrollbar-width: thin; }
    .content-area::-webkit-scrollbar { width: 3px; }
    
    /* Auth Forms - using button styles from reference */
    .auth-container { display: flex; flex-direction: column; gap: 20px; }
    .auth-tabs { display: flex; gap: 12px; background: white; padding: 6px; border-radius: 8px; margin-bottom: 8px; border: 2px solid #D0D0D0; }
    .auth-tab { flex: 1; text-align: center; padding: 12px; font-weight: 700; font-size: 14px; border-radius: 8px; cursor: pointer; background: #F0F0F0; color: #555; transition: all 0.2s; box-shadow: 0 3px 0 #B0B0B0; }
    .auth-tab.active { background: var(--vibrant-green); color: #000; box-shadow: 0 3px 0 #6B9E00; }
    .auth-card { background: white; padding: 24px 20px; border: 2px solid #E0E0E0; border-radius: 8px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 6px; text-transform: uppercase; }
    .input-group input { width: 100%; padding: 12px 14px; border: 2px solid #D0D0D0; border-radius: 8px; font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; background: white; }
    .input-group input:focus { border-color: var(--vibrant-green); }
    .auth-btn { width: 100%; background: #F0F0F0; border: 2px solid #D0D0D0; color: #555; padding: 12px; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; margin-top: 8px; text-transform: uppercase; box-shadow: 0 3px 0 #B0B0B0; transition: 0.1s; }
    .auth-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #B0B0B0; }
    .auth-switch-text { text-align: center; margin-top: 16px; font-size: 12px; color: #64748b; }
    .auth-switch-text span { color: var(--vibrant-green); font-weight: 700; cursor: pointer; }
    
    /* Dashboard Styles */
    .dashboard-header { display: flex; align-items: center; gap: 16px; background: white; padding: 16px; border: 2px solid #E0E0E0; border-radius: 8px; margin-bottom: 16px; }
    .avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #9CE800, #6B9E00); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .avatar .iconify { font-size: 32px; color: white; }
    .user-info h2 { font-size: 18px; font-weight: 800; color: #1e293b; text-transform: uppercase; }
    .user-info p { font-size: 11px; color: #64748b; margin-top: 4px; }
    .edit-name-btn { background: #F0F0F0; border: 2px solid #D0D0D0; padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 600; margin-left: 8px; cursor: pointer; box-shadow: 0 2px 0 #B0B0B0; }
    .edit-name-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #B0B0B0; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: white; padding: 14px; text-align: center; border: 2px solid #E0E0E0; border-radius: 8px; }
    .stat-value { font-size: 24px; font-weight: 800; color: var(--vibrant-green); }
    .stat-label { font-size: 9px; color: #64748b; margin-top: 4px; text-transform: uppercase; font-weight: 600; }
    
    .section-card { background: white; border: 2px solid #E0E0E0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .section-title { font-size: 14px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; text-transform: uppercase; }
    
    .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eef2f6; }
    .rank-name { font-weight: 600; font-size: 13px; }
    .rank-value { font-weight: 800; color: var(--vibrant-green); font-size: 14px; }
    
    .match-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef2f6; cursor: pointer; }
    .match-row:active { background: #f8fafc; }
    .match-team { font-weight: 600; font-size: 13px; text-transform: uppercase; }
    .match-result { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
    .result-win { background: #9CE80020; color: #5a8a00; border: 1px solid #9CE800; }
    .result-loss { background: #F4433620; color: #c62828; border: 1px solid #F44336; }
    .result-draw { background: #FF980020; color: #e65100; border: 1px solid #FF9800; }
    .result-upcoming { background: #f1f5f9; color: #64748b; border: 1px solid #D0D0D0; }
    
    .logout-btn { background: #F0F0F0; border: 2px solid #D0D0D0; color: #555; padding: 12px; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 0 3px 0 #B0B0B0; transition: 0.1s; margin-top: 8px; }
    .logout-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #B0B0B0; }
    
    .empty-state { text-align: center; padding: 30px; color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .toast-notify { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: white; padding: 12px 20px; border-radius: 8px; border-left: 4px solid var(--vibrant-green); z-index: 200; display: none; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; max-width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .loading-spinner { text-align: center; padding: 40px; color: var(--vibrant-green); }
    
    /* Bottom Navigation */
    .bottom-nav-float { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--header-bg); display: flex; align-items: center; justify-content: space-around; padding: 10px 8px; border-top: 3px solid var(--vibrant-green); z-index: 100; height: var(--bottom-nav-height); }
    .nav-item-float { display: flex; flex-direction: column; align-items: center; gap: 2px; background: transparent; border: none; color: #999; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
    .nav-item-float .iconify { font-size: 22px; }
    .nav-item-float span { font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .nav-item-float.active { background: var(--vibrant-green); color: #000; }
  </style>
</head>
<body>
<div class="mobile-container">
  <div class="toast-notify" id="notificationToast"><span class="iconify" data-icon="mdi:information-outline"></span><span id="toastMessage"></span></div>
  
  <header class="main-header">
    <div class="header-left">
      <div class="brand"><span class="ora">ORA</span><span class="fut">FUT</span></div>
    </div>
    <div style="width: 50px;"></div>
  </header>
  
  <div class="content-area" id="contentArea">
    <div id="authContainer"></div>
    <div id="dashboardContainer" style="display:none;"></div>
  </div>
  
  <div class="bottom-nav-float">
    <button class="nav-item-float" data-nav="home"><span class="iconify" data-icon="mdi:home-outline"></span><span>HOME</span></button>
    <button class="nav-item-float" data-nav="debate"><span class="iconify" data-icon="mdi:chat-outline"></span><span>DEBATE</span></button>
    <button class="nav-item-float active" data-nav="account"><span class="iconify" data-icon="mdi:account-circle-outline"></span><span>ACCOUNT</span></button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script>
(function(){
    const firebaseConfig = {
        apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc",
        authDomain: "orafut-58b5f.firebaseapp.com",
        projectId: "orafut-58b5f",
        storageBucket: "orafut-58b5f.firebasestorage.app",
        messagingSenderId: "500581059835",
        appId: "1:500581059835:web:7be0994b65ff21dae0b45e"
    };
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let currentUserData = null;
    let userVotes = [];
    let followedTeams = [];
    let allMatches = [];
    let allTeams = [];
    let leaderboardUsers = [];
    
    function showToast(msg, isError = false){
        const toast = document.getElementById('notificationToast');
        const toastMsg = document.getElementById('toastMessage');
        toastMsg.innerText = msg;
        toast.style.display = 'flex';
        toast.style.borderLeftColor = isError ? '#F44336' : '#9CE800';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }
    
    function phoneToEmail(phone){ return phone.replace(/[^0-9]/g, '') + '@orafut.user'; }
    function emailToPhone(email){ return email.replace('@orafut.user', ''); }
    function generateRandomUsername(){
        const prefixes = ['user', 'fan', 'ora', 'fut', 'soccer', 'goal', 'legend', 'pro', 'winner', 'champ'];
        const randomNum = Math.floor(Math.random() * 10000);
        const randomSuffix = Math.random().toString(36).substr(2, 3);
        return `${prefixes[Math.floor(Math.random() * prefixes.length)]}-${randomNum}${randomSuffix}`;
    }
    
    // Render Auth Screen
    function renderAuthScreen(){
        const container = document.getElementById('authContainer');
        container.style.display = 'block';
        document.getElementById('dashboardContainer').style.display = 'none';
        
        let activeTab = 'signup';
        
        function renderForm(){
            const isSignup = activeTab === 'signup';
            container.innerHTML = `
                <div class="auth-container">
                    <div class="auth-tabs">
                        <div class="auth-tab ${activeTab === 'signup' ? 'active' : ''}" data-tab="signup">SIGN UP</div>
                        <div class="auth-tab ${activeTab === 'login' ? 'active' : ''}" data-tab="login">LOGIN</div>
                    </div>
                    <div class="auth-card">
                        <div class="input-group"><label>📱 PHONE NUMBER</label><input type="tel" id="authPhone" placeholder="e.g., 0712345678" value=""></div>
                        <div class="input-group"><label>🔒 PIN (4-6 DIGITS)</label><input type="password" id="authPin" placeholder="Enter PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*"></div>
                        ${isSignup ? `<div class="input-group"><label>👤 USERNAME (OPTIONAL)</label><input type="text" id="authUsername" placeholder="e.g., SoccerFan123"></div>` : ''}
                        <button id="authSubmitBtn" class="auth-btn">${isSignup ? '🚀 CREATE ACCOUNT' : '🔐 LOGIN'}</button>
                        <div class="auth-switch-text">${isSignup ? 'Already have an account?' : 'New to ORAFUT?'} <span id="switchTabBtn">${isSignup ? 'LOGIN' : 'SIGN UP'}</span></div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.addEventListener('click', () => { activeTab = tab.dataset.tab; renderForm(); });
            });
            document.getElementById('switchTabBtn')?.addEventListener('click', () => { activeTab = activeTab === 'signup' ? 'login' : 'signup'; renderForm(); });
            document.getElementById('authSubmitBtn')?.addEventListener('click', handleAuth);
        }
        
        async function handleAuth(){
            const phone = document.getElementById('authPhone').value.trim();
            const pin = document.getElementById('authPin').value.trim();
            if(!phone || !pin){ showToast("Please enter phone number and PIN", true); return; }
            if(pin.length < 4 || pin.length > 6 || !/^\d+$/.test(pin)){ showToast("PIN must be 4-6 digits", true); return; }
            const email = phoneToEmail(phone);
            
            if(activeTab === 'signup'){
                const username = document.getElementById('authUsername')?.value.trim() || generateRandomUsername();
                try{
                    const userCred = await auth.createUserWithEmailAndPassword(email, pin);
                    await userCred.user.updateProfile({ displayName: username });
                    await db.collection('users').doc(userCred.user.uid).set({
                        uid: userCred.user.uid,
                        phoneNumber: phone,
                        username: username,
                        displayName: username,
                        points: 0,
                        totalScore: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        followedTeams: [],
                        rankPoints: 0,
                        rankScore: 0
                    });
                    showToast("Account created successfully!");
                    loadUserDashboard();
                } catch(e){
                    if(e.code === 'auth/email-already-in-use') showToast("Phone number already registered. Login instead.", true);
                    else showToast(e.message || "Signup failed", true);
                }
            } else {
                try{
                    const userCred = await auth.signInWithEmailAndPassword(email, pin);
                    showToast("Login successful!");
                    loadUserDashboard();
                } catch(e){
                    showToast("Invalid phone number or PIN", true);
                }
            }
        }
        renderForm();
    }
    
    async function loadUserDashboard(){
        const user = auth.currentUser;
        if(!user){ renderAuthScreen(); return; }
        
        const userDoc = await db.collection('users').doc(user.uid).get();
        if(!userDoc.exists){
            await db.collection('users').doc(user.uid).set({
                uid: user.uid,
                phoneNumber: emailToPhone(user.email || ''),
                username: user.displayName || generateRandomUsername(),
                displayName: user.displayName || generateRandomUsername(),
                points: 0,
                totalScore: 0,
                followedTeams: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        currentUserData = { uid: user.uid, ...userDoc.data(), email: user.email };
        if(!currentUserData.username) currentUserData.username = currentUserData.displayName || generateRandomUsername();
        
        await Promise.all([
            loadUserVotes(),
            loadFollowedTeams(),
            loadAllMatches(),
            loadAllTeams(),
            loadLeaderboard()
        ]);
        renderDashboard();
    }
    
    async function loadUserVotes(){
        const snap = await db.collection('votes').where('userId', '==', currentUserData.uid).get();
        userVotes = [];
        snap.forEach(doc => userVotes.push({ id: doc.id, ...doc.data() }));
    }
    
    async function loadFollowedTeams(){
        const teams = currentUserData.followedTeams || [];
        followedTeams = [];
        for(const teamId of teams){
            const teamDoc = await db.collection('teams').doc(teamId).get();
            if(teamDoc.exists) followedTeams.push({ id: teamDoc.id, ...teamDoc.data() });
        }
    }
    
    async function loadAllMatches(){
        const snap = await db.collection('matches').get();
        allMatches = [];
        snap.forEach(doc => allMatches.push({ id: doc.id, ...doc.data() }));
    }
    
    async function loadAllTeams(){
        const snap = await db.collection('teams').limit(30).get();
        allTeams = [];
        snap.forEach(doc => allTeams.push({ id: doc.id, ...doc.data() }));
    }
    
    async function loadLeaderboard(){
        const snap = await db.collection('users').orderBy('points', 'desc').limit(20).get();
        leaderboardUsers = [];
        snap.forEach(doc => leaderboardUsers.push({ id: doc.id, ...doc.data() }));
    }
    
    function calculateUserStats(){
        let correctPredictions = 0;
        let totalPredictions = userVotes.length;
        let totalPoints = 0;
        
        userVotes.forEach(vote => {
            const match = allMatches.find(m => m.id === vote.matchId);
            if(match && match.status === 'ended' && match.winner){
                const isCorrect = vote.voteType === match.winner;
                if(isCorrect) { correctPredictions++; totalPoints += 10; }
            }
        });
        
        const points = Math.max(currentUserData.points || 0, totalPoints);
        const accuracy = totalPredictions > 0 ? Math.round((correctPredictions / totalPredictions) * 100) : 0;
        return { points, accuracy, correctPredictions, totalPredictions, totalScore: currentUserData.totalScore || 0 };
    }
    
    function getUserRank(type){
        const sorted = [...leaderboardUsers].sort((a,b) => (type === 'points' ? (b.points || 0) - (a.points || 0) : (b.totalScore || 0) - (a.totalScore || 0)));
        const index = sorted.findIndex(u => u.uid === currentUserData.uid);
        return index !== -1 ? `#${index + 1}` : '#--';
    }
    
    async function updateUsername(newName){
        if(!newName || newName.length < 2) return showToast("Username too short", true);
        const user = auth.currentUser;
        await user.updateProfile({ displayName: newName });
        await db.collection('users').doc(currentUserData.uid).update({ username: newName, displayName: newName });
        currentUserData.username = newName;
        currentUserData.displayName = newName;
        showToast("Username updated!");
        renderDashboard();
    }
    
    function renderDashboard(){
        const container = document.getElementById('dashboardContainer');
        const authContainer = document.getElementById('authContainer');
        authContainer.style.display = 'none';
        container.style.display = 'block';
        
        const stats = calculateUserStats();
        const rankPoints = getUserRank('points');
        const rankScore = getUserRank('totalScore');
        
        const votedMatches = userVotes.map(vote => {
            const match = allMatches.find(m => m.id === vote.matchId);
            if(!match) return null;
            const isCorrect = match.status === 'ended' && match.winner === vote.voteType;
            const resultText = isCorrect ? 'WIN' : (match.winner && match.winner !== 'draw' ? 'LOSS' : (match.winner === 'draw' ? 'DRAW' : 'PENDING'));
            return { match, voteType: vote.voteType, isCorrect, points: isCorrect ? 10 : 0, resultText };
        }).filter(v => v);
        
        const upcomingMatches = votedMatches.filter(v => v.match.status !== 'ended').slice(0, 5);
        const pastMatches = votedMatches.filter(v => v.match.status === 'ended').slice(0, 5);
        
        function getResultClass(v){
            if(v.match.status !== 'ended') return 'result-upcoming';
            if(v.isCorrect) return 'result-win';
            if(v.match.winner === 'draw') return 'result-draw';
            return 'result-loss';
        }
        
        function getResultText(v){
            if(v.match.status !== 'ended') return `Pick: ${v.voteType === 'team1' ? v.match.teamAName : (v.voteType === 'team2' ? v.match.teamBName : 'Draw')}`;
            if(v.isCorrect) return '✓ CORRECT +10';
            if(v.match.winner === 'draw') return 'DRAW';
            return '✗ WRONG';
        }
        
        container.innerHTML = `
            <div class="dashboard-header">
                <div class="avatar"><span class="iconify" data-icon="mdi:account-circle"></span></div>
                <div class="user-info">
                    <h2>${escapeHtml(currentUserData.username || 'User')} <button class="edit-name-btn" id="editNameBtn">✏️ EDIT</button></h2>
                    <p>📱 ${currentUserData.phoneNumber || emailToPhone(currentUserData.email || '')}</p>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${stats.points}</div><div class="stat-label">POINTS</div></div>
                <div class="stat-card"><div class="stat-value">${stats.totalScore}</div><div class="stat-label">SCORE</div></div>
                <div class="stat-card"><div class="stat-value">${stats.accuracy}%</div><div class="stat-label">ACCURACY</div></div>
            </div>
            
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:trophy"></span> RANKINGS</div>
                <div class="rank-item"><span class="rank-name">🏆 ORAFUT GURU (POINTS)</span><span class="rank-value">${rankPoints}</span></div>
                <div class="rank-item"><span class="rank-name">🎮 ORAFUT GAMER (SCORE)</span><span class="rank-value">${rankScore}</span></div>
                <div class="rank-item"><span class="rank-name">📊 PREDICTION ACCURACY</span><span class="rank-value">${stats.accuracy}%</span></div>
            </div>
            
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:calendar-clock"></span> YOUR UPCOMING MATCHES</div>
                ${upcomingMatches.length === 0 ? '<div class="empty-state">No upcoming matches you voted on</div>' : 
                    upcomingMatches.map(v => `
                        <div class="match-row" data-match-id="${v.match.id}">
                            <div class="match-team">${escapeHtml(v.match.teamAName)} vs ${escapeHtml(v.match.teamBName)}</div>
                            <div class="match-result ${getResultClass(v)}">${getResultText(v)}</div>
                        </div>
                    `).join('')}
            </div>
            
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:history"></span> YOUR PAST PREDICTIONS</div>
                ${pastMatches.length === 0 ? '<div class="empty-state">No past predictions yet</div>' : 
                    pastMatches.map(v => `
                        <div class="match-row" data-match-id="${v.match.id}">
                            <div class="match-team">${escapeHtml(v.match.teamAName)} vs ${escapeHtml(v.match.teamBName)}</div>
                            <div class="match-result ${getResultClass(v)}">${getResultText(v)}</div>
                        </div>
                    `).join('')}
            </div>
            
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:shield-star"></span> TEAMS YOU FOLLOW</div>
                ${followedTeams.length === 0 ? '<div class="empty-state">No teams followed yet. Follow teams from their profile!</div>' : 
                    followedTeams.map(team => `
                        <div class="match-row" data-team-id="${team.id}">
                            <div class="match-team">⚽ ${escapeHtml(team.name || 'Unknown')}</div>
                            <div class="match-result result-upcoming">VIEW →</div>
                        </div>
                    `).join('')}
            </div>
            
            <button id="logoutBtn" class="logout-btn">🚪 LOGOUT</button>
        `;
        
        document.getElementById('editNameBtn')?.addEventListener('click', async () => {
            const newName = prompt("Enter new username:", currentUserData.username);
            if(newName && newName.trim()) await updateUsername(newName.trim());
        });
        
        document.querySelectorAll('.match-row[data-match-id]').forEach(el => {
            el.addEventListener('click', () => window.location.href = `vote.html?id=${el.dataset.matchId}`);
        });
        document.querySelectorAll('.match-row[data-team-id]').forEach(el => {
            el.addEventListener('click', () => window.location.href = `profile.html?id=${el.dataset.teamId}`);
        });
        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            await auth.signOut();
            currentUserData = null;
            renderAuthScreen();
        });
    }
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    
    // Bottom navigation
    document.querySelectorAll('.nav-item-float').forEach(item => {
        item.addEventListener('click', () => {
            const nav = item.dataset.nav;
            if(nav === 'home') window.location.href = 'index.html';
            else if(nav === 'debate') window.location.href = 'debate.html';
            else if(nav === 'account') { /* already on account page */ }
        });
    });
    
    auth.onAuthStateChanged(async (user) => {
        if(user){
            const userDoc = await db.collection('users').doc(user.uid).get();
            currentUserData = { uid: user.uid, ...userDoc.data(), email: user.email };
            if(!currentUserData.username) currentUserData.username = user.displayName || generateRandomUsername();
            await loadUserVotes();
            await loadFollowedTeams();
            await loadAllMatches();
            await loadAllTeams();
            await loadLeaderboard();
            renderDashboard();
        } else {
            renderAuthScreen();
        }
    });
})();
</script>
</body>
</html>
