<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ORAFUT · Add Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #293136; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Poppins', sans-serif; padding: 20px; }
    .container { max-width: 500px; width: 100%; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    :root { --vibrant-green: #9CE800; --dark-bg: #252A2D; }
    .header { background: var(--dark-bg); padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
    .back-btn { background: transparent; border: 2px solid var(--vibrant-green); color: var(--vibrant-green); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; text-decoration: none; }
    .back-btn:hover { background: var(--vibrant-green); color: #000; }
    .header h1 { color: white; font-size: 20px; }
    .header h1 span { color: var(--vibrant-green); }
    .form-section { padding: 30px 24px; }
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 600; color: #1A1A1A; margin-bottom: 8px; font-size: 14px; }
    .form-label .required { color: #ef4444; }
    .form-input { width: 100%; padding: 14px 16px; border: 2px solid #E0E0E0; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--vibrant-green); }
    .form-hint { font-size: 12px; color: #999; margin-top: 6px; }
    .upload-area { border: 3px dashed #D0D0D0; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; background: #FAFAFA; }
    .upload-area:hover { border-color: var(--vibrant-green); background: #F0F0F0; }
    .upload-area .iconify { font-size: 48px; color: #999; margin-bottom: 12px; }
    .upload-text { color: #666; font-size: 14px; }
    .image-preview { margin-top: 16px; text-align: center; }
    .image-preview img { max-width: 100%; max-height: 150px; border-radius: 8px; border: 2px solid #E0E0E0; }
    .submit-btn { width: 100%; background: var(--vibrant-green); border: none; color: #000; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 0 #6B9E00; transition: 0.15s; margin-top: 10px; }
    .submit-btn:hover { background: #A8F010; transform: translateY(-2px); box-shadow: 0 8px 0 #6B9E00; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #333; color: white; padding: 16px 24px; border-radius: 8px; border-left: 4px solid var(--vibrant-green); animation: slideIn 0.3s; z-index: 1000; }
    .toast.error { border-left-color: #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 600px) {
      body { padding: 10px; }
      .container { border-radius: 12px; }
      .form-section { padding: 20px 16px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-btn">← BACK</a>
    <h1>ORA<span>FUT</span> · ADD GAME</h1>
  </div>
  <div class="form-section">
    <div class="form-group">
      <label class="form-label">Game Name <span class="required">*</span></label>
      <input type="text" class="form-input" id="gameName" placeholder="e.g., Penalty Shootout">
    </div>
    
    <div class="form-group">
      <label class="form-label">Game Image</label>
      <div class="upload-area" onclick="document.getElementById('gameImage').click()">
        <span class="iconify" data-icon="mdi:cloud-upload-outline"></span>
        <div class="upload-text">Click to upload image</div>
        <div class="form-hint">PNG, JPG, GIF up to 5MB</div>
      </div>
      <input type="file" id="gameImage" accept="image/*" style="display:none;">
      <div class="image-preview" id="imagePreview"></div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Game File Name <span class="required">*</span></label>
      <input type="text" class="form-input" id="gameLocation" placeholder="e.g., penalty">
      <div class="form-hint">This will open <strong id="fileNamePreview">penalty.html</strong></div>
    </div>
    
    <button class="submit-btn" id="submitBtn">ADD GAME</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
(function(){
  "use strict";
  
  firebase.initializeApp({ apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" });
  const db = firebase.firestore();
  const IMGBB_KEY = "99c6aa298645e8a4742979117fc73be6";
  
  let selectedImage = null;
  
  function showToast(msg, isError) {
    var toast = document.createElement('div');
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
  }
  
  document.getElementById('gameImage').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
      selectedImage = file;
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('imagePreview').innerHTML = '<img src="' + e.target.result + '">';
      };
      reader.readAsDataURL(file);
    }
  });
  
  document.getElementById('gameLocation').addEventListener('input', function() {
    var val = this.value.trim() || 'game';
    document.getElementById('fileNamePreview').textContent = val.replace(/[^a-zA-Z0-9-]/g, '') + '.html';
  });
  
  document.getElementById('submitBtn').addEventListener('click', async function() {
    var name = document.getElementById('gameName').value.trim();
    var location = document.getElementById('gameLocation').value.trim();
    
    if (!name) { showToast('Please enter game name', true); return; }
    if (!location) { showToast('Please enter game file name', true); return; }
    
    location = location.replace(/[^a-zA-Z0-9-]/g, '');
    if (!location) { showToast('Invalid file name', true); return; }
    
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'ADDING...';
    
    try {
      var imageUrl = '';
      if (selectedImage) {
        var fd = new FormData();
        fd.append('image', selectedImage);
        var res = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_KEY, { method: 'POST', body: fd });
        var data = await res.json();
        if (data.success) imageUrl = data.data.url;
      }
      
      await db.collection('games').add({
        name: name,
        imageUrl: imageUrl,
        location: location,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      showToast('Game added successfully!');
      setTimeout(function() { window.location.href = 'games.html'; }, 1500);
    } catch(e) {
      showToast('Error adding game', true);
      btn.disabled = false;
      btn.textContent = 'ADD GAME';
    }
  });
})();
</script>
</body>
</html>
