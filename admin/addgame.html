<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ORAFUT · Games Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #293136; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Poppins', sans-serif; }
        .mobile-container { width: 100%; max-width: 480px; background-color: #ffffff; height: 100vh; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        :root { --vibrant-green: #9CE800; --header-bg: #252A2D; --section-bg: #353B40; --bottom-nav-height: 70px; }
        
        .main-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--header-bg); flex-shrink: 0; }
        .back-btn { background: rgba(156,232,0,0.12); border: 1.5px solid #9CE800; color: #9CE800; padding: 6px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer; border-radius: 8px; }
        .brand { font-size: 20px; font-weight: 800; font-style: italic; }
        .brand .ora { color: white; } .brand .fut { color: #9CE800; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 16px; background: #f8fafc; min-height: 0; padding-bottom: calc(var(--bottom-nav-height) + 16px); }
        .content-area::-webkit-scrollbar { width: 3px; }
        
        /* Tabs */
        .tab-bar { display: flex; background: white; border-bottom: 2px solid #E0E0E0; gap: 8px; margin-bottom: 16px; border-radius: 8px; overflow: hidden; }
        .tab-item { flex: 1; text-align: center; padding: 12px 0; font-weight: 700; font-size: 13px; color: #64748b; cursor: pointer; position: relative; text-transform: uppercase; background: #f1f5f9; }
        .tab-item.active { background: var(--vibrant-green); color: #000; }
        
        .section-card { background: white; border: 2px solid #E0E0E0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .section-title { font-size: 14px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; text-transform: uppercase; }
        
        /* Forms */
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 6px; text-transform: uppercase; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px 14px; border: 2px solid #D0D0D0; border-radius: 8px; font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; background: white; }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus { border-color: var(--vibrant-green); }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; text-transform: uppercase; transition: 0.1s; }
        .btn-primary { background: var(--vibrant-green); color: #000; box-shadow: 0 3px 0 #6B9E00; }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 1px 0 #6B9E00; }
        .btn-danger { background: #F44336; color: white; box-shadow: 0 3px 0 #c62828; }
        .btn-danger:active { transform: translateY(2px); box-shadow: 0 1px 0 #c62828; }
        .btn-secondary { background: #F0F0F0; border: 2px solid #D0D0D0; color: #555; box-shadow: 0 2px 0 #B0B0B0; }
        .btn-secondary:active { transform: translateY(1px); box-shadow: 0 1px 0 #B0B0B0; }
        
        /* Game List */
        .game-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-bottom: 1px solid #eef2f6; }
        .game-info { flex: 1; }
        .game-name { font-weight: 800; font-size: 14px; text-transform: uppercase; }
        .game-path { font-size: 10px; color: #64748b; margin-top: 4px; font-family: monospace; }
        .game-actions { display: flex; gap: 8px; }
        .action-icon { padding: 8px; border-radius: 8px; cursor: pointer; background: #f1f5f9; display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; }
        .action-icon.edit { background: #9CE80020; color: #5a8a00; }
        .action-icon.delete { background: #F4433620; color: #c62828; }
        
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 380px; border-radius: 12px; overflow: hidden; border: 2px solid var(--vibrant-green); }
        .modal-header { background: var(--header-bg); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { color: white; font-size: 16px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .close-modal { background: transparent; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-body { padding: 16px; max-height: 400px; overflow-y: auto; }
        .modal-footer { padding: 16px; border-top: 1px solid #eef2f6; display: flex; gap: 12px; justify-content: flex-end; }
        
        .toast-notify { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: white; padding: 12px 20px; border-radius: 8px; border-left: 4px solid var(--vibrant-green); z-index: 200; display: none; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; max-width: 90%; }
        
        .bottom-nav-float { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--header-bg); display: flex; align-items: center; justify-content: space-around; padding: 10px 8px; border-top: 3px solid var(--vibrant-green); z-index: 100; height: var(--bottom-nav-height); }
        .nav-item-float { display: flex; flex-direction: column; align-items: center; gap: 2px; background: transparent; border: none; color: #999; cursor: pointer; padding: 6px 10px; border-radius: 8px; }
        .nav-item-float .iconify { font-size: 22px; }
        .nav-item-float span { font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .nav-item-float.active { background: var(--vibrant-green); color: #000; }
        
        .path-hint { font-size: 10px; color: #9CE800; margin-top: 4px; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div class="toast-notify" id="notificationToast"><span class="iconify" data-icon="mdi:information-outline"></span><span id="toastMessage"></span></div>
    
    <header class="main-header">
        <button class="back-btn" id="backBtn"><span class="iconify" data-icon="mdi:arrow-left"></span> Back</button>
        <div class="brand"><span class="ora">ORA</span><span class="fut">FUT</span></div>
        <div style="width: 50px;"></div>
    </header>
    
    <div class="content-area" id="contentArea">
        <div class="tab-bar">
            <div class="tab-item active" data-tab="games">🎮 MANAGE GAMES</div>
            <div class="tab-item" data-tab="add">➕ ADD GAME</div>
        </div>
        
        <div id="gamesTab" class="tab-pane"></div>
        <div id="addTab" class="tab-pane" style="display:none;"></div>
    </div>
    
    <div class="bottom-nav-float">
        <button class="nav-item-float" data-nav="home"><span class="iconify" data-icon="mdi:home-outline"></span><span>HOME</span></button>
        <button class="nav-item-float" data-nav="games"><span class="iconify" data-icon="mdi:gamepad-variant"></span><span>GAMES</span></button>
        <button class="nav-item-float" data-nav="account"><span class="iconify" data-icon="mdi:account-circle-outline"></span><span>ACCOUNT</span></button>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header"><h3><span class="iconify" data-icon="mdi:pencil"></span> EDIT GAME</h3><button class="close-modal" id="closeEditModalBtn">✕</button></div>
        <div class="modal-body">
            <div class="input-group"><label>GAME NAME</label><input type="text" id="editGameName" placeholder="e.g., Soccer Challenge"></div>
            <div class="input-group"><label>FILE PATH</label><input type="text" id="editGamePath" placeholder="e.g., games/soccer.html"><div class="path-hint">📁 Place HTML files in the "games" folder</div></div>
            <div class="input-group"><label>ICON (OPTIONAL)</label><input type="text" id="editGameIcon" placeholder="e.g., mdi:soccer"></div>
            <div class="input-group"><label>DESCRIPTION</label><textarea id="editGameDesc" rows="2" placeholder="Game description..."></textarea></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" id="cancelEditBtn">CANCEL</button><button class="btn btn-primary" id="saveEditBtn">SAVE CHANGES</button></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
(function(){
    const firebaseConfig = {
        apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc",
        authDomain: "orafut-58b5f.firebaseapp.com",
        projectId: "orafut-58b5f",
        storageBucket: "orafut-58b5f.firebasestorage.app",
        messagingSenderId: "500581059835",
        appId: "1:500581059835:web:7be0994b65ff21dae0b45e"
    };
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let gamesList = [];
    let currentTab = 'games';
    let editingGameId = null;
    
    function showToast(msg, isError = false){
        const toast = document.getElementById('notificationToast');
        const toastMsg = document.getElementById('toastMessage');
        toastMsg.innerText = msg;
        toast.style.display = 'flex';
        toast.style.borderLeftColor = isError ? '#F44336' : '#9CE800';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }
    
    // Load games from Firestore
    async function loadGames(){
        try{
            const snap = await db.collection('games').orderBy('createdAt', 'desc').get();
            gamesList = [];
            snap.forEach(doc => gamesList.push({ id: doc.id, ...doc.data() }));
            renderGamesList();
        } catch(e){
            showToast("Error loading games", true);
            console.error(e);
        }
    }
    
    // Render games list
    function renderGamesList(){
        const container = document.getElementById('gamesTab');
        if(gamesList.length === 0){
            container.innerHTML = '<div class="empty-state"><span class="iconify" data-icon="mdi:gamepad-variant" style="font-size:48px; opacity:0.5;"></span><br><br>No games added yet<br><span style="font-size:11px;">Click "ADD GAME" to create your first game</span></div>';
            return;
        }
        
        container.innerHTML = `
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:gamepad-variant"></span> ALL GAMES (${gamesList.length})</div>
                <div id="gamesListContainer"></div>
            </div>
        `;
        
        const listContainer = document.getElementById('gamesListContainer');
        listContainer.innerHTML = gamesList.map(game => `
            <div class="game-item">
                <div class="game-info">
                    <div class="game-name"><span class="iconify" data-icon="${game.icon || 'mdi:gamepad-variant'}" style="font-size:14px; margin-right:6px;"></span> ${escapeHtml(game.name)}</div>
                    <div class="game-path">📁 ${escapeHtml(game.filePath || 'games/unknown.html')}</div>
                    ${game.description ? `<div style="font-size:10px; color:#888; margin-top:4px;">${escapeHtml(game.description.substring(0, 60))}</div>` : ''}
                </div>
                <div class="game-actions">
                    <div class="action-icon edit" data-id="${game.id}"><span class="iconify" data-icon="mdi:pencil"></span> Edit</div>
                    <div class="action-icon delete" data-id="${game.id}"><span class="iconify" data-icon="mdi:delete"></span> Del</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.action-icon.edit').forEach(btn => {
            btn.addEventListener('click', () => openEditModal(btn.dataset.id));
        });
        document.querySelectorAll('.action-icon.delete').forEach(btn => {
            btn.addEventListener('click', () => deleteGame(btn.dataset.id));
        });
    }
    
    // Render add game form
    function renderAddForm(){
        const container = document.getElementById('addTab');
        container.innerHTML = `
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:plus-circle"></span> ADD NEW GAME</div>
                <div class="input-group"><label>🎮 GAME NAME *</label><input type="text" id="gameName" placeholder="e.g., Soccer Challenge"></div>
                <div class="input-group"><label>📁 FILE PATH *</label><input type="text" id="gamePath" placeholder="e.g., games/soccer.html"><div class="path-hint">💡 Tip: Place your HTML files in the "games" folder. Example: "games/mojang.html"</div></div>
                <div class="input-group"><label>🎨 ICON (Iconify icon)</label><input type="text" id="gameIcon" placeholder="e.g., mdi:soccer, mdi:basketball, mdi:gamepad-variant"><div class="path-hint">Browse icons at https://iconify.design</div></div>
                <div class="input-group"><label>📝 DESCRIPTION</label><textarea id="gameDesc" rows="2" placeholder="Describe your game..."></textarea></div>
                <button class="btn btn-primary" id="saveGameBtn" style="width:100%;"><span class="iconify" data-icon="mdi:content-save"></span> SAVE GAME</button>
            </div>
            <div class="section-card">
                <div class="section-title"><span class="iconify" data-icon="mdi:information-outline"></span> HOW TO ADD GAMES</div>
                <div style="font-size:12px; color:#666; line-height:1.6;">
                    <p>1. Create your HTML game file (e.g., <strong>mygame.html</strong>)</p>
                    <p>2. Upload it to the <strong>"games"</strong> folder on your server</p>
                    <p>3. Enter the file path as <strong>"games/mygame.html"</strong></p>
                    <p>4. Click SAVE GAME - users can now play it!</p>
                </div>
            </div>
        `;
        
        document.getElementById('saveGameBtn')?.addEventListener('click', addGame);
    }
    
    // Add new game
    async function addGame(){
        const name = document.getElementById('gameName').value.trim();
        const filePath = document.getElementById('gamePath').value.trim();
        const icon = document.getElementById('gameIcon').value.trim() || 'mdi:gamepad-variant';
        const description = document.getElementById('gameDesc').value.trim();
        
        if(!name){ showToast("Please enter game name", true); return; }
        if(!filePath){ showToast("Please enter file path", true); return; }
        
        try{
            await db.collection('games').add({
                name: name,
                filePath: filePath,
                icon: icon,
                description: description,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`Game "${name}" added successfully!`);
            document.getElementById('gameName').value = '';
            document.getElementById('gamePath').value = '';
            document.getElementById('gameIcon').value = '';
            document.getElementById('gameDesc').value = '';
            await loadGames();
            switchTab('games');
        } catch(e){
            showToast("Error adding game", true);
            console.error(e);
        }
    }
    
    // Open edit modal
    function openEditModal(gameId){
        const game = gamesList.find(g => g.id === gameId);
        if(!game) return;
        editingGameId = gameId;
        document.getElementById('editGameName').value = game.name || '';
        document.getElementById('editGamePath').value = game.filePath || '';
        document.getElementById('editGameIcon').value = game.icon || 'mdi:gamepad-variant';
        document.getElementById('editGameDesc').value = game.description || '';
        document.getElementById('editModal').style.display = 'flex';
    }
    
    // Save edited game
    async function saveEditedGame(){
        const newName = document.getElementById('editGameName').value.trim();
        const newPath = document.getElementById('editGamePath').value.trim();
        const newIcon = document.getElementById('editGameIcon').value.trim();
        const newDesc = document.getElementById('editGameDesc').value.trim();
        
        if(!newName){ showToast("Please enter game name", true); return; }
        if(!newPath){ showToast("Please enter file path", true); return; }
        
        try{
            await db.collection('games').doc(editingGameId).update({
                name: newName,
                filePath: newPath,
                icon: newIcon || 'mdi:gamepad-variant',
                description: newDesc,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`Game updated successfully!`);
            document.getElementById('editModal').style.display = 'none';
            await loadGames();
        } catch(e){
            showToast("Error updating game", true);
            console.error(e);
        }
    }
    
    // Delete game
    async function deleteGame(gameId){
        if(!confirm("Are you sure you want to delete this game?")) return;
        try{
            await db.collection('games').doc(gameId).delete();
            showToast("Game deleted successfully!");
            await loadGames();
        } catch(e){
            showToast("Error deleting game", true);
            console.error(e);
        }
    }
    
    // Tab switching
    function switchTab(tab){
        currentTab = tab;
        document.querySelectorAll('.tab-item').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === tab);
        });
        document.getElementById('gamesTab').style.display = tab === 'games' ? 'block' : 'none';
        document.getElementById('addTab').style.display = tab === 'add' ? 'block' : 'none';
        
        if(tab === 'games') renderGamesList();
        if(tab === 'add') renderAddForm();
    }
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    
    // Event listeners
    document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    
    document.getElementById('closeEditModalBtn')?.addEventListener('click', () => document.getElementById('editModal').style.display = 'none');
    document.getElementById('cancelEditBtn')?.addEventListener('click', () => document.getElementById('editModal').style.display = 'none');
    document.getElementById('saveEditBtn')?.addEventListener('click', saveEditedGame);
    document.getElementById('backBtn')?.addEventListener('click', () => window.location.href = 'index.html');
    
    document.querySelectorAll('.nav-item-float').forEach(item => {
        item.addEventListener('click', () => {
            const nav = item.dataset.nav;
            if(nav === 'home') window.location.href = 'index.html';
            else if(nav === 'games') window.location.href = 'game.html';
            else if(nav === 'account') window.location.href = 'account.html';
        });
    });
    
    // Initialize
    loadGames();
    renderAddForm();
})();
</script>
</body>
</html>
