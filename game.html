<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ORAFUT · Games Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #293136;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .mobile-container {
      width: 100%;
      max-width: 480px;
      background-color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    :root {
      --vibrant-green: #9CE800;
      --header-bg: #252A2D;
      --section-bg: #353B40;
      --white: #FFFFFF;
      --black: #1A1A1A;
      --bottom-nav-height: 70px;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--header-bg);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: transparent;
      border: 2px solid var(--vibrant-green);
      color: var(--vibrant-green);
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 40px;
      transition: all 0.2s;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .brand .ora { color: var(--white); }
    .brand .fut { color: var(--vibrant-green); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .leaderboard-btn {
      background: transparent;
      border: 2px solid var(--vibrant-green);
      color: var(--vibrant-green);
      padding: 6px 10px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
    }

    .banner-ad {
      background: var(--section-bg);
      padding: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 2px solid #252A2D;
      flex-shrink: 0;
    }
    #mobile-banner {
      width: 320px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2D3337;
      border-radius: 6px;
    }

    .social-bar {
      background: var(--section-bg);
      padding: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 2px solid #252A2D;
      flex-shrink: 0;
    }

    .breadcrumb-section {
      background: var(--section-bg);
      padding: 6px 16px;
      border-bottom: 1px solid #252A2D;
      flex-shrink: 0;
    }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      flex-wrap: wrap;
    }
    .breadcrumb a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 600;
    }
    .breadcrumb .iconify { font-size: 10px; color: rgba(255,255,255,0.3); }
    .breadcrumb .current { color: var(--vibrant-green); font-weight: 700; }

    .main-content {
      flex: 1;
      padding: 16px 16px 0 16px;
      background: var(--white);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--vibrant-green) #E0E0E0;
      padding-bottom: calc(var(--bottom-nav-height) + 16px);
    }
    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-track { background: #E0E0E0; }
    .main-content::-webkit-scrollbar-thumb { background: var(--vibrant-green); border-radius: 4px; }

    .games-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .games-title {
      font-size: 18px;
      font-weight: 800;
      color: #1A1A1A;
      text-transform: uppercase;
    }
    .games-title span { color: var(--vibrant-green); }

    .trending-section {
      background: #F8F9FA;
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 16px;
      border: 2px solid #E8E8E8;
    }
    .trending-title {
      font-weight: 800;
      font-size: 14px;
      color: #1A1A1A;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .trending-title .iconify { color: var(--vibrant-green); }
    .trending-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .trending-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .trending-rank {
      width: 24px;
      height: 24px;
      background: var(--vibrant-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      color: #000;
    }
    .trending-info { font-size: 12px; }
    .trending-name { font-weight: 700; color: #1A1A1A; }
    .trending-plays { font-size: 10px; color: #888; }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .game-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #E8E8E8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .game-card:active { transform: scale(0.98); }
    .game-image {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #2D3337, #1A1A1A);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .game-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .game-image .iconify {
      font-size: 40px;
      color: var(--vibrant-green);
    }
    .game-badge {
      position: absolute;
      top: 5px;
      right: 5px;
      background: var(--vibrant-green);
      color: #000;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .game-info { padding: 10px; }
    .game-name {
      font-weight: 800;
      font-size: 13px;
      color: #1A1A1A;
      margin-bottom: 3px;
      text-transform: uppercase;
    }
    .game-desc {
      font-size: 10px;
      color: #888;
      margin-bottom: 8px;
    }
    .play-btn {
      background: var(--vibrant-green);
      border: none;
      color: #000;
      padding: 8px 10px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      text-transform: uppercase;
      box-shadow: 0 3px 0 #6B9E00;
    }

    .bottom-nav-float {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--header-bg);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 8px;
      border-top: 3px solid var(--vibrant-green);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
      z-index: 100;
      height: var(--bottom-nav-height);
    }
    .nav-item-float {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      transition: 0.15s;
      padding: 6px 10px;
      border-radius: 30px;
      text-decoration: none;
      flex: 1;
    }
    .nav-item-float .iconify { font-size: 22px; }
    .nav-item-float span {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .nav-item-float.active {
      background: var(--vibrant-green);
      color: #000;
    }
    .nav-item-float.active .iconify { color: #000; }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 2px solid #E8E8E8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 800;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
    }
    .modal-content {
      padding: 16px 20px;
      max-height: calc(85vh - 70px);
      overflow-y: auto;
    }
    .leaderboard-search {
      display: flex;
      align-items: center;
      background: #F0F0F0;
      padding: 10px 16px;
      border-radius: 40px;
      margin-bottom: 16px;
      border: 2px solid #E0E0E0;
    }
    .leaderboard-search .iconify { color: #999; margin-right: 10px; }
    .leaderboard-search input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
    }
    .leaderboard-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .leaderboard-tab {
      background: #F0F0F0;
      border: 2px solid #E0E0E0;
      color: #666;
      padding: 8px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
    }
    .leaderboard-tab.active {
      background: var(--vibrant-green);
      border-color: var(--vibrant-green);
      color: #000;
    }
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #F8F9FA;
      border-radius: 16px;
      border-left: 4px solid var(--vibrant-green);
    }
    .leaderboard-rank {
      width: 28px;
      height: 28px;
      background: var(--vibrant-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #000;
      font-size: 12px;
    }
    .leaderboard-avatar {
      width: 36px;
      height: 36px;
      background: #2D3337;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }
    .leaderboard-info { flex: 1; }
    .leaderboard-name {
      font-weight: 700;
      color: #1A1A1A;
      font-size: 13px;
    }
    .leaderboard-stats {
      display: flex;
      gap: 10px;
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }
    .leaderboard-score {
      font-weight: 800;
      color: var(--vibrant-green);
      font-size: 16px;
    }

    .hint-text-mobile {
      margin-top: 14px;
      margin-bottom: 8px;
      color: #999;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }
    
    .empty-state {
      grid-column: span 2;
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state .iconify {
      font-size: 48px;
      color: #D0D0D0;
      margin-bottom: 12px;
    }
    
    .toast-notify {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      font-size: 12px;
      z-index: 1000;
      animation: fadeUp 2s forwards;
      border-radius: 60px;
      font-weight: 600;
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      10% { opacity: 1; transform: translateX(-50%) translateY(0); }
      90% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
(function(){
  "use strict";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc",
    authDomain: "orafut-58b5f.firebaseapp.com",
    projectId: "orafut-58b5f",
    storageBucket: "orafut-58b5f.firebasestorage.app",
    messagingSenderId: "500581059835",
    appId: "1:500581059835:web:7be0994b65ff21dae0b45e"
  };

  // Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();
  const auth = firebase.auth();

  let games = [];
  let leaderboardData = [];
  let currentTab = 'all';

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast-notify';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // DOM Elements
  const leaderboardBtn = document.getElementById('leaderboardBtn');
  const leaderboardModal = document.getElementById('leaderboardModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const bottomNavItems = document.querySelectorAll('.nav-item-float');

  // Initialize anonymous user
  let anonymousId = localStorage.getItem('anonymousId');
  if (!anonymousId) {
    anonymousId = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('anonymousId', anonymousId);
  }

  // Track user activity
  db.collection('anonymous_users').doc(anonymousId).set({
    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
    lastPage: 'games.html'
  }, { merge: true }).catch(err => console.error('Error tracking user:', err));

  // Leaderboard functions
  function openLeaderboard() { 
    leaderboardModal.classList.add('active'); 
    loadLeaderboard(); 
  }
  
  function closeLeaderboard() { 
    leaderboardModal.classList.remove('active'); 
  }

  leaderboardBtn.addEventListener('click', openLeaderboard);
  closeModalBtn.addEventListener('click', closeLeaderboard);
  leaderboardModal.addEventListener('click', (e) => { 
    if (e.target === leaderboardModal) closeLeaderboard(); 
  });

  // Bottom navigation
  bottomNavItems.forEach(item => {
    item.addEventListener('click', () => {
      const nav = item.dataset.nav;
      if (nav === 'home') {
        window.location.href = 'match.html';
      } else if (nav === 'account') {
        window.location.href = 'account.html';
      }
      // games stays on same page
    });
  });

  // Load games from Firestore
  async function loadGamesFromDB() {
    try {
      const gamesGrid = document.getElementById('gamesGrid');
      const trendingList = document.getElementById('trendingList');

      // Show loading state
      gamesGrid.innerHTML = '<div class="loading" style="grid-column: span 2;">Loading games...</div>';
      trendingList.innerHTML = '<div class="loading">Loading...</div>';

      const snap = await db.collection('games').orderBy('plays', 'desc').get();
      
      if (!snap.empty) {
        games = [];
        snap.forEach(doc => {
          const gameData = doc.data();
          games.push({ 
            id: doc.id, 
            name: gameData.name || 'Unnamed Game',
            imageUrl: gameData.imageUrl || '',
            location: gameData.location || '',
            plays: gameData.plays || 0,
            createdAt: gameData.createdAt
          });
        });
        renderGames(games, gamesGrid, trendingList);
      } else {
        gamesGrid.innerHTML = `
          <div class="empty-state">
            <span class="iconify" data-icon="mdi:gamepad-variant-outline"></span>
            <p>No games available yet</p>
            <p style="font-size:11px;margin-top:5px;">Games will appear here once added via admin panel</p>
          </div>
        `;
        trendingList.innerHTML = '<div class="trending-item"><div class="trending-rank">-</div><div class="trending-info"><div class="trending-name">No games yet</div></div></div>';
      }
    } catch (error) {
      console.error('Error loading games:', error);
      const gamesGrid = document.getElementById('gamesGrid');
      gamesGrid.innerHTML = `
        <div class="empty-state">
          <span class="iconify" data-icon="mdi:alert-circle-outline"></span>
          <p>Error loading games</p>
          <p style="font-size:11px;margin-top:5px;">Please check your connection and refresh</p>
        </div>
      `;
      const trendingList = document.getElementById('trendingList');
      trendingList.innerHTML = '<div class="trending-item"><div class="trending-rank">!</div><div class="trending-info"><div class="trending-name">Failed to load</div></div></div>';
    }
  }

  function renderGames(gamesList, grid, trending) {
    // Render trending (top 3 by plays)
    const topGames = [...gamesList].sort((a, b) => (b.plays || 0) - (a.plays || 0)).slice(0, 3);
    
    let trendingHtml = '';
    if (topGames.length > 0) {
      topGames.forEach((game, i) => {
        trendingHtml += `
          <div class="trending-item">
            <div class="trending-rank">${i+1}</div>
            <div class="trending-info">
              <div class="trending-name">${escapeHtml(game.name || 'Unknown Game')}</div>
              <div class="trending-plays">${game.plays || 0} plays</div>
            </div>
          </div>
        `;
      });
    } else {
      trendingHtml = '<div class="trending-item"><div class="trending-rank">-</div><div class="trending-info"><div class="trending-name">No games yet</div></div></div>';
    }
    trending.innerHTML = trendingHtml;

    // Render game cards
    if (gamesList.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <span class="iconify" data-icon="mdi:gamepad-variant-outline"></span>
          <p>No games available yet</p>
          <p style="font-size:11px;margin-top:5px;">Games will appear here once added</p>
        </div>
      `;
      return;
    }

    let cardsHtml = '';
    gamesList.forEach(game => {
      const imageUrl = game.imageUrl || '';
      const name = escapeHtml(game.name || 'Game');
      const location = game.location || '';
      const plays = game.plays || 0;
      
      cardsHtml += `
        <div class="game-card" onclick="openGame('${escapeHtml(location)}')">
          <div class="game-image">
            ${imageUrl ? 
              `<img src="${imageUrl}" alt="${name}" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\\'iconify\\' data-icon=\\'mdi:gamepad-variant\\'></span>'">` : 
              '<span class="iconify" data-icon="mdi:gamepad-variant"></span>'
            }
          </div>
          <div class="game-info">
            <div class="game-name">${name}</div>
            <div class="game-desc">${plays} plays</div>
            <button class="play-btn" onclick="event.stopPropagation();openGame('${escapeHtml(location)}')">
              <span class="iconify" data-icon="mdi:play"></span> PLAY
            </button>
          </div>
        </div>
      `;
    });
    grid.innerHTML = cardsHtml;
  }

  window.openGame = function(location) {
    if (location && location.trim() !== '') {
      // Find the game to increment play count
      const gameToUpdate = games.find(g => g.location === location);
      if (gameToUpdate) {
        db.collection('games').doc(gameToUpdate.id).update({
          plays: firebase.firestore.FieldValue.increment(1)
        }).catch(err => console.error('Error updating plays:', err));
      }
      
      // Navigate to game page
      window.location.href = location + '.html';
    } else {
      showToast('Game location not found');
    }
  };

  // Load leaderboard from Firestore
  async function loadLeaderboard() {
    try {
      const leaderboardList = document.getElementById('leaderboardList');
      leaderboardList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">Loading...</div>';

      const scoresSnap = await db.collection('leaderboard_scores')
        .orderBy('totalScore', 'desc')
        .limit(50)
        .get();

      if (!scoresSnap.empty) {
        leaderboardData = [];
        scoresSnap.forEach(doc => {
          leaderboardData.push({ id: doc.id, ...doc.data() });
        });
      } else {
        leaderboardData = [];
      }

      renderLeaderboard(leaderboardList);
    } catch (error) {
      console.error('Error loading leaderboard:', error);
      const leaderboardList = document.getElementById('leaderboardList');
      leaderboardList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No scores yet</div>';
    }
  }

  function renderLeaderboard(list) {
    const searchInput = document.getElementById('leaderboardSearch');
    const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

    let filtered = leaderboardData.filter(p => 
      !searchTerm || (p.playerName && p.playerName.toLowerCase().includes(searchTerm))
    );

    if (filtered.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No players found</div>';
      return;
    }

    let html = '';
    filtered.forEach((player, index) => {
      const playerName = player.playerName || 'Anonymous';
      html += `
        <div class="leaderboard-item">
          <div class="leaderboard-rank">${index + 1}</div>
          <div class="leaderboard-avatar">${playerName.charAt(0)}</div>
          <div class="leaderboard-info">
            <div class="leaderboard-name">${escapeHtml(playerName)}</div>
            <div class="leaderboard-stats">
              <span><span class="iconify" data-icon="mdi:gamepad-variant"></span> ${player.gamesPlayed || 0}</span>
              <span><span class="iconify" data-icon="mdi:trophy"></span> ${player.wins || 0} wins</span>
            </div>
          </div>
          <div class="leaderboard-score">${(player.totalScore || 0).toLocaleString()}</div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Search functionality
  const searchInput = document.getElementById('leaderboardSearch');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      renderLeaderboard(document.getElementById('leaderboardList'));
    });
  }

  // Tab switching
  document.querySelectorAll('.leaderboard-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.leaderboard-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderLeaderboard(document.getElementById('leaderboardList'));
    });
  });

  // Initialize everything
  loadGamesFromDB();

  // Set up real-time listener for games updates
  db.collection('games').onSnapshot((snapshot) => {
    if (!snapshot.empty) {
      const newGames = [];
      snapshot.forEach(doc => {
        const gameData = doc.data();
        newGames.push({ 
          id: doc.id, 
          name: gameData.name || 'Unnamed Game',
          imageUrl: gameData.imageUrl || '',
          location: gameData.location || '',
          plays: gameData.plays || 0
        });
      });
      games = newGames;
      const gamesGrid = document.getElementById('gamesGrid');
      const trendingList = document.getElementById('trendingList');
      renderGames(games, gamesGrid, trendingList);
    }
  }, (error) => {
    console.error('Realtime listener error:', error);
  });

})();
</script>
</body>
</html>
