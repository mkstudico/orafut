<script>
(function(){
  "use strict";

  const firebaseConfig = {
    apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc",
    authDomain: "orafut-58b5f.firebaseapp.com",
    projectId: "orafut-58b5f",
    storageBucket: "orafut-58b5f.firebasestorage.app",
    messagingSenderId: "500581059835",
    appId: "1:500581059835:web:7be0994b65ff21dae0b45e"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();
  const auth = firebase.auth();

  let games = [];
  let leaderboardData = [];
  let currentTab = 'all';
  let searchTimeout = null;

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast-notify';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Get or create anonymous user ID for tracking clicks
  let anonymousId = localStorage.getItem('anonymousId');
  if (!anonymousId) {
    anonymousId = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('anonymousId', anonymousId);
  }

  // Track game click (increment plays whether signed in or not)
  async function trackGameClick(gameId, gameLocation) {
    try {
      // Increment global plays counter
      await db.collection('games').doc(gameId).update({
        plays: firebase.firestore.FieldValue.increment(1)
      });
      
      // Track individual user click for trending accuracy
      const clickRef = db.collection('game_clicks').doc();
      await clickRef.set({
        gameId: gameId,
        userId: anonymousId,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        gameLocation: gameLocation
      });
    } catch (err) {
      console.error('Error tracking click:', err);
    }
  }

  // Load games and calculate trending based on actual clicks (last 7 days)
  async function loadGamesFromDB() {
    try {
      const gamesGrid = document.getElementById('gamesGrid');
      const trendingList = document.getElementById('trendingList');

      gamesGrid.innerHTML = '<div class="loading" style="grid-column: span 2;">Loading games...</div>';
      trendingList.innerHTML = '<div class="loading">Loading...</div>';

      const gamesSnap = await db.collection('games').get();
      
      if (!gamesSnap.empty) {
        games = [];
        gamesSnap.forEach(doc => {
          const gameData = doc.data();
          games.push({ 
            id: doc.id, 
            name: gameData.name || 'Unnamed Game',
            imageUrl: gameData.imageUrl || '',
            location: gameData.location || '',
            plays: gameData.plays || 0
          });
        });
        
        // Calculate trending based on clicks in last 7 days
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        
        const clicksSnap = await db.collection('game_clicks')
          .where('timestamp', '>=', sevenDaysAgo)
          .get();
        
        const clickCounts = {};
        clicksSnap.forEach(click => {
          const gameId = click.data().gameId;
          clickCounts[gameId] = (clickCounts[gameId] || 0) + 1;
        });
        
        // Add click count to games
        const gamesWithClicks = games.map(game => ({
          ...game,
          weeklyClicks: clickCounts[game.id] || 0
        }));
        
        // Sort by weekly clicks for trending
        const trendingGames = [...gamesWithClicks].sort((a, b) => b.weeklyClicks - a.weeklyClicks).slice(0, 3);
        
        renderGames(gamesWithClicks, gamesGrid, trendingList, trendingGames);
      } else {
        gamesGrid.innerHTML = `
          <div class="empty-state">
            <span class="iconify" data-icon="mdi:gamepad-variant-outline"></span>
            <p>No games available yet</p>
            <p style="font-size:11px;margin-top:5px;">Games will appear here once added via admin panel</p>
          </div>
        `;
        trendingList.innerHTML = '<div class="trending-item"><div class="trending-rank">-</div><div class="trending-info"><div class="trending-name">No games yet</div></div></div>';
      }
    } catch (error) {
      console.error('Error loading games:', error);
      const gamesGrid = document.getElementById('gamesGrid');
      gamesGrid.innerHTML = `
        <div class="empty-state">
          <span class="iconify" data-icon="mdi:alert-circle-outline"></span>
          <p>Error loading games</p>
          <p style="font-size:11px;margin-top:5px;">Please check your connection</p>
        </div>
      `;
    }
  }

  function renderGames(gamesList, grid, trending, trendingGames) {
    // Render trending (top 3 by weekly clicks)
    let trendingHtml = '';
    if (trendingGames.length > 0) {
      trendingGames.forEach((game, i) => {
        trendingHtml += `
          <div class="trending-item">
            <div class="trending-rank">${i+1}</div>
            <div class="trending-info">
              <div class="trending-name">${escapeHtml(game.name || 'Unknown Game')}</div>
              <div class="trending-plays">${game.weeklyClicks} clicks this week</div>
            </div>
          </div>
        `;
      });
    } else {
      trendingHtml = '<div class="trending-item"><div class="trending-rank">-</div><div class="trending-info"><div class="trending-name">No clicks yet</div></div></div>';
    }
    trending.innerHTML = trendingHtml;

    // Render game cards sorted by total plays
    const sortedGames = [...gamesList].sort((a, b) => (b.plays || 0) - (a.plays || 0));
    
    if (sortedGames.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <span class="iconify" data-icon="mdi:gamepad-variant-outline"></span>
          <p>No games available yet</p>
        </div>
      `;
      return;
    }

    let cardsHtml = '';
    sortedGames.forEach(game => {
      const imageUrl = game.imageUrl || '';
      const name = escapeHtml(game.name || 'Game');
      const location = game.location || '';
      const plays = game.plays || 0;
      
      cardsHtml += `
        <div class="game-card" data-game-id="${game.id}" data-game-location="${escapeHtml(location)}">
          <div class="game-image">
            ${imageUrl ? 
              `<img src="${imageUrl}" alt="${name}" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\\'iconify\\' data-icon=\\'mdi:gamepad-variant\\'></span>'">` : 
              '<span class="iconify" data-icon="mdi:gamepad-variant"></span>'
            }
          </div>
          <div class="game-info">
            <div class="game-name">${name}</div>
            <div class="game-desc">${plays} total plays</div>
            <button class="play-btn" data-game-id="${game.id}" data-game-location="${escapeHtml(location)}">
              <span class="iconify" data-icon="mdi:play"></span> PLAY
            </button>
          </div>
        </div>
      `;
    });
    grid.innerHTML = cardsHtml;
    
    // Attach click handlers
    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('play-btn')) return;
        const gameId = card.dataset.gameId;
        const gameLocation = card.dataset.gameLocation;
        if (gameId && gameLocation) {
          trackGameClick(gameId, gameLocation);
          window.location.href = gameLocation + '.html';
        }
      });
    });
    
    document.querySelectorAll('.play-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const gameId = btn.dataset.gameId;
        const gameLocation = btn.dataset.gameLocation;
        if (gameId && gameLocation) {
          trackGameClick(gameId, gameLocation);
          window.location.href = gameLocation + '.html';
        }
      });
    });
  }

  // Search functionality with 300ms debounce
  const searchInput = document.getElementById('gameSearchInput');
  const searchDropdown = document.getElementById('searchResultsDropdown');
  
  function performSearch() {
    const term = searchInput.value.trim().toLowerCase();
    if (!term) {
      searchDropdown.classList.remove('active');
      return;
    }
    
    const filtered = games.filter(game => 
      game.name.toLowerCase().includes(term)
    ).slice(0, 8);
    
    if (filtered.length === 0) {
      searchDropdown.innerHTML = '<div class="no-results">No games found</div>';
    } else {
      searchDropdown.innerHTML = filtered.map(game => `
        <div class="search-result-item" data-game-id="${game.id}" data-game-location="${escapeHtml(game.location)}">
          <div class="search-result-icon">
            <span class="iconify" data-icon="mdi:gamepad-variant"></span>
          </div>
          <div class="search-result-info">
            <div class="search-result-name">${escapeHtml(game.name)}</div>
            <div class="search-result-plays">${game.plays || 0} plays</div>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', () => {
          const gameId = item.dataset.gameId;
          const gameLocation = item.dataset.gameLocation;
          if (gameId && gameLocation) {
            trackGameClick(gameId, gameLocation);
            window.location.href = gameLocation + '.html';
          }
          searchDropdown.classList.remove('active');
          searchInput.value = '';
        });
      });
    }
    searchDropdown.classList.add('active');
  }
  
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(performSearch, 300);
  });
  
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-section')) {
      searchDropdown.classList.remove('active');
    }
  });

  // Leaderboard functions
  const leaderboardBtn = document.getElementById('leaderboardBtn');
  const leaderboardModal = document.getElementById('leaderboardModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const bottomNavItems = document.querySelectorAll('.nav-item-float');

  function openLeaderboard() { 
    leaderboardModal.classList.add('active'); 
    loadLeaderboard(); 
  }
  
  function closeLeaderboard() { 
    leaderboardModal.classList.remove('active'); 
  }

  leaderboardBtn.addEventListener('click', openLeaderboard);
  closeModalBtn.addEventListener('click', closeLeaderboard);
  leaderboardModal.addEventListener('click', (e) => { 
    if (e.target === leaderboardModal) closeLeaderboard(); 
  });

  bottomNavItems.forEach(item => {
    item.addEventListener('click', () => {
      const nav = item.dataset.nav;
      if (nav === 'home') {
        window.location.href = 'match.html';
      } else if (nav === 'account') {
        window.location.href = 'account.html';
      }
    });
  });

  async function loadLeaderboard() {
    try {
      const leaderboardList = document.getElementById('leaderboardList');
      leaderboardList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">Loading...</div>';

      const scoresSnap = await db.collection('leaderboard_scores')
        .orderBy('totalScore', 'desc')
        .limit(50)
        .get();

      if (!scoresSnap.empty) {
        leaderboardData = [];
        scoresSnap.forEach(doc => {
          leaderboardData.push({ id: doc.id, ...doc.data() });
        });
      } else {
        leaderboardData = [];
      }

      renderLeaderboard(leaderboardList);
    } catch (error) {
      console.error('Error loading leaderboard:', error);
      const leaderboardList = document.getElementById('leaderboardList');
      leaderboardList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No scores yet</div>';
    }
  }

  function renderLeaderboard(list) {
    const searchInputLeaderboard = document.getElementById('leaderboardSearch');
    const searchTerm = searchInputLeaderboard ? searchInputLeaderboard.value.toLowerCase() : '';

    let filtered = leaderboardData.filter(p => 
      !searchTerm || (p.playerName && p.playerName.toLowerCase().includes(searchTerm))
    );

    if (filtered.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No players found</div>';
      return;
    }

    let html = '';
    filtered.forEach((player, index) => {
      const playerName = player.playerName || 'Anonymous';
      html += `
        <div class="leaderboard-item">
          <div class="leaderboard-rank">${index + 1}</div>
          <div class="leaderboard-avatar">${playerName.charAt(0)}</div>
          <div class="leaderboard-info">
            <div class="leaderboard-name">${escapeHtml(playerName)}</div>
            <div class="leaderboard-stats">
              <span><span class="iconify" data-icon="mdi:gamepad-variant"></span> ${player.gamesPlayed || 0}</span>
              <span><span class="iconify" data-icon="mdi:trophy"></span> ${player.wins || 0} wins</span>
            </div>
          </div>
          <div class="leaderboard-score">${(player.totalScore || 0).toLocaleString()}</div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  const leaderboardSearch = document.getElementById('leaderboardSearch');
  if (leaderboardSearch) {
    leaderboardSearch.addEventListener('input', () => {
      renderLeaderboard(document.getElementById('leaderboardList'));
    });
  }

  document.querySelectorAll('.leaderboard-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.leaderboard-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderLeaderboard(document.getElementById('leaderboardList'));
    });
  });

  // Track anonymous user activity
  db.collection('anonymous_users').doc(anonymousId).set({
    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
    lastPage: 'games.html'
  }, { merge: true }).catch(err => console.error('Error tracking user:', err));

  // Initialize
  loadGamesFromDB();

  // Real-time listener for games updates
  db.collection('games').onSnapshot(() => {
    loadGamesFromDB();
  }, (error) => {
    console.error('Realtime listener error:', error);
  });

})();
</script>
</body>
</html>
