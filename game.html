      const nav = item.dataset.nav;
      const pages = { home: 'index.html', sports: 'edge.html', games: 'game.html', account: 'account.html' };
      if (pages[nav]) window.location.href = pages[nav];
    });
  });

  function renderGames() {
    const gamesGrid = document.getElementById('gamesGrid');
    const trendingList = document.getElementById('trendingList');
    const gameCount = document.getElementById('gameCount');

    const sortedGames = [...games].sort((a, b) => (b.plays || 0) - (a.plays || 0));
    const trending = sortedGames.slice(0, 3);

    let trendingHtml = '';
    trending.forEach((game, i) => {
      trendingHtml += `<div class="trending-item"><div class="trending-rank">${i+1}</div><div class="trending-info"><div class="trending-name">${game.name}</div><div class="trending-plays">${game.plays || 0} plays</div></div></div>`;
    });
    trendingList.innerHTML = trendingHtml;

    let cardsHtml = '';
    games.forEach(game => {
      cardsHtml += `
        <div class="game-card" onclick="openGame('${game.location}')">
          <div class="game-image">
            <span class="iconify" data-icon="mdi:gamepad-variant"></span>
            ${game.badge ? `<span class="game-badge">${game.badge}</span>` : ''}
          </div>
          <div class="game-info">
            <div class="game-name">${game.name}</div>
            <div class="game-desc">${game.description}</div>
            <button class="play-btn" onclick="event.stopPropagation();openGame('${game.location}')"><span class="iconify" data-icon="mdi:play"></span> PLAY</button>
          </div>
        </div>
      `;
    });
    gamesGrid.innerHTML = cardsHtml;
    gameCount.textContent = games.length;
  }

  window.openGame = function(location) {
    if (location) {
      db.collection('games').where('location', '==', location).get().then(snap => {
        snap.forEach(doc => {
          db.collection('games').doc(doc.id).update({
            plays: firebase.firestore.FieldValue.increment(1)
          });
        });
      }).catch(() => {});
      window.location.href = location + '.html';
    }
  };

  async function loadLeaderboard() {
    try {
      const scoresSnap = await db.collection('leaderboard_scores').orderBy('totalScore', 'desc').limit(50).get();
      leaderboardData = [];
      scoresSnap.forEach(doc => leaderboardData.push({ id: doc.id, ...doc.data() }));

      if (leaderboardData.length === 0) {
        leaderboardData = [
          { playerName: 'FootballKing', totalScore: 12500, gamesPlayed: 156, wins: 89 },
          { playerName: 'SoccerPro', totalScore: 10800, gamesPlayed: 134, wins: 72 },
          { playerName: 'GoalMachine', totalScore: 9500, gamesPlayed: 112, wins: 58 },
          { playerName: 'Legend10', totalScore: 8900, gamesPlayed: 98, wins: 52 },
          { playerName: 'AcePlayer', totalScore: 7600, gamesPlayed: 87, wins: 45 }
        ];
      }
      renderLeaderboard();
    } catch(e) {
      leaderboardData = [
        { playerName: 'FootballKing', totalScore: 12500, gamesPlayed: 156, wins: 89 },
        { playerName: 'SoccerPro', totalScore: 10800, gamesPlayed: 134, wins: 72 }
      ];
      renderLeaderboard();
    }
  }

  function renderLeaderboard() {
    const list = document.getElementById('leaderboardList');
    const searchInput = document.getElementById('leaderboardSearch');
    const searchTerm = searchInput.value.toLowerCase();

    let filtered = leaderboardData.filter(p => 
      !searchTerm || p.playerName.toLowerCase().includes(searchTerm)
    );

    if (filtered.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No players found</div>';
      return;
    }

    let html = '';
    filtered.forEach((player, index) => {
      html += `
        <div class="leaderboard-item">
          <div class="leaderboard-rank">${index + 1}</div>
          <div class="leaderboard-avatar">${player.playerName.charAt(0)}</div>
          <div class="leaderboard-info">
            <div class="leaderboard-name">${player.playerName}</div>
            <div class="leaderboard-stats">
              <span><span class="iconify" data-icon="mdi:gamepad-variant"></span> ${player.gamesPlayed || 0}</span>
              <span><span class="iconify" data-icon="mdi:trophy"></span> ${player.wins || 0} wins</span>
            </div>
          </div>
          <div class="leaderboard-score">${player.totalScore.toLocaleString()}</div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  document.getElementById('leaderboardSearch').addEventListener('input', renderLeaderboard);

  document.querySelectorAll('.leaderboard-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.leaderboard-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderLeaderboard();
    });
  });

  async function loadGamesFromDB() {
    try {
      const snap = await db.collection('games').orderBy('plays', 'desc').get();
      const dbGames = [];
      snap.forEach(doc => dbGames.push({ id: doc.id, ...doc.data() }));
      if (dbGames.length > 0) games = dbGames;
      renderGames();
    } catch(e) {
      renderGames();
    }
  }

  let anonymousId = localStorage.getItem('anonymousId');
  if (!anonymousId) {
    anonymousId = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('anonymousId', anonymousId);
  }
  db.collection('anonymous_users').doc(anonymousId).set({
    lastActive: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true }).catch(() => {});

  loadGamesFromDB();
})();
</script>
</body>
</html>
