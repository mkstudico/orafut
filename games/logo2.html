<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ORAFUT · Logo Race</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f0f2f5;
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh; 
      font-family: 'Poppins', sans-serif; 
      padding: 10px;
    }
    
    .ad-left, .ad-right {
      display: none;
      width: 160px;
      flex-shrink: 0;
    }
    @media (min-width: 1024px) {
      .ad-left, .ad-right { display: block; }
      body { gap: 10px; }
    }
    .ad-container {
      width: 160px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    
    .game-container {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    
    .game-header {
      background: #1a1a1a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .back-btn {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-btn .iconify { font-size: 24px; }
    .game-brand {
      font-size: 24px;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
    }
    .game-brand .ora { color: white; }
    .game-brand .fut { color: #9CE800; }
    
    /* Connection Status */
    .connection-status {
      position: relative;
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .connection-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .connection-icon .iconify {
      font-size: 20px;
    }
    .connection-status.green .connection-icon {
      background: rgba(76, 175, 80, 0.2);
    }
    .connection-status.green .connection-icon .iconify {
      color: #4caf50;
    }
    .connection-status.red .connection-icon {
      background: rgba(244, 67, 54, 0.2);
    }
    .connection-status.red .connection-icon .iconify {
      color: #f44336;
    }
    .connection-status.gray .connection-icon {
      background: rgba(158, 158, 158, 0.2);
    }
    .connection-status.gray .connection-icon .iconify {
      color: #9e9e9e;
    }
    .connection-tooltip {
      position: absolute;
      top: 45px;
      right: 0;
      background: #1a1a1a;
      color: white;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 8px;
      white-space: nowrap;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .connection-status:hover .connection-tooltip {
      opacity: 1;
      visibility: visible;
    }
    
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 12px 15px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-icon { color: #9CE800; font-size: 18px; }
    .stat-value { font-size: 18px; font-weight: 700; color: #1a1a1a; }
    
    .timer-section {
      background: #9CE800;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    .timer-label {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 13px;
    }
    .timer-display {
      font-size: 36px;
      font-weight: 800;
      color: #1a1a1a;
      font-family: monospace;
      line-height: 1;
    }
    .timer-display.warning { color: #dc3545; }
    
    .target-area {
      padding: 20px 20px 10px;
      text-align: center;
    }
    .target-label {
      color: #6c757d;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .target-name {
      font-size: 32px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 15px;
      text-transform: uppercase;
    }
    
    .logos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px 15px;
    }
    .logo-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      border: 3px solid #e9ecef;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-card:hover:not(.disabled) {
      border-color: #9CE800;
      transform: scale(0.98);
      background: #fff;
    }
    .logo-card.correct {
      border-color: #28a745;
      background: #d4edda;
      animation: pulse 0.5s;
    }
    .logo-card.wrong {
      border-color: #dc3545;
      background: #f8d7da;
      animation: shake 0.5s;
    }
    .logo-card.disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }
    .logo-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 5px;
    }
    .logo-card .iconify {
      font-size: 50px;
      color: #9CE800;
    }
    
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(0.95); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .feedback-message {
      text-align: center;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      min-height: 45px;
    }
    .feedback-message.correct { color: #28a745; }
    .feedback-message.wrong { color: #dc3545; }
    
    .progress-section {
      padding: 10px 20px 15px;
    }
    .progress-bar {
      height: 6px;
      background: #e9ecef;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #9CE800;
      border-radius: 10px;
      transition: width 0.3s;
      width: 0%;
    }
    
    .result-screen {
      padding: 25px 20px;
      text-align: center;
      display: none;
    }
    .result-screen.show { display: block; }
    .result-trophy { font-size: 50px; color: #ffc107; margin-bottom: 10px; }
    .result-title { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 5px; }
    .result-score { font-size: 42px; font-weight: 800; color: #1a1a1a; margin-bottom: 20px; }
    .result-score span { color: #9CE800; }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }
    .result-stat { text-align: center; }
    .result-stat-value { font-size: 24px; font-weight: 700; color: #9CE800; }
    .result-stat-label { font-size: 11px; color: #6c757d; text-transform: uppercase; }
    
    .ad-banner {
      margin: 15px 0;
      display: flex;
      justify-content: center;
    }
    .social-bar {
      padding: 8px 0;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      border-top: 1px solid #e9ecef;
    }
    
    .play-again-btn {
      background: #9CE800;
      border: none;
      color: #1a1a1a;
      padding: 14px 40px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }
    
    .home-link {
      color: #6c757d;
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    
    .game-area { display: block; }
    .game-area.hide { display: none; }
    
    .loading-screen {
      padding: 50px;
      text-align: center;
      color: #6c757d;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e9ecef;
      border-top-color: #9CE800;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .lives-container { display: flex; gap: 5px; }
    .life-icon { color: #dc3545; font-size: 18px; }
    .life-icon.lost { color: #dee2e6; }
    
    .combo-display {
      background: #9CE800;
      color: #1a1a1a;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      display: inline-block;
      margin-top: 5px;
    }
    
    @media (max-width: 480px) {
      .game-container { border-radius: 0; }
      .target-name { font-size: 24px; }
      .logos-grid { gap: 8px; }
    }
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
(function(){
  "use strict";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc",
    authDomain: "orafut-58b5f.firebaseapp.com",
    projectId: "orafut-58b5f",
    storageBucket: "orafut-58b5f.firebasestorage.app",
    messagingSenderId: "500581059835",
    appId: "1:500581059835:web:7be0994b65ff21dae0b45e"
  };
  
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  let teams = [];
  let usedTeamIds = new Set();
  let currentRound = 0;
  let score = 0;
  let lives = 3;
  let streak = 0;
  let bestStreak = 0;
  let maxCombo = 0;
  let correctAnswers = 0;
  let totalRounds = 15;
  let timer = null;
  let timeLeft = 5;
  let currentQuestion = null;
  let canAnswer = true;
  let gameActive = false;
  
  // Connection/auth state
  let currentUser = null;
  let firebaseInitialized = true;
  let networkConnected = true;
  
  // DOM Elements
  const loadingScreen = document.getElementById('loadingScreen');
  const gameArea = document.getElementById('gameArea');
  const resultScreen = document.getElementById('resultScreen');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const roundDisplay = document.getElementById('roundDisplay');
  const timerDisplay = document.getElementById('timerDisplay');
  const targetName = document.getElementById('targetName');
  const logosGrid = document.getElementById('logosGrid');
  const progressFill = document.getElementById('progressFill');
  const feedbackMessage = document.getElementById('feedbackMessage');
  const comboDisplay = document.getElementById('comboDisplay');
  const livesDisplay = document.getElementById('livesDisplay');
  const finalScore = document.getElementById('finalScore');
  const finalCorrect = document.getElementById('finalCorrect');
  const finalStreak = document.getElementById('finalStreak');
  const finalCombo = document.getElementById('finalCombo');
  const connectionStatus = document.getElementById('connectionStatus');
  const connectionTooltip = document.getElementById('connectionTooltip');
  const homeLink = document.getElementById('homeLink');
  
  // Update connection status UI
  function updateConnectionStatus() {
    if (!firebaseInitialized || !networkConnected) {
      connectionStatus.className = 'connection-status red';
      connectionTooltip.textContent = '❌ Connection error - Scores saved locally only';
    } else if (currentUser) {
      connectionStatus.className = 'connection-status green';
      connectionTooltip.textContent = `✅ Account: ${currentUser.email || 'User'} - Scores will sync to cloud`;
    } else {
      connectionStatus.className = 'connection-status gray';
      connectionTooltip.textContent = '👤 No account - Scores saved locally only';
    }
  }
  
  // Check network status
  function checkNetwork() {
    networkConnected = navigator.onLine;
    updateConnectionStatus();
  }
  
  window.addEventListener('online', () => { networkConnected = true; updateConnectionStatus(); });
  window.addEventListener('offline', () => { networkConnected = false; updateConnectionStatus(); });
  
  // Go back to games hub
  window.goBack = function() {
    window.location.href = 'https://orafut.vercel.app/game.html';
  };
  
  // Home link click handler
  if (homeLink) {
    homeLink.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'https://orafut.vercel.app/game.html';
    });
  }
  
  // Save score to Firebase (only if user is logged in)
  async function saveScoreToFirebase() {
    if (!currentUser) {
      console.log('User not logged in - score saved locally only');
      return false;
    }
    
    if (!networkConnected || !firebaseInitialized) {
      console.log('Network/Firebase issue - score saved locally');
      return false;
    }
    
    try {
      await db.collection('logorace_scores').add({
        userId: currentUser.uid,
        userEmail: currentUser.email || 'anonymous_user',
        gameType: 'logo_race',
        score: score,
        correctAnswers: correctAnswers,
        bestStreak: bestStreak,
        maxCombo: maxCombo,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log('Score saved to Firebase');
      return true;
    } catch (error) {
      console.error('Error saving score to Firebase:', error);
      return false;
    }
  }
  
  // Save score locally (always)
  function saveScoreLocally() {
    const localScores = JSON.parse(localStorage.getItem('logorace_scores') || '[]');
    localScores.push({
      score: score,
      correctAnswers: correctAnswers,
      bestStreak: bestStreak,
      maxCombo: maxCombo,
      timestamp: Date.now()
    });
    while (localScores.length > 20) localScores.shift();
    localStorage.setItem('logorace_scores', JSON.stringify(localScores));
  }
  
  // Save score (hybrid - always local, cloud if logged in)
  async function saveScore() {
    saveScoreLocally();
    await saveScoreToFirebase();
  }
  
  // Auth state listener
  auth.onAuthStateChanged((user) => {
    currentUser = user;
    firebaseInitialized = true;
    updateConnectionStatus();
  });
  
  // Sign in anonymously for tracking
  auth.signInAnonymously().catch((error) => {
    console.warn('Anonymous auth failed:', error);
    firebaseInitialized = false;
    updateConnectionStatus();
  });
  
  async function loadTeams() {
    try {
      const snap = await db.collection('teams').where('isActive', '==', true).get();
      teams = [];
      snap.forEach(doc => {
        const data = doc.data();
        if (data.logoUrl) {
          teams.push({
            id: doc.id,
            name: data.name,
            logoUrl: data.logoUrl
          });
        }
      });
      
      if (teams.length < 9) {
        teams = [
          { id: '1', name: 'Manchester United', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg' },
          { id: '2', name: 'Real Madrid', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg' },
          { id: '3', name: 'Barcelona', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg' },
          { id: '4', name: 'Bayern Munich', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg' },
          { id: '5', name: 'Juventus', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/b/bc/Juventus_FC_2017_icon.svg' },
          { id: '6', name: 'PSG', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg' },
          { id: '7', name: 'Liverpool', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg' },
          { id: '8', name: 'Manchester City', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg' },
          { id: '9', name: 'Arsenal', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg' },
          { id: '10', name: 'Chelsea', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg' },
          { id: '11', name: 'Dortmund', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/6/67/Borussia_Dortmund_logo.svg' },
          { id: '12', name: 'Inter Milan', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/0/05/FC_Internazionale_Milano_2021.svg' },
          { id: '13', name: 'AC Milan', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg' },
          { id: '14', name: 'Tottenham', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/b/b4/Tottenham_Hotspur.svg' },
          { id: '15', name: 'Atletico Madrid', logoUrl: 'https://upload.wikimedia.org/wikipedia/en/f/f4/Atletico_Madrid_2017_logo.svg' }
        ];
      }
      
      loadingScreen.style.display = 'none';
      gameArea.style.display = 'block';
      startNewGame();
    } catch (error) {
      console.error('Error:', error);
      loadingScreen.style.display = 'none';
      gameArea.style.display = 'block';
      startNewGame();
    }
  }
  
  function updateUI() {
    scoreDisplay.textContent = score;
    roundDisplay.textContent = `${currentRound}/${totalRounds}`;
    
    let livesHtml = '';
    for (let i = 0; i < 3; i++) {
      livesHtml += `<span class="life-icon ${i >= lives ? 'lost' : ''}"><span class="iconify" data-icon="mdi:heart"></span></span>`;
    }
    livesDisplay.innerHTML = livesHtml;
    
    if (streak > 1) {
      comboDisplay.innerHTML = `<span class="combo-display"><span class="iconify" data-icon="mdi:fire"></span> ${streak}x COMBO!</span>`;
    } else {
      comboDisplay.innerHTML = '';
    }
    
    const progress = (currentRound / totalRounds) * 100;
    progressFill.style.width = progress + '%';
  }
  
  function getAvailableTeams() {
    return teams.filter(t => !usedTeamIds.has(t.id));
  }
  
  function generateQuestion() {
    if (!gameActive) return;
    
    const availableTeams = getAvailableTeams();
    
    if (availableTeams.length < 9 || lives <= 0) {
      endGame();
      return;
    }
    
    const shuffled = [...availableTeams].sort(() => Math.random() - 0.5);
    const correctTeam = shuffled[0];
    usedTeamIds.add(correctTeam.id);
    
    const otherTeams = shuffled.slice(1, 9);
    let options = [correctTeam, ...otherTeams];
    options = options.sort(() => Math.random() - 0.5);
    
    currentQuestion = {
      correct: correctTeam,
      options: options
    };
    
    targetName.textContent = correctTeam.name.toUpperCase();
    
    logosGrid.innerHTML = '';
    options.forEach(team => {
      const card = document.createElement('div');
      card.className = 'logo-card';
      card.dataset.teamId = team.id;
      card.innerHTML = `<img src="${team.logoUrl}" alt="Logo" onerror="this.onerror=null; this.innerHTML='<span class=\\'iconify\\' data-icon=\\'mdi:shield-half-full\\'></span>'">`;
      card.addEventListener('click', () => handleAnswer(team.id === correctTeam.id, card));
      logosGrid.appendChild(card);
    });
    
    feedbackMessage.textContent = '';
    feedbackMessage.className = 'feedback-message';
    
    resetTimer();
    canAnswer = true;
  }
  
  function resetTimer() {
    if (timer) clearInterval(timer);
    timeLeft = 5;
    timerDisplay.textContent = timeLeft;
    timerDisplay.classList.remove('warning');
    
    timer = setInterval(() => {
      if (!gameActive) {
        clearInterval(timer);
        return;
      }
      
      timeLeft--;
      timerDisplay.textContent = timeLeft;
      
      if (timeLeft <= 2) {
        timerDisplay.classList.add('warning');
      }
      
      if (timeLeft <= 0) {
        clearInterval(timer);
        timerDisplay.textContent = '0';
        handleTimeout();
      }
    }, 1000);
  }
  
  function handleTimeout() {
    if (!canAnswer || !gameActive) return;
    canAnswer = false;
    
    const cards = logosGrid.querySelectorAll('.logo-card');
    cards.forEach(card => {
      card.classList.add('disabled');
      if (card.dataset.teamId === currentQuestion.correct.id) {
        card.classList.add('correct');
      }
    });
    
    lives--;
    streak = 0;
    feedbackMessage.textContent = `⏰ Time's up! It was ${currentQuestion.correct.name}`;
    feedbackMessage.className = 'feedback-message wrong';
    
    updateUI();
    
    setTimeout(() => {
      nextRound();
    }, 1500);
  }
  
  function handleAnswer(isCorrect, card) {
    if (!canAnswer || !gameActive) return;
    canAnswer = false;
    clearInterval(timer);
    
    const cards = logosGrid.querySelectorAll('.logo-card');
    cards.forEach(c => c.classList.add('disabled'));
    
    if (isCorrect) {
      card.classList.add('correct');
      const points = 10 + (timeLeft * 5) + (streak * 5);
      score += points;
      correctAnswers++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      if (streak > maxCombo) maxCombo = streak;
      feedbackMessage.textContent = `✅ Correct! +${points} points!`;
      feedbackMessage.className = 'feedback-message correct';
    } else {
      card.classList.add('wrong');
      cards.forEach(c => {
        if (c.dataset.teamId === currentQuestion.correct.id) {
          c.classList.add('correct');
        }
      });
      lives--;
      streak = 0;
      feedbackMessage.textContent = `❌ Wrong! That was ${currentQuestion.correct.name}`;
      feedbackMessage.className = 'feedback-message wrong';
    }
    
    updateUI();
    
    setTimeout(() => {
      nextRound();
    }, 1500);
  }
  
  function nextRound() {
    if (!gameActive) return;
    
    if (currentRound >= totalRounds || lives <= 0 || getAvailableTeams().length < 9) {
      endGame();
      return;
    }
    
    currentRound++;
    updateUI();
    generateQuestion();
  }
  
  function endGame() {
    gameActive = false;
    clearInterval(timer);
    
    gameArea.style.display = 'none';
    resultScreen.classList.add('show');
    
    finalScore.textContent = score;
    finalCorrect.textContent = correctAnswers;
    finalStreak.textContent = bestStreak;
    finalCombo.textContent = maxCombo;
    
    saveScore();
  }
  
  function startNewGame() {
    currentRound = 0;
    score = 0;
    lives = 3;
    streak = 0;
    bestStreak = 0;
    maxCombo = 0;
    correctAnswers = 0;
    usedTeamIds.clear();
    gameActive = true;
    
    resultScreen.classList.remove('show');
    gameArea.style.display = 'block';
    
    updateUI();
    nextRound();
  }
  
  checkNetwork();
  loadTeams();
  window.startNewGame = startNewGame;
})();
</script>
</body>
</html>
