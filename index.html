<script>
(function(){

                const match = { id: doc.id, ...doc.data() };
                const votesSnap = await db.collection('votes').where('matchId', '==', doc.id).get();
                const total = votesSnap.size;
                const teamA = votesSnap.docs.filter(v => v.data().voteType === 'team1').length;
                const draw = votesSnap.docs.filter(v => v.data().voteType === 'draw').length;
                const teamB = votesSnap.docs.filter(v => v.data().voteType === 'team2').length;
                match.totalVotes = total;
                match.percentages = { team1: total > 0 ? Math.round((teamA/total)*100) : 33, draw: total > 0 ? Math.round((draw/total)*100) : 34, team2: total > 0 ? Math.round((teamB/total)*100) : 33 };
                matches.push(match);
            }
            renderList();
        } catch(e){ showNotification('Error loading matches', true); }
    }
    
    function getArrowStatus(p1, p2, pDraw){
        if(p1 > p2 && p1 > pDraw) return { left: 'arrow-up', right: 'arrow-down', showLeft: true, showRight: true };
        if(p2 > p1 && p2 > pDraw) return { left: 'arrow-down', right: 'arrow-up', showLeft: true, showRight: true };
        if(pDraw > p1 && pDraw > p2) return { left: 'arrow-draw', right: 'arrow-draw', showLeft: true, showRight: true };
        if(p1 === p2 && p1 === pDraw) return { left: 'arrow-draw', right: 'arrow-draw', showLeft: true, showRight: true };
        if(p1 === p2) return { left: 'arrow-draw', right: 'arrow-draw', showLeft: true, showRight: true };
        return { left: 'arrow-up', right: 'arrow-down', showLeft: true, showRight: true };
    }
    
    function renderList(){
        let sportFilterVal = filterSport.value;
        let leagueFilterVal = filterLeague.value;
        let dateFilterVal = filterDate.value;
        let mainSearchTerm = currentMainSearchTerm.toLowerCase().trim();
        
        let filtered = matches.filter(m => {
            const leagueObj = leagues.find(l => l.id === m.league);
            if(sportFilterVal !== 'all'){ const isFootball = !leagueObj?.name?.toLowerCase().includes('basketball'); if(sportFilterVal === 'football' && !isFootball) return false; if(sportFilterVal === 'basketball' && isFootball) return false; }
            if(leagueFilterVal !== 'all' && m.league !== leagueFilterVal) return false;
            if(dateFilterVal){ const matchDate = m.startTime?.toDate(); if(matchDate){ const dateStr = matchDate.toISOString().split('T')[0]; if(dateStr !== dateFilterVal) return false; } }
            if(mainSearchTerm){
                const matchStr = `${m.teamAName} ${m.teamBName}`.toLowerCase();
                if(!matchStr.includes(mainSearchTerm)) return false;
            }
            return true;
        });
        if(currentNav === 'popular') filtered.sort((a,b) => (b.totalVotes || 0) - (a.totalVotes || 0));
        else filtered.sort((a,b) => (a.isTopMatch && !b.isTopMatch) ? -1 : (!a.isTopMatch && b.isTopMatch) ? 1 : 0);
        
        let html = '';
        if(filtered.length === 0) html = '<div style="text-align:center;padding:40px;color:#999;">No matches found</div>';
        else filtered.forEach(m => {
            const leagueName = leagues.find(l => l.id === m.league)?.name || 'Unknown';
            const arrows = getArrowStatus(m.percentages.team1, m.percentages.team2, m.percentages.draw);
            const timeStr = m.status === 'live' ? 'LIVE' : (m.startTime?.toDate().toLocaleString('en-US', { weekday: 'short', hour:'2-digit', minute:'2-digit' }) || 'TBD');
            html += `<div class="match-card-mobile" data-match-id="${m.id}"><div class="match-teams-mobile"><div class="team-mobile"><div class="team-logo-mobile">${m.teamALogo ? `<img src="${m.teamALogo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div><div class="team-info-mobile"><span class="team-name-mobile">${m.teamAName}</span><span class="team-odds-mobile">${leagueName}</span></div></div><div class="match-center"><div class="match-vs-mobile">VS</div><div class="arrow-indicators"><span class="iconify ${arrows.left}" data-icon="mdi:arrow-up-bold"></span><span class="iconify ${arrows.right}" data-icon="mdi:arrow-down-bold"></span></div></div><div class="team-mobile"><div class="team-info-mobile" style="text-align:right;"><span class="team-name-mobile">${m.teamBName}</span><span class="team-odds-mobile">${timeStr}</span></div><div class="team-logo-mobile">${m.teamBLogo ? `<img src="${m.teamBLogo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div></div></div></div>`;
        });
        dynamicList.innerHTML = html;
        document.querySelectorAll('.match-card-mobile').forEach(card => { card.addEventListener('click', () => { window.location.href = `vote.html?id=${card.dataset.matchId}`; }); });
    }
    
    function populateLeagueFilter(){ filterLeague.innerHTML = '<option value="all">All Leagues</option>'; leagues.forEach(l => { filterLeague.innerHTML += `<option value="${l.id}">${l.name}</option>`; }); }
    
    // Main Search Bar with 300ms debounce - filters match cards directly
    if(mainSearchInput){
        mainSearchInput.addEventListener('input', (e) => {
            if(mainSearchTimeout) clearTimeout(mainSearchTimeout);
            mainSearchTimeout = setTimeout(() => {
                currentMainSearchTerm = e.target.value;
                renderList();
            }, 300);
        });
    }
    
    // Top-right search with 300ms debounce - shows dropdown for matches and teams
    if(searchInput){
        searchInput.addEventListener('input', (e) => {
            if(searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const term = e.target.value.toLowerCase().trim();
                if(term.length < 2){ searchResultsBox.style.display = 'none'; return; }
                const matchResults = matches.filter(m => `${m.teamAName} ${m.teamBName}`.toLowerCase().includes(term)).slice(0,5);
                const teamResults = teams.filter(t => t.name?.toLowerCase().includes(term)).slice(0,5);
                if(matchResults.length === 0 && teamResults.length === 0){ searchResultsBox.style.display = 'none'; return; }
                let html = '';
                matchResults.forEach(m => { html += `<div class="search-result-item" data-type="match" data-id="${m.id}"><span class="iconify search-result-icon" data-icon="mdi:soccer"></span><div class="search-result-info"><div class="search-result-title">${m.teamAName} vs ${m.teamBName}</div><div class="search-result-sub">Match · ${m.startTime?.toDate().toLocaleDateString() || 'Upcoming'}</div></div></div>`; });
                teamResults.forEach(t => { html += `<div class="search-result-item" data-type="team" data-id="${t.id}"><span class="iconify search-result-icon" data-icon="mdi:shield"></span><div class="search-result-info"><div class="search-result-title">${t.name}</div><div class="search-result-sub">Team Profile</div></div></div>`; });
                searchResultsBox.innerHTML = html; searchResultsBox.style.display = 'block';
                document.querySelectorAll('.search-result-item').forEach(item => { item.addEventListener('click', () => { const type = item.dataset.type; const id = item.dataset.id; searchResultsBox.style.display = 'none'; searchInput.value = ''; if(type === 'match') window.location.href = `vote.html?id=${id}`; else window.location.href = `profile.html?id=${id}`; }); });
            }, 300);
        });
        document.addEventListener('click', (e) => { if(!searchInput.contains(e.target) && !searchResultsBox.contains(e.target)) searchResultsBox.style.display = 'none'; });
    }
    
    applyFilterBtn?.addEventListener('click', renderList);
    navButtons.forEach(btn => { btn.addEventListener('click', () => { navButtons.forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentNav = btn.dataset.nav; if(currentNav === 'games'){ window.location.href = 'game.html'; return; } if(currentNav === 'debates'){ window.location.href = 'debate.html'; return; } if(promoBanner){ if(currentNav === 'sports' || currentNav === 'popular') promoBanner.style.display = 'none'; else promoBanner.style.display = 'block'; } renderList(); }); });
    
    bottomNavItems.forEach(item => { item.addEventListener('click', () => { bottomNavItems.forEach(i => i.classList.remove('active')); item.classList.add('active'); const nav = item.dataset.navBottom; if(nav === 'menu') openMenu(); else if(nav === 'account') window.location.href = 'account.html'; else if(nav === 'sports') document.querySelector('[data-nav="sports"]')?.click(); else if(nav === 'debate') window.location.href = 'debate.html'; }); });
    
    loadData();
})();
</script>
</body>
</html>
