<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
(function(){
  "use strict";
  
  if (window.innerWidth < 768) { window.location.href = 'index.html'; return; }

  firebase.initializeApp({ 
    apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", 
    authDomain: "orafut-58b5f.firebaseapp.com", 
    projectId: "orafut-58b5f", 
    storageBucket: "orafut-58b5f.firebasestorage.app", 
    messagingSenderId: "500581059835", 
    appId: "1:500581059835:web:7be0994b65ff21dae0b45e" 
  });
  
  const db = firebase.firestore();
  const anonymousId = localStorage.getItem('anonymousId') || (() => { 
    const id = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); 
    localStorage.setItem('anonymousId', id); 
    return id; 
  })();
  
  db.collection('anonymous_users').doc(anonymousId).set({ 
    lastActive: firebase.firestore.FieldValue.serverTimestamp() 
  }, { merge: true }).catch(()=>{});

  // DOM Elements
  const el = {
    leftTab: document.getElementById('leftTab'),
    menuToggleBtn: document.getElementById('menuToggleBtn'),
    navButtons: document.querySelectorAll('.nav-btn'),
    sportBtns: document.querySelectorAll('.sport-btn'),
    leagueContainer: document.getElementById('leagueTeamsContainer'),
    contextDisplay: document.getElementById('contextDisplay'),
    contextSportsBtn: document.getElementById('contextSportsBtn'),
    contextLiveBtn: document.getElementById('contextLiveBtn'),
    dynamicList: document.getElementById('dynamicList'),
    filterSport: document.getElementById('filterSport'),
    filterLeague: document.getElementById('filterLeague'),
    filterDateSelect: document.getElementById('filterDateSelect'),
    filterDate: document.getElementById('filterDate'),
    applyFilterBtn: document.getElementById('applyFilterBtn'),
    clearFiltersBtn: document.getElementById('clearFiltersBtn'),
    cardHint: document.getElementById('cardHint'),
    breadcrumbSport: document.getElementById('breadcrumbSport'),
    breadcrumbMatch: document.getElementById('breadcrumbMatch'),
    searchInput: document.getElementById('globalSearchInput'),
    filterBar: document.getElementById('filterBar'),
    announcementContainer: document.getElementById('announcementContainer'),
    promoContainer: document.getElementById('promoContainer'),
    searchResults: document.getElementById('searchResults')
  };

  // State
  const state = {
    currentNav: 'home',
    currentSport: 'football',
    currentContext: 'sports',
    leftTabVisible: false,
    teams: [],
    leagues: [],
    matches: [],
    selectedLeague: null,
    teamSearchTerm: '',
    announcements: [],
    allMatches: [],
    allTeams: [],
    filtersActive: false
  };

  let searchTimeout = null;

  // Helper Functions
  const updateBreadcrumb = (sport, context) => {
    el.breadcrumbSport.textContent = sport === 'football' ? 'Football' : 'Basketball';
    el.breadcrumbMatch.textContent = context === 'sports' ? 'Upcoming' : 'Live Now';
  };

  const updateFilterUI = () => {
    if (state.filtersActive) {
      el.filterBar.classList.add('active-filters');
      el.applyFilterBtn.classList.add('active');
      el.clearFiltersBtn.classList.add('visible');
      el.cardHint.textContent = '🔍 FILTERS APPLIED - SHOWING FILTERED RESULTS 🔍';
    } else {
      el.filterBar.classList.remove('active-filters');
      el.applyFilterBtn.classList.remove('active');
      el.clearFiltersBtn.classList.remove('visible');
      el.cardHint.textContent = '⚡ SHOWING ALL UPCOMING MATCHES ⚡';
    }
  };

  const checkFiltersActive = () => {
    state.filtersActive = !!(el.searchInput.value || 
                            el.filterSport.value !== 'all' || 
                            el.filterLeague.value !== 'all' || 
                            el.filterDateSelect.value !== 'all');
    updateFilterUI();
  };

  const clearAllFilters = () => {
    el.searchInput.value = '';
    el.filterSport.value = 'all';
    el.filterLeague.value = 'all';
    el.filterDateSelect.value = 'all';
    el.filterDate.value = '';
    el.filterDate.style.display = 'none';
    state.filtersActive = false;
    updateFilterUI();
    renderMatches();
    el.searchResults.classList.remove('active');
  };

  // Event Listeners
  el.menuToggleBtn.addEventListener('click', () => { 
    state.leftTabVisible = !state.leftTabVisible; 
    el.leftTab.classList.toggle('visible', state.leftTabVisible); 
  });

  document.addEventListener('click', (e) => { 
    if (!e.target.closest('.search-wrapper')) el.searchResults.classList.remove('active'); 
  });

  el.searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const val = this.value.trim();
    if (!val) { 
      el.searchResults.classList.remove('active'); 
      state.filtersActive = false;
      updateFilterUI();
      renderMatches();
      return;
    }
    searchTimeout = setTimeout(() => {
      const t = val.toLowerCase();
      const results = [];
      
      state.allMatches.filter(m => m.status !== 'completed').forEach(m => {
        if (m.teamAName.toLowerCase().includes(t) || m.teamBName.toLowerCase().includes(t) || (m.leagueName && m.leagueName.toLowerCase().includes(t))) {
          results.push({ type: 'match', id: m.id, title: m.teamAName + ' vs ' + m.teamBName, subtitle: m.leagueName || 'Match', logo: m.teamALogo, link: 'vote.html?id=' + m.id });
        }
      });
      
      state.allTeams.forEach(tm => {
        if (tm.name.toLowerCase().includes(t) || (tm.leagueName && tm.leagueName.toLowerCase().includes(t))) {
          results.push({ type: 'team', id: tm.id, title: tm.name, subtitle: tm.leagueName || 'Team', logo: tm.logoUrl, link: 'profile.html?team=' + tm.id });
        }
      });
      
      el.searchResults.innerHTML = results.length === 0 ? 
        '<div class="search-result-item"><div class="search-result-info"><div class="search-result-title">No results</div></div></div>' :
        results.slice(0, 8).map(r => `
          <div class="search-result-item" onclick="window.location.href='${r.link}'">
            <div class="search-result-logo">${r.logo ? `<img src="${r.logo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div>
            <div class="search-result-info">
              <div class="search-result-title">${r.title}</div>
              <div class="search-result-subtitle">${r.subtitle}</div>
            </div>
            <div class="search-result-type">${r.type}</div>
          </div>
        `).join('');
      
      el.searchResults.classList.add('active');
    }, 300);
  });

  el.filterDateSelect.addEventListener('change', function() {
    el.filterDate.style.display = this.value === 'custom' ? 'block' : 'none';
  });

  el.applyFilterBtn.addEventListener('click', () => {
    state.filtersActive = true;
    updateFilterUI();
    renderMatches();
  });

  el.clearFiltersBtn.addEventListener('click', clearAllFilters);

  // Data Loading
  const loadAnnouncements = async () => {
    try {
      const snap = await db.collection('announcements').where('active', '==', true).orderBy('createdAt', 'desc').limit(1).get();
      state.announcements = !snap.empty ? [{ title: snap.docs[0].data().title, content: snap.docs[0].data().content }] : 
                                         [{ title: 'WELCOME', content: 'Start predicting and win big! New matches added daily!' }];
    } catch(e) { 
      state.announcements = [{ title: 'WELCOME', content: 'Start predicting and win big!' }]; 
    }
    if (state.currentNav === 'home' && state.announcements.length) {
      const a = state.announcements[0];
      el.announcementContainer.innerHTML = `<div class="announcement-banner"><h3><span class="iconify" data-icon="mdi:bullhorn"></span> ${a.title}</h3><p>${a.content}</p></div>`;
    }
  };

  const loadLeaguesAndTeams = async () => {
    const leaguesSnap = await db.collection('leagues').get();
    state.leagues = leaguesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    
    const teamsSnap = await db.collection('teams').where('isActive', '==', true).get();
    state.teams = state.allTeams = teamsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    
    updateLeaguesTeams();
    populateLeagueFilter();
  };

  const updateLeaguesTeams = () => {
    const filteredLeagues = state.leagues.filter(l => l.sport === state.currentSport);
    let html = `
      <div class="section-label"><span class="iconify" data-icon="mdi:trophy-outline"></span> LEAGUES</div>
      <div class="sub-section"><div class="item-list">
        ${filteredLeagues.slice(0, 7).map(l => `<div class="item-chip" data-league="${l.id}"><span class="iconify" data-icon="mdi:chevron-right"></span>${l.name}</div>`).join('')}
      </div></div>
      <div class="section-label" style="margin-top:20px;"><span class="iconify" data-icon="mdi:account-group-outline"></span> TEAMS</div>
      <div class="sub-section">
        <div class="team-search-box"><input type="text" id="teamSearchInput" placeholder="Search teams..." value="${state.teamSearchTerm}"></div>
        <div class="item-list" id="teamsListContainer">
    `;
    
    const teamsToShow = state.teams.filter(t => {
      if (t.sport !== state.currentSport) return false;
      if (state.selectedLeague && t.league !== state.selectedLeague) return false;
      if (state.teamSearchTerm && !t.name.toLowerCase().includes(state.teamSearchTerm.toLowerCase())) return false;
      return true;
    });
    
    html += teamsToShow.length ? 
      teamsToShow.slice(0, 15).map(t => `<div class="item-chip" data-team="${t.id}"><span class="iconify" data-icon="mdi:shield-half-full"></span>${t.name}</div>`).join('') :
      '<div class="item-chip"><span class="iconify" data-icon="mdi:shield-half-full"></span>No teams found</div>';
    
    html += '</div></div>';
    el.leagueContainer.innerHTML = html;
    
    const teamSearchInput = document.getElementById('teamSearchInput');
    if (teamSearchInput) {
      teamSearchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          state.teamSearchTerm = this.value;
          updateLeaguesTeams();
        }, 300);
      });
    }
    
    document.querySelectorAll('[data-league]').forEach(el => {
      el.addEventListener('click', function() {
        state.selectedLeague = this.dataset.league;
        state.teamSearchTerm = '';
        updateLeaguesTeams();
        document.getElementById('filterLeague').value = state.selectedLeague;
        if (state.filtersActive) renderMatches();
      });
    });
    
    document.querySelectorAll('[data-team]').forEach(el => {
      el.addEventListener('click', () => window.location.href = `profile.html?team=${el.dataset.team}`);
    });
  };

  const populateLeagueFilter = () => {
    el.filterLeague.innerHTML = '<option value="all">All Leagues</option>';
    state.leagues.filter(l => l.sport === state.currentSport).forEach(l => {
      el.filterLeague.innerHTML += `<option value="${l.id}">${l.name}</option>`;
    });
  };

  const loadMatches = async () => {
    try {
      let query = db.collection('matches').where('sport', '==', state.currentSport);
      query = state.currentContext === 'live' ? query.where('status', '==', 'live') : query.where('status', 'in', ['upcoming', 'live']);
      query = query.orderBy('startTime', 'asc');
      
      const snap = await query.get();
      state.matches = state.allMatches = snap.docs.map(d => ({
        id: d.id,
        ...d.data(),
        popularity: d.data().popularity || Math.floor(Math.random() * 100)
      }));
      
      renderMatches();
    } catch(e) { console.error('Match load error:', e); }
  };

  const renderMatches = () => {
    const sportFilter = el.filterSport.value;
    const leagueFilter = el.filterLeague.value;
    const searchTerm = el.searchInput.value.toLowerCase();
    const dateFilterType = el.filterDateSelect.value;
    const customDate = el.filterDate.value;
    
    let filtered = state.matches;
    
    // Only apply filters if filters are active
    if (state.filtersActive) {
      filtered = state.matches.filter(m => {
        if (sportFilter !== 'all' && m.sport !== sportFilter) return false;
        if (leagueFilter !== 'all' && m.league !== leagueFilter) return false;
        if (searchTerm && !`${m.teamAName} ${m.teamBName} ${m.leagueName || ''}`.toLowerCase().includes(searchTerm)) return false;
        
        if (dateFilterType !== 'all' && m.startTime) {
          const matchDate = m.startTime.toDate();
          const today = new Date(); today.setHours(0,0,0,0);
          const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
          
          if (dateFilterType === 'today') {
            const matchDay = new Date(matchDate); matchDay.setHours(0,0,0,0);
            if (matchDay.getTime() !== today.getTime()) return false;
          } else if (dateFilterType === 'tomorrow') {
            const matchDay = new Date(matchDate); matchDay.setHours(0,0,0,0);
            if (matchDay.getTime() !== tomorrow.getTime()) return false;
          } else if (dateFilterType === 'custom' && customDate) {
            if (matchDate.toISOString().split('T')[0] !== customDate) return false;
          }
        }
        return true;
      });
    }
    
    if (state.currentNav === 'popular') {
      filtered = filtered.sort((a,b) => (b.popularity||0) - (a.popularity||0)).slice(0,5);
    } else {
      filtered.sort((a,b) => {
        if (a.isTopMatch && !b.isTopMatch) return -1;
        if (!a.isTopMatch && b.isTopMatch) return 1;
        return a.startTime.toDate() - b.startTime.toDate();
      });
    }
    
    if (!filtered.length) {
      el.dynamicList.innerHTML = '<div class="match-card" style="text-align:center;padding:40px;">No matches found</div>';
      return;
    }
    
    el.dynamicList.innerHTML = filtered.map(m => {
      const time = m.startTime?.toDate() || new Date();
      const isLive = m.status?.toLowerCase() === 'live';
      const timeStr = isLive ? 'LIVE' : time.toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      const leagueName = m.leagueName || state.leagues.find(l => l.id === m.league)?.name || 'Unknown League';
      const popularity = m.popularity || 50;
      const popularityClass = popularity < 33 ? 'low' : (popularity < 66 ? 'medium' : 'high');
      
      return `
        <div class="match-card" onclick="window.location.href='vote.html?id=${m.id}'">
          <div class="match-teams">
            <div class="team">
              <div class="team-logo">${m.teamALogo ? `<img src="${m.teamALogo}" alt="${m.teamAName}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div>
              <div class="team-info"><span class="team-name">${m.teamAName || 'Team A'}</span><span class="team-odds">${leagueName}</span></div>
            </div>
            <div class="match-vs">VS</div>
            <div class="team">
              <div class="team-info" style="text-align:right;"><span class="team-name">${m.teamBName || 'Team B'}</span><span class="team-odds">${timeStr}</span></div>
              <div class="team-logo">${m.teamBLogo ? `<img src="${m.teamBLogo}" alt="${m.teamBName}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div>
            </div>
          </div>
          <div class="popularity-bar">
            <div class="popularity-option">
              <div class="popularity-label">POPULARITY</div>
              <div class="popularity-fill"><div class="popularity-fill-bar ${popularityClass}" style="width:${popularity}%;"></div></div>
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    checkFiltersActive();
  };

  const loadDebates = async () => {
    const snap = await db.collection('matches').get();
    const debates = [];
    
    for (const d of snap.docs) {
      const m = { id: d.id, ...d.data() };
      const msgs = await db.collection('messages').where('matchId', '==', d.id).orderBy('createdAt', 'desc').limit(4).get();
      if (msgs.size) {
        debates.push({
          match: m,
          messageCount: msgs.size,
          recentMessages: msgs.docs.map(msg => msg.data()).reverse()
        });
      }
    }
    
    debates.sort((a,b) => b.messageCount - a.messageCount);
    
    if (!debates.length) {
      el.dynamicList.innerHTML = '<div class="match-card" style="text-align:center;padding:40px;">No active debates yet.</div>';
      return;
    }
    
    el.dynamicList.innerHTML = debates.slice(0,3).map((d,i) => {
      const m = d.match;
      const emoji = ['🔥','💥','⚡','😱','🤯','🎯'][i % 6];
      return `
        <div class="debate-card" onclick="window.location.href='vote.html?id=${m.id}'">
          <div class="debate-header">
            <span class="iconify" data-icon="mdi:message-text-outline" style="color:#9CE800;font-size:24px;"></span>
            <div class="debate-title">${emoji} FUT/${m.teamAName} vs ${m.teamBName} ${emoji}</div>
          </div>
          <div class="debate-stats">
            <span><span class="iconify" data-icon="mdi:message-outline"></span> ${d.messageCount} messages</span>
            <span><span class="iconify" data-icon="mdi:account-group"></span> ${m.leagueName || 'Unknown League'}</span>
          </div>
          <div class="debate-messages">
            ${d.recentMessages.map(msg => `<div class="message-preview"><strong>User:</strong> ${(msg.content||'').substring(0,40)}${msg.content?.length>40?'...':''}</div>`).join('')}
          </div>
        </div>
      `;
    }).join('');
  };

  const setHomeView = () => {
    el.contextDisplay.innerHTML = 'HOME · SPORTS & LIVE';
    loadAnnouncements();
    el.promoContainer.innerHTML = `
      <div class="promo-banner">
        <h2>🏆 Join Africa's #1 Prediction Brand</h2>
        <div class="promo-features">
          <div class="promo-feature"><span class="iconify" data-icon="mdi:chart-line"></span> Biggest Wins</div>
          <div class="promo-feature"><span class="iconify" data-icon="mdi:gift-outline"></span> 1000% FREE to Vote</div>
          <div class="promo-feature"><span class="iconify" data-icon="mdi:robot-outline"></span> No BOTS Just Humans</div>
          <div class="promo-feature"><span class="iconify" data-icon="mdi:headset"></span> 24/7 Customer Support</div>
        </div>
        <div class="promo-highlight"><div class="promo-badge">FREE</div><div class="promo-text">Free callbacks whenever you need us.</div></div>
      </div>
    `;
    el.filterBar.style.display = 'flex';
    state.currentContext = 'sports';
    el.contextSportsBtn.classList.add('active-context');
    el.contextLiveBtn.classList.remove('active-context');
    clearAllFilters();
    loadMatches();
  };

  const setSportsView = () => {
    el.contextDisplay.innerHTML = 'SPORTS <span>&</span> LIVE';
    el.announcementContainer.innerHTML = el.promoContainer.innerHTML = '';
    el.filterBar.style.display = 'flex';
    clearAllFilters();
    loadMatches();
  };

  // Navigation
  el.contextSportsBtn.addEventListener('click', () => {
    el.contextSportsBtn.classList.add('active-context');
    el.contextLiveBtn.classList.remove('active-context');
    state.currentContext = 'sports';
    updateBreadcrumb(state.currentSport, 'sports');
    clearAllFilters();
    loadMatches();
  });

  el.contextLiveBtn.addEventListener('click', () => {
    el.contextLiveBtn.classList.add('active-context');
    el.contextSportsBtn.classList.remove('active-context');
    state.currentContext = 'live';
    updateBreadcrumb(state.currentSport, 'live');
    clearAllFilters();
    loadMatches();
  });

  el.sportBtns.forEach(b => {
    b.addEventListener('click', function() {
      el.sportBtns.forEach(s => s.classList.remove('active-sport'));
      this.classList.add('active-sport');
      state.currentSport = this.dataset.sport;
      state.selectedLeague = null;
      state.teamSearchTerm = '';
      el.filterSport.value = state.currentSport;
      updateLeaguesTeams();
      populateLeagueFilter();
      updateBreadcrumb(state.currentSport, state.currentContext);
      clearAllFilters();
      state.currentNav === 'debates' ? loadDebates() : loadMatches();
    });
  });

  el.navButtons.forEach(b => {
    b.addEventListener('click', function() {
      el.navButtons.forEach(n => n.classList.remove('active'));
      this.classList.add('active');
      state.currentNav = this.dataset.nav;
      updateBreadcrumb(state.currentSport, state.currentNav);
      
      clearAllFilters();
      
      if (state.currentNav === 'home') setHomeView();
      else if (state.currentNav === 'sports') setSportsView();
      else if (state.currentNav === 'debates') {
        el.contextDisplay.innerHTML = 'TOP <span>DEBATES</span>';
        el.announcementContainer.innerHTML = el.promoContainer.innerHTML = '';
        el.filterBar.style.display = 'none';
        el.cardHint.innerText = 'HOTTEST CONVERSATIONS RIGHT NOW';
        loadDebates();
      } else if (state.currentNav === 'games') {
        window.location.href = 'game.html';
      } else if (state.currentNav === 'live') {
        state.currentContext = 'live';
        el.contextSportsBtn.classList.remove('active-context');
        el.contextLiveBtn.classList.add('active-context');
        setSportsView();
      } else if (state.currentNav === 'popular') {
        el.contextDisplay.innerHTML = 'POPULAR <span>&</span> TRENDING';
        el.announcementContainer.innerHTML = el.promoContainer.innerHTML = '';
        el.filterBar.style.display = 'flex';
        loadMatches();
      }
    });
  });

  // Initialize
  Promise.all([loadAnnouncements(), loadLeaguesAndTeams()]).then(() => {
    updateBreadcrumb('football', 'sports');
    setHomeView();
  });
})();
</script>
</body>
</html>
