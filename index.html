    const db = firebase.firestore();
    
    let currentNav = 'home';
    let currentSport = 'football';
    let currentContext = 'sports';
    let leagues = [];
    let teams = [];
    let matches = [];
    let anonymousId = localStorage.getItem('anonymousId');
    
    if(!anonymousId){
        anonymousId = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('anonymousId', anonymousId);
    }
    
    db.collection('anonymous_users').doc(anonymousId).set({
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastActive: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(()=>{});
    
    const searchInput = document.getElementById('searchInputMobile');
    const dynamicList = document.getElementById('dynamicListMobile');
    const filterSport = document.getElementById('filterSportMobile');
    const filterLeague = document.getElementById('filterLeagueMobile');
    const applyFilterBtn = document.getElementById('applyFilterBtnMobile');
    const sportBtns = document.querySelectorAll('.sport-btn-mobile');
    const contextSportsBtn = document.getElementById('contextSportsBtnMobile');
    const contextLiveBtn = document.getElementById('contextLiveBtnMobile');
    const breadcrumbSport = document.getElementById('breadcrumbSportMobile');
    const breadcrumbMatch = document.getElementById('breadcrumbMatchMobile');
    const cardHint = document.getElementById('cardHintMobile');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.getElementById('overlay');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const menuLeagueList = document.getElementById('menuLeagueList');
    const menuTeamList = document.getElementById('menuTeamList');
    const menuSportBtns = document.querySelectorAll('[data-menu-sport]');
    const navButtons = document.querySelectorAll('.nav-btn-mobile');
    const bottomNavItems = document.querySelectorAll('.nav-item-float');
    const promoBanner = document.getElementById('promoBannerMobile');
    const otherGamesBtn = document.getElementById('otherGamesBtn');
    
    let menuSelectedSport = 'football';
    
    function closeMenuGlobal(){ sideMenu.classList.remove('open'); overlay.classList.remove('show'); }
    function openMenu(){ sideMenu.classList.add('open'); overlay.classList.add('show'); }
    
    if(menuToggleBtn) menuToggleBtn.addEventListener('click', openMenu);
    if(closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenuGlobal);
    if(overlay) overlay.addEventListener('click', closeMenuGlobal);
    
    document.querySelectorAll('[data-menu]').forEach(link => {
        link.addEventListener('click', () => {
            const menuNav = link.dataset.menu;
            const btn = document.querySelector(`[data-nav="${menuNav}"]`);
            if(btn) btn.click();
            closeMenuGlobal();
        });
    });
    
    async function loadLeaguesAndTeams(){
        const leaguesSnap = await db.collection('leagues').get();
        leagues = [];
        leaguesSnap.forEach(doc => leagues.push({ id: doc.id, ...doc.data() }));
        const teamsSnap = await db.collection('teams').where('isActive', '==', true).get();
        teams = [];
        teamsSnap.forEach(doc => teams.push({ id: doc.id, ...doc.data() }));
        populateLeagueFilter();
        renderMenuLeaguesAndTeams();
        await loadMatches();
    }
    
    function filterLeaguesBySport(sport){
        return leagues.filter(l => sport === 'football' ? !l.name?.toLowerCase().includes('basketball') : l.name?.toLowerCase().includes('basketball'));
    }
    
    function renderMenuLeaguesAndTeams(){
        const filteredLeagues = filterLeaguesBySport(menuSelectedSport);
        let leaguesHtml = '';
        filteredLeagues.forEach(league => {
            leaguesHtml += `<div class="league-item-mobile" data-league-id="${league.id}" data-league-name="${league.name.replace(/'/g, "\\'")}">${league.name}</div>`;
        });
        menuLeagueList.innerHTML = leaguesHtml || '<div class="league-item-mobile">No leagues</div>';
        
        document.querySelectorAll('[data-league-id]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const leagueTeams = teams.filter(t => t.leagueId === el.dataset.leagueId || t.leagueName === el.innerText);
                let teamsHtml = '';
                leagueTeams.forEach(t => {
                    teamsHtml += `<div class="team-item-mobile" data-team-id="${t.id}" data-team-name="${t.name.replace(/'/g, "\\'")}">${t.name}</div>`;
                });
                menuTeamList.innerHTML = teamsHtml || '<div class="team-item-mobile">No teams in this league</div>';
                document.querySelectorAll('[data-team-id]').forEach(tm => {
                    tm.addEventListener('click', (e2) => {
                        e2.stopPropagation();
                        window.location.href = `profile.html?id=${tm.dataset.teamId}`;
                    });
                });
                closeMenuGlobal();
            });
        });
    }
    
    menuSportBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            menuSportBtns.forEach(b => b.classList.remove('active-menu-sport'));
            btn.classList.add('active-menu-sport');
            menuSelectedSport = btn.dataset.menuSport;
            renderMenuLeaguesAndTeams();
        });
    });
    
    async function loadMatches(){
        try{
            let query = db.collection('matches');
            if(currentContext === 'live') query = query.where('status', '==', 'live');
            else query = query.where('status', 'in', ['upcoming', 'live']);
            query = query.orderBy('startTime', 'asc');
            const matchesSnap = await query.get();
            matches = [];
            for(const doc of matchesSnap.docs){
                const match = { id: doc.id, ...doc.data() };
                const votesSnap = await db.collection('votes').where('matchId', '==', doc.id).get();
                const total = votesSnap.size;
                const teamA = votesSnap.docs.filter(v => v.data().voteType === 'team1').length;
                const draw = votesSnap.docs.filter(v => v.data().voteType === 'draw').length;
                const teamB = votesSnap.docs.filter(v => v.data().voteType === 'team2').length;
                let pA = 33, pD = 34, pB = 33;
                if(total > 0){
                    pA = Math.round((teamA / total) * 100);
                    pD = Math.round((draw / total) * 100);
                    pB = Math.round((teamB / total) * 100);
                }
                match.percentages = { team1: pA, draw: pD, team2: pB };
                matches.push(match);
            }
            renderList();
        } catch(e){ console.error(e); }
    }
    
    function getProgressColorClass(percent){
        if(percent < 40) return 'low';
        if(percent < 70) return 'medium';
        return 'best';
    }
    
    function redirectToVote(matchId){
        window.location.href = `vote.html?id=${matchId}`;
    }
    
    function renderList(){
        let sportFilterVal = filterSport.value;
        let leagueFilterVal = filterLeague.value;
        let searchTerm = searchInput.value.toLowerCase().trim();
        
        let filtered = matches.filter(m => {
            const leagueObj = leagues.find(l => l.id === m.league);
            if(sportFilterVal !== 'all'){
                const isFootball = !leagueObj?.name?.toLowerCase().includes('basketball');
                if(sportFilterVal === 'football' && !isFootball) return false;
                if(sportFilterVal === 'basketball' && isFootball) return false;
            }
            if(leagueFilterVal !== 'all' && m.league !== leagueFilterVal) return false;
            if(searchTerm){
                const matchStr = `${m.teamAName} ${m.teamBName}`.toLowerCase();
                const teamMatches = teams.some(t => t.name?.toLowerCase().includes(searchTerm));
                if(!matchStr.includes(searchTerm) && !teamMatches) return false;
            }
            return true;
        });
        
        filtered.sort((a,b) => (a.isTopMatch && !b.isTopMatch) ? -1 : (!a.isTopMatch && b.isTopMatch) ? 1 : 0);
        
        let html = '';
        if(filtered.length === 0){
            html = '<div style="text-align:center;padding:40px;color:#999;">No matches found</div>';
        } else {
            filtered.forEach(m => {
                const leagueName = leagues.find(l => l.id === m.league)?.name || 'Unknown';
                const maxPercent = Math.max(m.percentages.team1, m.percentages.draw, m.percentages.team2);
                const colorClass = getProgressColorClass(maxPercent);
                const timeStr = m.status === 'live' ? 'LIVE' : (m.startTime?.toDate().toLocaleString('en-US', { weekday: 'short', hour: '2-digit', minute:'2-digit' }) || 'TBD');
                
                html += `<div class="match-card-mobile" data-match-id="${m.id}">
                    <div class="match-teams-mobile">
                        <div class="team-mobile">
                            <div class="team-logo-mobile">${m.teamALogo ? `<img src="${m.teamALogo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div>
                            <div class="team-info-mobile"><span class="team-name-mobile">${m.teamAName}</span><span class="team-odds-mobile">${leagueName}</span></div>
                        </div>
                        <div class="match-vs-mobile">VS</div>
                        <div class="team-mobile">
                            <div class="team-info-mobile" style="text-align:right;"><span class="team-name-mobile">${m.teamBName}</span><span class="team-odds-mobile">${timeStr}</span></div>
                            <div class="team-logo-mobile">${m.teamBLogo ? `<img src="${m.teamBLogo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-label">🔵 COMMUNITY CONFIDENCE (${maxPercent}%)</div>
                        <div class="progress-bar-bg"><div class="progress-fill ${colorClass}" style="width:${maxPercent}%;"></div></div>
                        <div class="vote-hint">tap card to vote</div>
                    </div>
                </div>`;
            });
        }
        dynamicList.innerHTML = html;
        
        document.querySelectorAll('.match-card-mobile').forEach(card => {
            card.addEventListener('click', () => {
                const matchId = card.dataset.matchId;
                redirectToVote(matchId);
            });
        });
    }
    
    function populateLeagueFilter(){
        filterLeague.innerHTML = '<option value="all">All Leagues</option>';
        leagues.forEach(l => { filterLeague.innerHTML += `<option value="${l.id}">${l.name}</option>`; });
    }
    
    function updateBreadcrumb(){
        breadcrumbSport.textContent = currentSport === 'football' ? 'Football' : 'Basketball';
        breadcrumbMatch.textContent = currentContext === 'sports' ? 'Upcoming' : 'Live Now';
    }
    
    if(contextSportsBtn && contextLiveBtn){
        contextSportsBtn.addEventListener('click', () => {
            contextSportsBtn.classList.add('active-context');
            contextLiveBtn.classList.remove('active-context');
            currentContext = 'sports';
            updateBreadcrumb();
            loadMatches();
        });
        contextLiveBtn.addEventListener('click', () => {
            contextLiveBtn.classList.add('active-context');
            contextSportsBtn.classList.remove('active-context');
            currentContext = 'live';
            updateBreadcrumb();
            loadMatches();
        });
    }
    
    if(applyFilterBtn) applyFilterBtn.addEventListener('click', renderList);
    if(searchInput) searchInput.addEventListener('input', renderList);
    if(otherGamesBtn) otherGamesBtn.addEventListener('click', () => { window.location.href = 'other-games.html'; });
    
    navButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            navButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentNav = btn.dataset.nav;
            if(currentNav === 'debates'){
                window.location.href = 'debate.html';
                return;
            }
            if(promoBanner){
                if(currentNav === 'sports' || currentNav === 'live') promoBanner.style.display = 'none';
                else promoBanner.style.display = 'block';
            }
            if(currentNav === 'popular') loadMatches();
            else loadMatches();
        });
    });
    
    bottomNavItems.forEach(item => {
        item.addEventListener('click', () => {
            bottomNavItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const nav = item.dataset.navBottom;
            if(nav === 'menu') openMenu();
            else if(nav === 'account') window.location.href = 'account.html';
            else if(nav === 'sports') document.querySelector('[data-nav="sports"]')?.click();
            else if(nav === 'debate') window.location.href = 'debate.html';
        });
    });
    
    loadLeaguesAndTeams();
    updateBreadcrumb();
})();
</script>
</body>
</html>
