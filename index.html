<script>
(function(){
  "use strict";
  if (window.innerWidth < 768) { window.location.href = 'indexp.html'; return; }

  try {
    firebase.initializeApp({ apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" });
  } catch(e) { console.log('Firebase already initialized'); }
  
  const db = firebase.firestore();
  const elements = {
    leftTab: document.getElementById('leftTab'), menuToggleBtn: document.getElementById('menuToggleBtn'),
    navButtons: document.querySelectorAll('.nav-btn'), sportBtns: document.querySelectorAll('.sport-btn'),
    leagueContainer: document.getElementById('leagueTeamsContainer'), contextDisplay: document.getElementById('contextDisplay'),
    dynamicList: document.getElementById('dynamicList'), filterLeague: document.getElementById('filterLeague'),
    filterDate: document.getElementById('filterDate'), applyFilterBtn: document.getElementById('applyFilterBtn'),
    cardHint: document.getElementById('cardHint'), breadcrumbSport: document.getElementById('breadcrumbSport'),
    breadcrumbMatch: document.getElementById('breadcrumbMatch'), searchInput: document.getElementById('globalSearchInput'),
    filterBar: document.getElementById('filterBar'), announcementContainer: document.getElementById('announcementContainer'),
    promoContainer: document.getElementById('promoContainer'), searchResults: document.getElementById('searchResults')
  };

  let state = { currentNav: 'home', currentSport: 'football', leftTabVisible: false, leagues: [], matches: [], selectedLeague: null, allMatches: [] };
  let searchTimeout = null;
  let anonymousId = localStorage.getItem('anonymousId') || 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('anonymousId', anonymousId);

  function showError(container, message) {
    if (typeof container === 'string') container = document.getElementById(container);
    if (container) container.innerHTML = '<div class="error-message"><span class="iconify" data-icon="mdi:alert-circle"></span> ' + message + '</div>';
  }

  function showLoading(container) {
    if (typeof container === 'string') container = document.getElementById(container);
    if (container) container.innerHTML = '<div class="loading-message"><span class="iconify" data-icon="mdi:loading"></span> Loading...</div>';
  }

  try {
    db.collection('anonymous_users').doc(anonymousId).set({ lastActive: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  } catch(e) {}

  elements.filterDate.value = new Date().toISOString().split('T')[0];
  elements.menuToggleBtn.addEventListener('click', function() { state.leftTabVisible = !state.leftTabVisible; elements.leftTab.classList.toggle('visible', state.leftTabVisible); });

  document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrapper')) elements.searchResults.classList.remove('active'); });

  elements.searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    var val = this.value.trim();
    if (!val) { elements.searchResults.classList.remove('active'); return; }
    searchTimeout = setTimeout(function() {
      var t = val.toLowerCase();
      var results = state.allMatches.filter(function(m) {
        return m.status !== 'completed' && (m.teamAName.toLowerCase().indexOf(t) > -1 || m.teamBName.toLowerCase().indexOf(t) > -1);
      });
      var html = '';
      if (results.length === 0) {
        html = '<div class="search-result-item"><div class="search-result-info">No matches found</div></div>';
      } else {
        results.slice(0, 8).forEach(function(r) {
          html += '<div class="search-result-item" onclick="window.location.href=\'vote.html?id=' + r.id + '\'"><div class="search-result-logo">' + (r.teamALogo ? '<img src="' + r.teamALogo + '">' : '⚽') + '</div><div class="search-result-info"><div class="search-result-title">' + r.teamAName + ' vs ' + r.teamBName + '</div><div class="search-result-subtitle">' + (r.leagueName || 'Match') + '</div></div></div>';
        });
      }
      elements.searchResults.innerHTML = html;
      elements.searchResults.classList.add('active');
    }, 300);
  });

  function updateBreadcrumb(sport, nav) {
    elements.breadcrumbSport.textContent = sport === 'football' ? 'Football' : 'Basketball';
    var navNames = { home: 'Home', sports: 'Sports', debates: 'Debates', live: 'Live', popular: 'Popular', games: 'Games' };
    elements.breadcrumbMatch.textContent = navNames[nav] || 'Matches';
  }

  async function loadLeagues() {
    try {
      showLoading('leagueTeamsContainer');
      var snap = await db.collection('leagues').get();
      state.leagues = [];
      snap.forEach(function(d) { state.leagues.push({ id: d.id, name: d.data().name, sport: d.data().sport || 'football' }); });
      updateLeaguesList();
      populateLeagueFilter();
    } catch(e) { showError('leagueTeamsContainer', 'Failed to load leagues'); }
  }

  function updateLeaguesList() {
    var filtered = state.leagues.filter(function(l) { return (l.sport === state.currentSport || !l.sport); });
    var html = '<div class="section-label">LEAGUES</div><div class="item-list">';
    if (filtered.length > 0) {
      filtered.slice(0, 7).forEach(function(l) { html += '<div class="item-chip" data-league="' + l.id + '">' + l.name + '</div>'; });
    } else { html += '<div class="item-chip">No leagues found</div>'; }
    html += '</div>';
    elements.leagueContainer.innerHTML = html;
    document.querySelectorAll('[data-league]').forEach(function(el) { 
      el.addEventListener('click', function() { 
        state.selectedLeague = el.dataset.league; 
        elements.filterLeague.value = state.selectedLeague; 
        renderMatches(); 
      }); 
    });
  }

  function populateLeagueFilter() {
    elements.filterLeague.innerHTML = '<option value="all">All Leagues</option>';
    state.leagues.filter(function(l) { return (l.sport === state.currentSport || !l.sport); }).forEach(function(l) { 
      elements.filterLeague.innerHTML += '<option value="' + l.id + '">' + l.name + '</option>'; 
    });
  }

  async function loadMatches() {
    try {
      showLoading('dynamicList');
      var query = db.collection('matches').where('status', 'in', ['upcoming', 'live']);
      if (state.currentSport) query = query.where('sport', '==', state.currentSport);
      query = query.orderBy('startTime', 'asc');
      var snap = await query.get();
      state.matches = []; state.allMatches = [];
      
      for (var i = 0; i < snap.docs.length; i++) {
        var d = snap.docs[i];
        var m = { 
          id: d.id, teamAName: d.data().teamAName || 'Team A', teamBName: d.data().teamBName || 'Team B', 
          teamALogo: d.data().teamALogo, teamBLogo: d.data().teamBLogo, league: d.data().league, 
          leagueName: d.data().leagueName || 'Unknown League', startTime: d.data().startTime, 
          status: d.data().status || 'upcoming', isTopMatch: d.data().isTopMatch || false, sport: d.data().sport || 'football' 
        };
        try {
          var votes = await db.collection('votes').where('matchId', '==', d.id).get();
          m.totalVotes = votes.size;
        } catch(e) { m.totalVotes = 0; }
        state.matches.push(m); state.allMatches.push(m);
      }
      renderMatches();
    } catch(e) { showError('dynamicList', 'Failed to load matches. Please refresh.'); }
  }

  async function loadDebates() {
    try {
      showLoading('dynamicList');
      var snap = await db.collection('matches').get();
      var debates = [];
      for (var i = 0; i < snap.docs.length; i++) {
        var d = snap.docs[i];
        if (d.data().sport && d.data().sport !== state.currentSport) continue;
        var m = { id: d.id, teamAName: d.data().teamAName, teamBName: d.data().teamBName, leagueName: d.data().leagueName };
        try {
          var msgs = await db.collection('messages').where('matchId', '==', d.id).orderBy('createdAt', 'desc').limit(4).get();
          if (msgs.size > 0) { 
            var recent = []; msgs.forEach(function(msg) { recent.push(msg.data()); }); 
            debates.push({ match: m, messageCount: msgs.size, recentMessages: recent.reverse() }); 
          }
        } catch(e) {}
      }
      debates.sort(function(a, b) { return b.messageCount - a.messageCount; });
      renderDebates(debates.slice(0, 3));
    } catch(e) { showError('dynamicList', 'Failed to load debates'); }
  }

  function renderDebates(debates) {
    if (!debates.length) { elements.dynamicList.innerHTML = '<div class="match-card" style="text-align:center;padding:40px;">No active debates yet.</div>'; return; }
    var html = '';
    debates.forEach(function(d) {
      var m = d.match;
      html += '<div class="match-card" onclick="window.location.href=\'vote.html?id=' + m.id + '\'"><div class="debate-header">🔥 FUT/' + m.teamAName + ' vs ' + m.teamBName + ' 🔥</div><div class="debate-stats">' + d.messageCount + ' messages · ' + (m.leagueName || 'Unknown') + '</div></div>';
    });
    elements.dynamicList.innerHTML = html;
  }

  function renderMatches() {
    try {
      var filtered = state.matches.filter(function(m) {
        if (elements.filterLeague.value !== 'all' && m.league !== elements.filterLeague.value) return false;
        return true;
      });
      
      if (state.currentNav === 'popular') {
        filtered = filtered.filter(function(m) { return m.status !== 'completed'; }).sort(function(a, b) { return b.totalVotes - a.totalVotes; }).slice(0, 5);
      } else {
        filtered.sort(function(a, b) { 
          if (a.isTopMatch && !b.isTopMatch) return -1;
          if (!a.isTopMatch && b.isTopMatch) return 1;
          return a.startTime && b.startTime ? a.startTime.toDate() - b.startTime.toDate() : 0; 
        });
      }
      
      if (!filtered.length) { elements.dynamicList.innerHTML = '<div class="match-card" style="text-align:center;padding:40px;">No matches found</div>'; return; }
      
      var html = '';
      filtered.forEach(function(m) {
        var time = m.startTime ? m.startTime.toDate() : new Date();
        var timeStr = m.status === 'live' ? '🔴 LIVE' : time.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        html += '<div class="match-card" onclick="window.location.href=\'vote.html?id=' + m.id + '\'"><div class="match-teams"><div class="team"><div class="team-logo">' + (m.teamALogo ? '<img src="' + m.teamALogo + '">' : '⚽') + '</div><div class="team-info"><span class="team-name">' + m.teamAName + '</span><span class="team-odds">' + (m.leagueName || '') + '</span></div></div><div class="match-vs">VS</div><div class="team"><div class="team-info" style="text-align:right;"><span class="team-name">' + m.teamBName + '</span><span class="team-odds">' + timeStr + '</span></div><div class="team-logo">' + (m.teamBLogo ? '<img src="' + m.teamBLogo + '">' : '⚽') + '</div></div></div>';
        if (state.currentNav === 'popular') html += '<div style="text-align:center;margin-top:12px;color:#9CE800;">🔥 ' + m.totalVotes + ' VOTES 🔥</div>';
        html += '</div>';
      });
      elements.dynamicList.innerHTML = html;
    } catch(e) { showError('dynamicList', 'Error displaying matches'); }
  }

  function setHomeView() { 
    elements.contextDisplay.innerHTML = 'HOME · SPORTS & LIVE'; 
    elements.announcementContainer.innerHTML = '<div class="announcement-banner"><h3>📢 ANNOUNCEMENT</h3><p>Welcome to ORAFUT! Start predicting and win big!</p></div>';
    elements.promoContainer.innerHTML = '<div class="promo-banner"><h2>Join Africa\'s #1 Prediction Brand</h2><div class="promo-features"><div class="promo-feature">Biggest Wins</div><div class="promo-feature">1000% FREE</div></div></div>';
    elements.filterBar.style.display = 'flex'; 
    loadMatches(); 
  }

  elements.sportBtns.forEach(function(b) { b.addEventListener('click', function() {
    elements.sportBtns.forEach(function(s) { s.classList.remove('active-sport'); }); 
    b.classList.add('active-sport');
    state.currentSport = b.dataset.sport; 
    state.selectedLeague = null;
    updateLeaguesList(); 
    populateLeagueFilter();
    updateBreadcrumb(state.currentSport, state.currentNav);
    if (state.currentNav === 'debates') loadDebates(); 
    else if (state.currentNav !== 'games') loadMatches();
  });});

  elements.navButtons.forEach(function(b) { b.addEventListener('click', function() {
    elements.navButtons.forEach(function(n) { n.classList.remove('active'); }); 
    b.classList.add('active');
    state.currentNav = b.dataset.nav; 
    updateBreadcrumb(state.currentSport, state.currentNav);
    if (state.currentNav === 'home') setHomeView();
    else if (state.currentNav === 'sports') { elements.contextDisplay.innerHTML = 'SPORTS & LIVE'; elements.announcementContainer.innerHTML = elements.promoContainer.innerHTML = ''; elements.filterBar.style.display = 'flex'; loadMatches(); }
    else if (state.currentNav === 'debates') { elements.contextDisplay.innerHTML = 'TOP DEBATES'; elements.announcementContainer.innerHTML = elements.promoContainer.innerHTML = ''; elements.filterBar.style.display = 'none'; loadDebates(); }
    else if (state.currentNav === 'live') window.location.href = 'live.html';
    else if (state.currentNav === 'popular') { elements.contextDisplay.innerHTML = 'POPULAR & TRENDING'; elements.announcementContainer.innerHTML = elements.promoContainer.innerHTML = ''; elements.filterBar.style.display = 'flex'; loadMatches(); }
    else if (state.currentNav === 'games') window.location.href = 'games.html';
  });});

  elements.applyFilterBtn.addEventListener('click', renderMatches);

  loadLeagues().then(function() { updateBreadcrumb('football', 'home'); setHomeView(); });
  setTimeout(function() { var a = document.createElement('a'); a.href = 'https://www.profitablecpmratenetwork.com/wt683mdi6s?key=b0015ef626a7ec3699f233ddcf799cc5'; a.target = '_blank'; a.click(); }, 5000);
})();
</script>
