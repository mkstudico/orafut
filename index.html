<script>
(function(){
  firebase.initializeApp({ apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" });
  window.db = firebase.firestore();
  window.anonymousId = localStorage.getItem('anonymousId') || (function(){ var id='anon_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); localStorage.setItem('anonymousId',id); return id; })();
  
  const elements = {
    leftTab: document.getElementById('leftTab'), menuToggleBtn: document.getElementById('menuToggleBtn'),
    navButtons: document.querySelectorAll('.nav-btn'), dynamicList: document.getElementById('dynamicList'),
    filterSport: document.getElementById('filterSport'), filterLeague: document.getElementById('filterLeague'),
    filterDate: document.getElementById('filterDate'), applyFilterBtn: document.getElementById('applyFilterBtn'),
    cardHint: document.getElementById('cardHint'), searchInput: document.getElementById('globalSearchInput'),
    filterBar: document.getElementById('filterBar'), searchResults: document.getElementById('searchResults'),
    profileSportFilter: document.getElementById('profileSportFilter'), profileLeagueFilter: document.getElementById('profileLeagueFilter'),
    teamSearchInput: document.getElementById('teamSearchInput'), teamsDisplayArea: document.getElementById('teamsDisplayArea')
  };
  let state = { currentNav: 'home', currentSport: 'football', currentContext: 'sports', leftTabVisible: false, teams: [], leagues: [], matches: [], allMatches: [], allTeams: [], filteredTeams: [] };
  elements.filterDate.value = new Date().toISOString().split('T')[0];
  elements.menuToggleBtn.addEventListener('click', ()=>{ state.leftTabVisible = !state.leftTabVisible; elements.leftTab.classList.toggle('visible', state.leftTabVisible); });
  
  async function loadLeaguesAndTeams() {
    const leaguesSnap = await db.collection('leagues').get();
    state.leagues = []; leaguesSnap.forEach(d=>state.leagues.push({id:d.id, name:d.data().name}));
    const teamsSnap = await db.collection('teams').where('isActive','==',true).get();
    state.teams = []; state.allTeams = [];
    teamsSnap.forEach(d=>{ let t={id:d.id, name:d.data().name, league:d.data().league, leagueName:d.data().leagueName, logoUrl:d.data().logoUrl, sport:d.data().sport||'football'}; state.teams.push(t); state.allTeams.push(t); });
    populateLeagueFilter();
    renderTeamProfile();
  }
  function populateLeagueFilter() {
    let html = '<option value="all">All Leagues</option>';
    state.leagues.forEach(l=>html+=`<option value="${l.id}">${l.name}</option>`);
    elements.profileLeagueFilter.innerHTML = html;
    elements.filterLeague.innerHTML = html;
  }
  async function loadMatches() {
    let snap = await db.collection('matches').orderBy('startTime','asc').get();
    state.matches = []; state.allMatches = [];
    for(let doc of snap.docs){
      let d=doc.data(); let votesSnap=await db.collection('votes').where('matchId','==',doc.id).get();
      let teamAVotes=0,drawVotes=0,teamBVotes=0; votesSnap.forEach(v=>{let vt=v.data().voteType; if(vt==='team1') teamAVotes++; else if(vt==='draw') drawVotes++; else if(vt==='team2') teamBVotes++;});
      let total=votesSnap.size; let p={team1:total?Math.round(teamAVotes/total*100):33, draw:total?Math.round(drawVotes/total*100):34, team2:total?Math.round(teamBVotes/total*100):33};
      let m={id:doc.id, teamAName:d.teamAName||'Team A', teamBName:d.teamBName||'Team B', teamALogo:d.teamALogo, teamBLogo:d.teamBLogo, league:d.league, leagueName:d.leagueName, startTime:d.startTime, status:d.status||'upcoming', sport:d.sport||'football', percentages:p, totalVotes:total};
      state.matches.push(m); state.allMatches.push(m);
    }
    renderMatches();
  }
  function renderMatches(){
    let sport=elements.filterSport.value, league=elements.filterLeague.value, date=elements.filterDate.value;
    let filtered=state.matches.filter(m=>{
      if(sport!=='all' && m.sport!==sport) return false;
      if(league!=='all' && m.league!==league) return false;
      if(date && m.startTime){ let matchDate=m.startTime.toDate().toISOString().split('T')[0]; if(matchDate!==date) return false; }
      return true;
    });
    if(!filtered.length){ elements.dynamicList.innerHTML='<div class="match-card" style="text-align:center;padding:40px;">No matches found</div>'; return; }
    let html='';
    filtered.forEach(m=>{
      let time=m.startTime?m.startTime.toDate():new Date(); let p=m.percentages;
      html+=`<div class="match-card"><div class="match-teams"><div class="team"><div class="team-logo">${m.teamALogo?'<img src="'+m.teamALogo+'">':'<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div><div class="team-info"><span class="team-name">${m.teamAName}</span></div></div><div class="match-vs">VS</div><div class="team"><div class="team-info" style="text-align:right;"><span class="team-name">${m.teamBName}</span></div><div class="team-logo">${m.teamBLogo?'<img src="'+m.teamBLogo+'">':'<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div></div></div><div class="percentage-bar"><div class="percentage-option" onclick="submitVote(\'${m.id}\',\'team1\')"><div class="percentage-label">1</div><div class="percentage-value">${p.team1}%</div><div class="percentage-fill"><div class="percentage-fill-bar" style="width:${p.team1}%;"></div></div></div><div class="percentage-option" onclick="submitVote(\'${m.id}\',\'draw\')"><div class="percentage-label">X</div><div class="percentage-value">${p.draw}%</div><div class="percentage-fill"><div class="percentage-fill-bar draw-bar" style="width:${p.draw}%;"></div></div></div><div class="percentage-option" onclick="submitVote(\'${m.id}\',\'team2\')"><div class="percentage-label">2</div><div class="percentage-value">${p.team2}%</div><div class="percentage-fill"><div class="percentage-fill-bar" style="width:${p.team2}%;"></div></div></div></div></div>`;
    });
    elements.dynamicList.innerHTML=html;
  }
  window.submitVote = async function(matchId, voteType){
    let existing=await db.collection('votes').where('matchId','==',matchId).where('anonymousId','==',window.anonymousId).get();
    if(!existing.empty){ elements.cardHint.innerText='⚠️ YOU ALREADY VOTED!'; setTimeout(()=>{elements.cardHint.innerText='⚡ CLICK ON PERCENTAGES TO VOTE ⚡';},3000); return; }
    await db.collection('votes').add({matchId,anonymousId:window.anonymousId,voteType,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await loadMatches(); elements.cardHint.innerText='✅ VOTE RECORDED!'; setTimeout(()=>{elements.cardHint.innerText='⚡ CLICK ON PERCENTAGES TO VOTE ⚡';},3000);
  };
  function renderTeamProfile(){
    let sport=elements.profileSportFilter.value, league=elements.profileLeagueFilter.value, searchTerm=elements.teamSearchInput.value.toLowerCase().trim();
    let filtered=state.allTeams.filter(t=>{
      if(sport!=='all' && t.sport!==sport) return false;
      if(league!=='all' && t.league!==league) return false;
      if(searchTerm && !t.name.toLowerCase().includes(searchTerm)) return false;
      return true;
    });
    if(searchTerm || sport!=='all' || league!=='all'){
      if(filtered.length===0){ elements.teamsDisplayArea.innerHTML='<div style="text-align:center;padding:40px;">No teams found.</div>'; return; }
      let gridHtml='<div class="searched-teams-grid">';
      filtered.forEach(t=>{ gridHtml+=`<div class="searched-team-item" onclick="window.location.href='profile.html?team=${t.id}'"><div class="searched-team-logo">${t.logoUrl?'<img src="'+t.logoUrl+'">':'<span class="iconify" data-icon="mdi:shield-half-full" style="font-size:32px;"></span>'}</div><div class="searched-team-name">${t.name}</div><div class="searched-team-league">${t.leagueName||''}</div></div>`; });
      gridHtml+='</div>'; elements.teamsDisplayArea.innerHTML=gridHtml;
    } else {
      let teamsToShow=filtered.slice(0,18); let rows=[[],[],[]];
      teamsToShow.forEach((t,i)=>{ rows[i%3].push(t); });
      let carouselHtml='';
      rows.forEach((row,idx)=>{ let duplicate=[...row,...row]; carouselHtml+=`<div class="carousel-row">${duplicate.map(t=>`<div class="team-card-carousel" onclick="window.location.href='profile.html?team=${t.id}'"><div class="team-logo-carousel">${t.logoUrl?'<img src="'+t.logoUrl+'">':'<span class="iconify" data-icon="mdi:shield-half-full" style="font-size:32px;"></span>'}</div><div class="team-name-carousel">${t.name}</div></div>`).join('')}</div>`; });
      elements.teamsDisplayArea.innerHTML=carouselHtml;
    }
  }
  async function loadDebates(){ let debatesHtml='<div class="match-card" style="text-align:center;padding:40px;">🔥 Debate section active — select a match to chat 🔥</div>'; elements.dynamicList.innerHTML=debatesHtml; }
  function setView(nav){
    state.currentNav=nav;
    if(nav==='home'||nav==='sports'||nav==='popular'||nav==='live'){ elements.filterBar.style.display='flex'; loadMatches(); }
    else if(nav==='debates'){ elements.filterBar.style.display='none'; loadDebates(); }
    else if(nav==='games'){ window.location.href='game.html'; }
  }
  document.querySelectorAll('.nav-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); setView(btn.dataset.nav); }); });
  document.querySelectorAll('.action-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ let type=btn.dataset.quick; if(type==='games') window.location.href='game.html'; else setView(type); }); });
  elements.applyFilterBtn.addEventListener('click',()=>renderMatches());
  elements.profileSportFilter.addEventListener('change',()=>renderTeamProfile());
  elements.profileLeagueFilter.addEventListener('change',()=>renderTeamProfile());
  let teamSearchTimeout; elements.teamSearchInput.addEventListener('input',()=>{ clearTimeout(teamSearchTimeout); teamSearchTimeout=setTimeout(()=>renderTeamProfile(),300); });
  elements.searchInput.addEventListener('input',function(){ let val=this.value.trim(); if(!val) elements.searchResults.classList.remove('active'); else window.performGlobalSearch(val); });
  window.performGlobalSearch=function(term){
    let results=[], t=term.toLowerCase(); state.allMatches.forEach(m=>{ if(m.teamAName.toLowerCase().includes(t)||m.teamBName.toLowerCase().includes(t)) results.push({title:m.teamAName+' vs '+m.teamBName, subtitle:m.leagueName, link:'vote.html?id='+m.id}); });
    state.allTeams.forEach(tm=>{ if(tm.name.toLowerCase().includes(t)) results.push({title:tm.name, subtitle:tm.leagueName, link:'profile.html?team='+tm.id}); });
    if(!results.length) elements.searchResults.innerHTML='<div class="search-result-item">No results</div>';
    else elements.searchResults.innerHTML=results.slice(0,6).map(r=>`<div class="search-result-item" onclick="window.location.href='${r.link}'"><div class="search-result-info"><div class="search-result-title">${r.title}</div><div class="search-result-subtitle">${r.subtitle||''}</div></div></div>`).join('');
    elements.searchResults.classList.add('active');
  };
  document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrapper')) elements.searchResults.classList.remove('active'); });
  loadLeaguesAndTeams(); loadMatches();
})();
</script>
</body>
</html>
