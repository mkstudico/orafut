  const elements = {
    leftTab: document.getElementById('leftTab'), menuToggleBtn: document.getElementById('menuToggleBtn'),
    navButtons: document.querySelectorAll('.nav-btn'), sportBtns: document.querySelectorAll('.sport-btn'),
    leagueContainer: document.getElementById('leagueTeamsContainer'), contextDisplay: document.getElementById('contextDisplay'),
    contextSportsBtn: document.getElementById('contextSportsBtn'), contextLiveBtn: document.getElementById('contextLiveBtn'),
    dynamicList: document.getElementById('dynamicList'), filterSport: document.getElementById('filterSport'),
    filterLeague: document.getElementById('filterLeague'), filterDate: document.getElementById('filterDate'),
    applyFilterBtn: document.getElementById('applyFilterBtn'), cardHint: document.getElementById('cardHint'),
    breadcrumbSport: document.getElementById('breadcrumbSport'), breadcrumbMatch: document.getElementById('breadcrumbMatch'),
    searchInput: document.getElementById('globalSearchInput'), filterBar: document.getElementById('filterBar'),
    announcementContainer: document.getElementById('announcementContainer'), promoContainer: document.getElementById('promoContainer'),
    searchResults: document.getElementById('searchResults')
  };

  let state = { currentNav: 'home', currentSport: 'football', currentContext: 'sports', leftTabVisible: false, teams: [], leagues: [], matches: [], selectedLeague: null, teamSearchTerm: '', announcements: [], allMatches: [], allTeams: [] };
  let searchTimeout = null;
  let anonymousId = localStorage.getItem('anonymousId') || (function() { var id = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('anonymousId', id); return id; })();

  db.collection('anonymous_users').doc(anonymousId).set({ lastActive: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(function(){});
  elements.filterDate.value = new Date().toISOString().split('T')[0];

  elements.menuToggleBtn.addEventListener('click', function() { state.leftTabVisible = !state.leftTabVisible; elements.leftTab.classList.toggle('visible', state.leftTabVisible); });
  document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrapper')) elements.searchResults.classList.remove('active'); });

  elements.searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    var val = this.value.trim();
    if (!val) { elements.searchResults.classList.remove('active'); return; }
    searchTimeout = setTimeout(function() { performGlobalSearch(val); }, 300);
  });

  function performGlobalSearch(term) {
    var results = [], t = term.toLowerCase();
    state.allMatches.filter(function(m) { return m.status !== 'completed'; }).forEach(function(m) {
      if (m.teamAName.toLowerCase().indexOf(t) > -1 || m.teamBName.toLowerCase().indexOf(t) > -1 || (m.leagueName && m.leagueName.toLowerCase().indexOf(t) > -1)) {
        results.push({ type: 'match', id: m.id, title: m.teamAName + ' vs ' + m.teamBName, subtitle: m.leagueName || 'Match', logo: m.teamALogo, link: 'vote.html?id=' + m.id });
      }
    });
    state.allTeams.forEach(function(tm) {
      if (tm.name.toLowerCase().indexOf(t) > -1 || (tm.leagueName && tm.leagueName.toLowerCase().indexOf(t) > -1)) {
        results.push({ type: 'team', id: tm.id, title: tm.name, subtitle: tm.leagueName || 'Team', logo: tm.logoUrl, link: 'profile.html?team=' + tm.id });
      }
    });
    if (results.length === 0) {
      elements.searchResults.innerHTML = '<div class="search-result-item" style="cursor:default;"><div class="search-result-info"><div class="search-result-title">No results found</div></div></div>';
    } else {
      var html = '';
      results.slice(0, 8).forEach(function(r) {
        html += '<div class="search-result-item" onclick="window.location.href=\'' + r.link + '\'"><div class="search-result-logo">' + (r.logo ? '<img src="' + r.logo + '">' : '<span class="iconify" data-icon="mdi:shield-half-full"></span>') + '</div><div class="search-result-info"><div class="search-result-title">' + r.title + '</div><div class="search-result-subtitle">' + r.subtitle + '</div></div><div class="search-result-type">' + r.type + '</div></div>';
      });
      elements.searchResults.innerHTML = html;
    }
    elements.searchResults.classList.add('active');
  }

  function updateBreadcrumb(sport, context) {
    elements.breadcrumbSport.textContent = sport === 'football' ? 'Football' : 'Basketball';
    elements.breadcrumbMatch.textContent = context === 'sports' ? 'Upcoming' : 'Live Now';
  }

  async function loadAnnouncements() {
    try {
      var snap = await db.collection('announcements').where('active', '==', true).orderBy('createdAt', 'desc').limit(1).get();
      if (!snap.empty) { var d = snap.docs[0].data(); state.announcements = [{ title: d.title, content: d.content }]; }
      else { state.announcements = [{ title: 'WELCOME', content: 'Start predicting and win big! New matches added daily!' }]; }
      updateAnnouncement();
    } catch(e) { state.announcements = [{ title: 'WELCOME', content: 'Start predicting and win big!' }]; updateAnnouncement(); }
  }

  function updateAnnouncement() {
    if (state.currentNav === 'home' && state.announcements.length > 0) {
      var a = state.announcements[0];
      elements.announcementContainer.innerHTML = '<div class="announcement-banner"><h3><span class="iconify" data-icon="mdi:bullhorn"></span> ' + a.title + '</h3><p>' + a.content + '</p></div>';
    } else { elements.announcementContainer.innerHTML = ''; }
  }

  async function loadLeaguesAndTeams() {
    var leaguesSnap = await db.collection('leagues').get();
    state.leagues = []; leaguesSnap.forEach(function(d) { state.leagues.push({ id: d.id, name: d.data().name, logoUrl: d.data().logoUrl }); });
    var teamsSnap = await db.collection('teams').where('isActive', '==', true).get();
    state.teams = []; state.allTeams = [];
    teamsSnap.forEach(function(d) { var t = { id: d.id, name: d.data().name, league: d.data().league, leagueName: d.data().leagueName, logoUrl: d.data().logoUrl }; state.teams.push(t); state.allTeams.push(t); });
    updateLeaguesTeams(); populateLeagueFilter();
  }

  function updateLeaguesTeams() {
    var filteredLeagues = state.leagues;
    var html = '<div class="section-label"><span class="iconify" data-icon="mdi:trophy-outline"></span> LEAGUES</div><div class="sub-section"><div class="item-list">';
    filteredLeagues.slice(0, 7).forEach(function(l) { html += '<div class="item-chip" data-league="' + l.id + '"><span class="iconify" data-icon="mdi:chevron-right"></span>' + l.name + '</div>'; });
    html += '</div></div><div class="section-label" style="margin-top:20px;"><span class="iconify" data-icon="mdi:account-group-outline"></span> TEAMS</div><div class="sub-section"><div class="team-search-box"><input type="text" id="teamSearchInput" placeholder="Search teams..." value="' + state.teamSearchTerm + '"></div><div class="item-list" id="teamsListContainer">';
    var teamsToShow = state.teams.filter(function(t) { 
      if (state.selectedLeague && t.league !== state.selectedLeague) return false;
      if (state.teamSearchTerm && t.name.toLowerCase().indexOf(state.teamSearchTerm.toLowerCase()) === -1) return false;
      return true;
    });
    teamsToShow.slice(0, 15).forEach(function(t) { html += '<div class="item-chip" data-team="' + t.id + '"><span class="iconify" data-icon="mdi:shield-half-full"></span>' + t.name + '</div>'; });
    if (teamsToShow.length === 0) html += '<div class="item-chip"><span class="iconify" data-icon="mdi:shield-half-full"></span>No teams found</div>';
    html += '</div></div>';
    elements.leagueContainer.innerHTML = html;
    var teamSearchInput = document.getElementById('teamSearchInput');
    if (teamSearchInput) teamSearchInput.addEventListener('input', function() { clearTimeout(searchTimeout); searchTimeout = setTimeout(function() { state.teamSearchTerm = teamSearchInput.value; updateLeaguesTeams(); }, 300); });
    document.querySelectorAll('[data-league]').forEach(function(el) { el.addEventListener('click', function() { state.selectedLeague = el.dataset.league; state.teamSearchTerm = ''; updateLeaguesTeams(); elements.filterLeague.value = state.selectedLeague; renderMatches(); }); });
    document.querySelectorAll('[data-team]').forEach(function(el) { el.addEventListener('click', function() { window.location.href = 'profile.html?team=' + el.dataset.team; }); });
  }

  function populateLeagueFilter() {
    elements.filterLeague.innerHTML = '<option value="all">All Leagues</option>';
    state.leagues.forEach(function(l) { elements.filterLeague.innerHTML += '<option value="' + l.id + '">' + l.name + '</option>'; });
  }

  async function loadMatches() {
    try {
      var query = db.collection('matches');
      if (state.currentContext === 'live') { query = query.where('status', '==', 'live'); } 
      else { query = query.where('status', 'in', ['upcoming', 'live']); }
      query = query.orderBy('startTime', 'asc');
      var snap = await query.get();
      state.matches = []; state.allMatches = [];
      
      for (var i = 0; i < snap.docs.length; i++) {
        var d = snap.docs[i];
        var m = { 
          id: d.id, teamAName: d.data().teamAName || 'Team A', teamBName: d.data().teamBName || 'Team B', 
          teamALogo: d.data().teamALogo, teamBLogo: d.data().teamBLogo, league: d.data().league, 
          leagueName: d.data().leagueName, startTime: d.data().startTime, status: d.data().status || 'upcoming', 
          isTopMatch: d.data().isTopMatch || false, sport: d.data().sport || 'football' 
        };
        var votesSnap = await db.collection('votes').where('matchId', '==', d.id).get();
        var totalVotes = votesSnap.size;
        var teamAVotes = 0, drawVotes = 0, teamBVotes = 0;
        votesSnap.docs.forEach(function(v) { var vt = v.data().voteType; if (vt === 'team1') teamAVotes++; else if (vt === 'draw') drawVotes++; else if (vt === 'team2') teamBVotes++; });
        m.percentages = { team1: totalVotes > 0 ? Math.round((teamAVotes / totalVotes) * 100) : 33, draw: totalVotes > 0 ? Math.round((drawVotes / totalVotes) * 100) : 34, team2: totalVotes > 0 ? Math.round((teamBVotes / totalVotes) * 100) : 33 };
        m.totalVotes = totalVotes;
        state.matches.push(m); state.allMatches.push(m);
      }
      renderMatches();
    } catch(e) {}
  }

  async function submitVoteHandler(matchId, voteType) {
    try {
      var existingVote = await db.collection('votes').where('matchId', '==', matchId).where('anonymousId', '==', anonymousId).get();
      if (!existingVote.empty) { elements.cardHint.innerText = '⚠️ YOU ALREADY VOTED! ⚠️'; setTimeout(function() { elements.cardHint.innerText = '⚡ CLICK ON PERCENTAGES TO VOTE ⚡'; }, 3000); return; }
      var match = state.matches.find(function(m) { return m.id === matchId; });
      await db.collection('votes').add({ matchId: matchId, anonymousId: anonymousId, voteType: voteType, matchName: (match.teamAName || 'Team A') + ' vs ' + (match.teamBName || 'Team B'), sport: match.sport || 'football', league: match.league, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      await loadMatches();
      elements.cardHint.innerText = '✅ VOTE RECORDED! ✅';
      setTimeout(function() { elements.cardHint.innerText = '⚡ CLICK ON PERCENTAGES TO VOTE ⚡'; }, 3000);
    } catch(e) { elements.cardHint.innerText = '❌ ERROR VOTING ❌'; setTimeout(function() { elements.cardHint.innerText = '⚡ CLICK ON PERCENTAGES TO VOTE ⚡'; }, 3000); }
  }

  window.submitVote = submitVoteHandler;

  async function loadDebates() {
    var snap = await db.collection('matches').get();
    var debates = [];
    for (var i = 0; i < snap.docs.length; i++) {
      var d = snap.docs[i];
      var m = { id: d.id, teamAName: d.data().teamAName, teamBName: d.data().teamBName, leagueName: d.data().leagueName };
      var msgs = await db.collection('messages').where('matchId', '==', d.id).orderBy('createdAt', 'desc').limit(4).get();
      if (msgs.size > 0) { var recent = []; msgs.forEach(function(msg) { recent.push(msg.data()); }); debates.push({ match: m, messageCount: msgs.size, recentMessages: recent.reverse() }); }
    }
    debates.sort(function(a, b) { return b.messageCount - a.messageCount; });
    renderDebates(debates.slice(0, 3));
  }

  function renderDebates(debates) {
    if (!debates.length) { elements.dynamicList.innerHTML = '<div class="match-card" style="text-align:center;padding:40px;">No active debates yet.</div>'; return; }
    var emojis = ['🔥', '💥', '⚡', '😱', '🤯', '🎯'], html = '';
    debates.forEach(function(d, i) {
      var m = d.match, e = emojis[i % emojis.length];
      html += '<div class="debate-card" onclick="window.location.href=\'vote.html?id=' + m.id + '\'"><div class="debate-header"><span class="iconify" data-icon="mdi:message-text-outline" style="color:#9CE800;font-size:24px;"></span><div class="debate-title">' + e + ' FUT/' + m.teamAName + ' vs ' + m.teamBName + ' ' + e + '</div></div><div class="debate-stats"><span><span class="iconify" data-icon="mdi:message-outline"></span> ' + d.messageCount + ' messages</span><span><span class="iconify" data-icon="mdi:account-group"></span> ' + (m.leagueName || 'Unknown League') + '</span></div><div class="debate-messages">';
      d.recentMessages.forEach(function(msg) { var p = msg.content && msg.content.length > 40 ? msg.content.substring(0, 40) + '...' : (msg.content || 'No content'); html += '<div class="message-preview"><strong>User:</strong> ' + p + '</div>'; });
      html += '</div></div>';
    });
    elements.dynamicList.innerHTML = html;
  }

  function renderMatches() {
    var sportFilter = elements.filterSport.value;
    var leagueFilter = elements.filterLeague.value;
    var searchTerm = elements.searchInput.value.toLowerCase();
    var selectedDate = elements.filterDate.value;
    var filtered = state.matches.filter(function(m) {
      if (sportFilter !== 'all') { var league = state.leagues.find(function(l) { return l.id === m.league; }); if (!league) return false; var isFootball = !league.name.toLowerCase().includes('basketball'); if (sportFilter === 'football' && !isFootball) return false; if (sportFilter === 'basketball' && isFootball) return false; }
      if (leagueFilter !== 'all' && m.league !== leagueFilter) return false;
      if (searchTerm) { var searchString = (m.teamAName + ' ' + m.teamBName + ' ' + (m.leagueName || '')).toLowerCase(); if (!searchString.includes(searchTerm)) return false; }
      if (selectedDate && m.startTime) { var matchDate = m.startTime.toDate().toISOString().split('T')[0]; if (matchDate !== selectedDate) return false; }
      return true;
    });
    if (state.currentNav === 'popular') filtered = filtered.sort(function(a, b) { return (b.totalVotes || 0) - (a.totalVotes || 0); }).slice(0, 5);
    else filtered.sort(function(a, b) { if (a.isTopMatch && !b.isTopMatch) return -1; if (!a.isTopMatch && b.isTopMatch) return 1; return a.startTime.toDate() - b.startTime.toDate(); });
    if (!filtered.length) { elements.dynamicList.innerHTML = '<div class="match-card" style="text-align:center;padding:40px;">No matches found</div>'; return; }
    var html = '';
    filtered.forEach(function(m) {
      var time = m.startTime ? m.startTime.toDate() : new Date();
      var isLive = m.status === 'live';
      var timeStr = isLive ? 'LIVE' : time.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      var leagueName = m.leagueName || (state.leagues.find(function(l) { return l.id === m.league; }) || {}).name || 'Unknown League';
      var p = m.percentages || { team1: 33, draw: 34, team2: 33 };
      html += '<div class="match-card"><div class="match-teams"><div class="team"><div class="team-logo">' + (m.teamALogo ? '<img src="' + m.teamALogo + '">' : '<span class="iconify" data-icon="mdi:shield-half-full"></span>') + '</div><div class="team-info"><span class="team-name">' + (m.teamAName || 'Team A') + '</span><span class="team-odds">' + leagueName + '</span></div></div><div class="match-vs">VS</div><div class="team"><div class="team-info" style="text-align:right;"><span class="team-name">' + (m.teamBName || 'Team B') + '</span><span class="team-odds">' + timeStr + '</span></div><div class="team-logo">' + (m.teamBLogo ? '<img src="' + m.teamBLogo + '">' : '<span class="iconify" data-icon="mdi:shield-half-full"></span>') + '</div></div></div>';
      html += '<div class="percentage-bar">';
      html += '<div class="percentage-option" onclick="submitVote(\'' + m.id + '\', \'team1\')"><div class="percentage-label">1</div><div class="percentage-value">' + p.team1 + '%</div><div class="percentage-fill"><div class="percentage-fill-bar" style="width:' + p.team1 + '%;"></div></div></div>';
      html += '<div class="percentage-option" onclick="submitVote(\'' + m.id + '\', \'draw\')"><div class="percentage-label">X</div><div class="percentage-value">' + p.draw + '%</div><div class="percentage-fill"><div class="percentage-fill-bar draw-bar" style="width:' + p.draw + '%;"></div></div></div>';
      html += '<div class="percentage-option" onclick="submitVote(\'' + m.id + '\', \'team2\')"><div class="percentage-label">2</div><div class="percentage-value">' + p.team2 + '%</div><div class="percentage-fill"><div class="percentage-fill-bar" style="width:' + p.team2 + '%;"></div></div></div>';
      html += '</div></div>';
    });
    elements.dynamicList.innerHTML = html;
  }

  function setHomeView() { 
    elements.contextDisplay.innerHTML = 'HOME · SPORTS & LIVE'; updateAnnouncement(); 
    elements.promoContainer.innerHTML = '<div class="promo-banner"><h2>🏆 Join Africa\'s #1 Prediction Brand</h2><div class="promo-features"><div class="promo-feature"><span class="iconify" data-icon="mdi:chart-line"></span> Biggest Wins</div><div class="promo-feature"><span class="iconify" data-icon="mdi:gift-outline"></span> 1000% FREE to Vote</div><div class="promo-feature"><span class="iconify" data-icon="mdi:robot-outline"></span> No BOTS Just Humans</div><div class="promo-feature"><span class="iconify" data-icon="mdi:headset"></span> 24/7 Customer Support</div></div><div class="promo-highlight"><div class="promo-badge">FREE</div><div class="promo-text">Free callbacks whenever you need us.</div></div></div>'; 
    elements.filterBar.style.display = 'flex'; elements.cardHint.innerText = '⚡ CLICK ON PERCENTAGES TO VOTE ⚡'; 
    state.currentContext = 'sports'; elements.contextSportsBtn.classList.add('active-context'); elements.contextLiveBtn.classList.remove('active-context');
    loadMatches(); 
  }

  function setSportsView() { 
    elements.contextDisplay.innerHTML = 'SPORTS <span>&</span> LIVE'; 
    elements.announcementContainer.innerHTML = elements.promoContainer.innerHTML = ''; 
    elements.filterBar.style.display = 'flex'; elements.cardHint.innerText = '⚡ CLICK ON PERCENTAGES TO VOTE ⚡'; 
    loadMatches(); 
  }

  elements.contextSportsBtn.addEventListener('click', function() {
    elements.contextSportsBtn.classList.add('active-context'); elements.contextLiveBtn.classList.remove('active-context');
    state.currentContext = 'sports'; updateBreadcrumb(state.currentSport, 'sports'); loadMatches();
    elements.cardHint.innerText = '⚽ UPCOMING & POPULAR MATCHES - CLICK TO VOTE ⚽';
  });

  elements.contextLiveBtn.addEventListener('click', function() {
    elements.contextLiveBtn.classList.add('active-context'); elements.contextSportsBtn.classList.remove('active-context');
    state.currentContext = 'live'; updateBreadcrumb(state.currentSport, 'live'); loadMatches();
    elements.cardHint.innerText = '🔴 LIVE MATCHES IN PROGRESS - VOTE NOW 🔴';
  });

  elements.sportBtns.forEach(function(b) { b.addEventListener('click', function() {
    elements.sportBtns.forEach(function(s) { s.classList.remove('active-sport'); }); b.classList.add('active-sport');
    state.currentSport = b.dataset.sport; state.selectedLeague = null; state.teamSearchTerm = '';
    elements.filterSport.value = state.currentSport; updateLeaguesTeams(); populateLeagueFilter();
    updateBreadcrumb(state.currentSport, state.currentContext);
    if (state.currentNav === 'debates') loadDebates(); else loadMatches();
  });});

  elements.navButtons.forEach(function(b) { b.addEventListener('click', function() {
    elements.navButtons.forEach(function(n) { n.classList.remove('active'); }); b.classList.add('active');
    state.currentNav = b.dataset.nav; updateBreadcrumb(state.currentSport, state.currentNav);
    if (state.currentNav === 'home') setHomeView();
    else if (state.currentNav === 'sports') setSportsView();
    else if (state.currentNav === 'debates') { elements.contextDisplay.innerHTML = 'TOP <span>DEBATES</span>'; elements.announcementContainer.innerHTML = elements.promoContainer.innerHTML = ''; elements.filterBar.style.display = 'none'; elements.cardHint.innerText = 'HOTTEST CONVERSATIONS RIGHT NOW'; loadDebates(); }
    else if (state.currentNav === 'games') { window.location.href = 'game.html'; }
    else if (state.currentNav === 'live') { state.currentContext = 'live'; elements.contextSportsBtn.classList.remove('active-context'); elements.contextLiveBtn.classList.add('active-context'); setSportsView(); }
    else if (state.currentNav === 'popular') { elements.contextDisplay.innerHTML = 'POPULAR <span>&</span> TRENDING'; elements.announcementContainer.innerHTML = elements.promoContainer.innerHTML = ''; elements.filterBar.style.display = 'flex'; elements.cardHint.innerText = 'MOST VOTED MATCHES'; loadMatches(); }
  });});

  elements.applyFilterBtn.addEventListener('click', renderMatches);

  Promise.all([loadAnnouncements(), loadLeaguesAndTeams()]).then(function() { updateBreadcrumb('football', 'sports'); setHomeView(); });
})();
</script>
