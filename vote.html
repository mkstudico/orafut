  function updateLeaguesTeams(sport) {
    const filteredLeagues = leagues.filter(l => sport === 'football' ? !l.name?.toLowerCase().includes('basketball') : l.name?.toLowerCase().includes('basketball'));
    const filteredTeams = teams.filter(t => sport === 'football' ? !t.leagueName?.toLowerCase().includes('basketball') : t.leagueName?.toLowerCase().includes('basketball'));
    leagueListDiv.innerHTML = filteredLeagues.slice(0,5).map(l => `<div class="league-item-mobile" data-league="${l.id}">${l.name}</div>`).join('') || '<div class="league-item-mobile">No leagues</div>';
    teamListDiv.innerHTML = filteredTeams.slice(0,5).map(t => `<div class="league-item-mobile" data-team="${t.id}">${t.name}</div>`).join('') || '<div class="league-item-mobile">No teams</div>';
    document.querySelectorAll('[data-league]').forEach(el => { el.addEventListener('click', () => { filterLeague.value = el.dataset.league; renderList(); closeMenu(); }); });
  }
  
  function populateLeagueFilter() {
    filterLeague.innerHTML = '<option value="all">All Leagues</option>' + leagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
  }
  
  async function loadMatches() {
    let query = db.collection('matches');
    if (currentContext === 'live') query = query.where('status', '==', 'live');
    else query = query.where('status', 'in', ['upcoming', 'live']);
    query = query.orderBy('startTime', 'asc');
    const matchesSnap = await query.get();
    matches = [];
    for (const doc of matchesSnap.docs) {
      const match = { id: doc.id, ...doc.data() };
      const votesSnap = await db.collection('votes').where('matchId', '==', doc.id).get();
      const total = votesSnap.size;
      const teamAVotes = votesSnap.docs.filter(v => v.data().voteType === 'team1').length;
      const drawVotes = votesSnap.docs.filter(v => v.data().voteType === 'draw').length;
      const teamBVotes = votesSnap.docs.filter(v => v.data().voteType === 'team2').length;
      match.percentages = {
        team1: total > 0 ? Math.round((teamAVotes / total) * 100) : 33,
        draw: total > 0 ? Math.round((drawVotes / total) * 100) : 34,
        team2: total > 0 ? Math.round((teamBVotes / total) * 100) : 33
      };
      matches.push(match);
    }
    renderList();
  }
  
  function updateBreadcrumb(sport, context) {
    breadcrumbSport.textContent = sport === 'football' ? 'Football' : 'Basketball';
    breadcrumbMatch.textContent = context === 'sports' ? 'Upcoming' : 'Live Now';
  }
  
  window.submitVote = async function(matchId, voteType) {
    const existing = await db.collection('votes').where('matchId', '==', matchId).where('anonymousId', '==', anonymousId).get();
    if (!existing.empty) { cardHint.innerText = '⚠️ ALREADY VOTED!'; setTimeout(() => cardHint.innerText = '⚡ CLICK TO VOTE ⚡', 2000); return; }
    await db.collection('votes').add({ matchId, anonymousId, voteType, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    await loadMatches();
    cardHint.innerText = '✅ VOTED!'; setTimeout(() => cardHint.innerText = '⚡ CLICK TO VOTE ⚡', 2000);
  };
  
  sportBtns.forEach(btn => { btn.addEventListener('click', () => { sportBtns.forEach(b => b.classList.remove('active-sport')); btn.classList.add('active-sport'); currentSport = btn.dataset.sport; updateLeaguesTeams(currentSport); updateBreadcrumb(currentSport, currentContext); filterSport.value = currentSport; loadMatches(); }); });
  
  navBtns.forEach(btn => { btn.addEventListener('click', () => { navBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentNav = btn.dataset.nav; if (currentNav === 'debates') window.location.href = 'debate.html'; else if (currentNav === 'info') { renderInfoView(); return; } else { promoBanner.style.display = currentNav === 'home' ? 'block' : 'none'; contextDisplay.innerHTML = currentNav === 'sports' ? 'SPORTS <span>&</span> LIVE' : (currentNav === 'live' ? 'LIVE <span>&</span> SPORTS' : 'POPULAR · SPORTS & LIVE'); loadMatches(); } }); });
  
  contextSports.addEventListener('click', () => { contextSports.classList.add('active-context'); contextLive.classList.remove('active-context'); currentContext = 'sports'; updateBreadcrumb(currentSport, 'sports'); loadMatches(); });
  contextLive.addEventListener('click', () => { contextLive.classList.add('active-context'); contextSports.classList.remove('active-context'); currentContext = 'live'; updateBreadcrumb(currentSport, 'live'); loadMatches(); });
  
  applyFilter.addEventListener('click', renderList);
  searchInput.addEventListener('input', renderList);
  
  function renderList() {
    const sportVal = filterSport.value, leagueVal = filterLeague.value, searchTerm = searchInput.value.toLowerCase();
    let filtered = matches.filter(m => {
      if (sportVal !== 'all') { const league = leagues.find(l => l.id === m.league); if (!league) return false; const isFootball = !league.name?.toLowerCase().includes('basketball'); if (sportVal === 'football' && !isFootball) return false; if (sportVal === 'basketball' && isFootball) return false; }
      if (leagueVal !== 'all' && m.league !== leagueVal) return false;
      if (searchTerm && !`${m.teamAName} ${m.teamBName}`.toLowerCase().includes(searchTerm)) return false;
      return true;
    });
    if (filtered.length === 0) { dynamicList.innerHTML = '<div style="text-align:center;padding:40px;">No matches</div>'; return; }
    let html = '';
    filtered.forEach(m => {
      const time = m.startTime?.toDate() || new Date();
      const isLive = m.status === 'live';
      html += `<div class="match-card-mobile"><div class="match-teams-mobile"><div class="team-mobile"><div class="team-logo-mobile">${m.teamALogo ? `<img src="${m.teamALogo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div><div class="team-info-mobile"><span class="team-name-mobile">${m.teamAName}</span><span class="team-odds-mobile">${m.leagueName || 'League'}</span></div></div><div class="match-vs-mobile">VS</div><div class="team-mobile"><div class="team-info-mobile" style="text-align:right;"><span class="team-name-mobile">${m.teamBName}</span><span class="team-odds-mobile">${isLive ? 'LIVE' : time.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div><div class="team-logo-mobile">${m.teamBLogo ? `<img src="${m.teamBLogo}">` : '<span class="iconify" data-icon="mdi:shield-half-full"></span>'}</div></div></div><div class="percentage-bar-mobile"><div class="percentage-option-mobile" onclick="submitVote('${m.id}','team1')"><div class="percentage-label-mobile">1</div><div class="percentage-value-mobile">${m.percentages.team1}%</div><div class="percentage-fill-mobile"><div class="percentage-fill-bar-mobile" style="width:${m.percentages.team1}%"></div></div></div><div class="percentage-option-mobile" onclick="submitVote('${m.id}','draw')"><div class="percentage-label-mobile">X</div><div class="percentage-value-mobile">${m.percentages.draw}%</div><div class="percentage-fill-mobile"><div class="percentage-fill-bar-mobile draw-bar-mobile" style="width:${m.percentages.draw}%"></div></div></div><div class="percentage-option-mobile" onclick="submitVote('${m.id}','team2')"><div class="percentage-label-mobile">2</div><div class="percentage-value-mobile">${m.percentages.team2}%</div><div class="percentage-fill-mobile"><div class="percentage-fill-bar-mobile" style="width:${m.percentages.team2}%"></div></div></div></div></div>`;
    });
    dynamicList.innerHTML = html;
  }
  
  // INFO VIEW with AI analytics
  async function renderInfoView() {
    promoBanner.style.display = 'none';
    const selectedMatch = matches[0] || null;
    if (!selectedMatch) { dynamicList.innerHTML = '<div class="info-card-mobile">No match data available</div>'; return; }
    const votesSnap = await db.collection('votes').where('matchId', '==', selectedMatch.id).get();
    const totalVotes = votesSnap.size;
    const team1Votes = votesSnap.docs.filter(v => v.data().voteType === 'team1').length;
    const team2Votes = votesSnap.docs.filter(v => v.data().voteType === 'team2').length;
    const team1Percent = totalVotes ? Math.round((team1Votes/totalVotes)*100) : 0;
    const team2Percent = totalVotes ? Math.round((team2Votes/totalVotes)*100) : 0;
    const isMatchEnded = selectedMatch.status === 'completed' || selectedMatch.status === 'ended';
    const winnerText = isMatchEnded ? (selectedMatch.winner || (team1Votes > team2Votes ? selectedMatch.teamAName : selectedMatch.teamBName)) : 'Not yet decided';
    const aiMessage = isMatchEnded ? `🔮 AI Analysis: ${team1Votes} people voted for ${selectedMatch.teamAName} and ${team2Votes} for ${selectedMatch.teamBName}. The crowd was ${Math.abs(team1Percent - team2Percent)}% off from the final result.` : `📊 Live Insight: ${totalVotes} predictions so far. ${team1Percent}% believe ${selectedMatch.teamAName} will win, ${team2Percent}% favor ${selectedMatch.teamBName}. Momentum shifting every minute!`;
    
    dynamicList.innerHTML = `
      <div class="info-card-mobile">
        <div class="info-line-mobile"><span>🏆 League</span><strong>${selectedMatch.leagueName || 'Unknown'}</strong></div>
        <div class="info-line-mobile"><span>⏱️ Match Time</span><strong>${selectedMatch.startTime ? new Date(selectedMatch.startTime.toDate()).toLocaleString() : 'TBD'}</strong></div>
        <div class="info-line-mobile"><span>📌 Status</span><strong>${selectedMatch.status || 'Upcoming'}</strong></div>
        <div class="info-line-mobile"><span>🏅 Real Winner</span><strong>${winnerText}</strong></div>
        <div class="info-line-mobile"><span>👥 Total Votes</span><strong>${totalVotes}</strong></div>
        <div class="info-line-mobile"><span>📈 ${selectedMatch.teamAName} Votes</span><strong>${team1Votes} (${team1Percent}%)</strong></div>
        <div class="info-line-mobile"><span>📉 ${selectedMatch.teamBName} Votes</span><strong>${team2Votes} (${team2Percent}%)</strong></div>
        <div class="ai-analytics"><span class="iconify" data-icon="mdi:robot-outline" style="margin-right:8px;"></span> ${aiMessage}</div>
      </div>
    `;
  }
  
  loadLeaguesAndTeams().then(() => { loadMatches(); });
  updateBreadcrumb('football', 'sports');
})();
</script>
</body>
</html>
