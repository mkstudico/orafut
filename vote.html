<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ORAFUT · Match Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7fb; font-family: 'Poppins', sans-serif; padding: 20px; display: flex; justify-content: center; }
    .app-container { max-width: 1200px; width: 100%; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
    
    /* Header */
    .main-header { background: #252A2D; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .back-btn { background: transparent; border: 2px solid #9CE800; color: #9CE800; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .back-btn:hover { background: #9CE800; color: #000; }
    .brand { font-size: 28px; font-weight: 800; font-style: italic; }
    .brand .ora { color: white; }
    .brand .fut { color: #9CE800; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .search-wrapper { position: relative; }
    .search-bar { background: rgba(255,255,255,0.1); border: 1px solid #3a4146; border-radius: 40px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
    .search-bar input { background: none; border: none; color: white; outline: none; width: 200px; }
    .search-results { position: absolute; top: 100%; right: 0; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 280px; z-index: 100; display: none; }
    .search-results.active { display: block; }
    .account-btn { background: #9CE800; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    
    /* Hero Section */
    .hero-section { background: linear-gradient(135deg, #0a0e1a, #141a2a); padding: 40px; text-align: center; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; opacity: 0.1; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
    .hero-bg img { width: 200px; height: 200px; object-fit: contain; filter: blur(4px); }
    .teams-container { display: flex; align-items: center; justify-content: center; gap: 60px; position: relative; z-index: 2; flex-wrap: wrap; }
    .team-card { text-align: center; }
    .team-logo { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; border: 3px solid #9CE800; backdrop-filter: blur(4px); }
    .team-logo img { width: 90px; height: 90px; object-fit: contain; border-radius: 50%; }
    .team-name { color: white; font-size: 20px; font-weight: 800; margin-top: 8px; }
    .vs-text { font-size: 36px; font-weight: 900; color: #9CE800; text-shadow: 0 0 20px #9CE800; }
    
    /* Status Indicator */
    .status-box { text-align: center; padding: 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .status-light { display: inline-flex; align-items: center; gap: 12px; background: white; padding: 8px 24px; border-radius: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .led { width: 14px; height: 14px; border-radius: 50%; animation: pulse 1.2s infinite; background: #9CE800; }
    @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
    .led.red { background: #ef4444; animation: none; }
    .status-text { font-weight: 800; font-size: 14px; }
    
    /* Tab Bar */
    .tab-bar { display: flex; background: white; border-bottom: 2px solid #eef2f6; padding: 0 20px; gap: 8px; }
    .tab-item { padding: 16px 24px; font-weight: 700; font-size: 15px; color: #64748b; cursor: pointer; position: relative; transition: 0.2s; }
    .tab-item.active { color: #9CE800; }
    .tab-item.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: #9CE800; border-radius: 3px; }
    
    /* Content Grid */
    .content-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; padding: 24px; background: #f8fafc; }
    @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }
    
    .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #edf2f7; }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-left: 5px solid #9CE800; padding-left: 16px; }
    
    /* Vote Options as Boxes */
    .vote-boxes { display: flex; gap: 16px; margin: 20px 0; }
    .vote-box { flex: 1; background: #f1f5f9; padding: 16px; text-align: center; font-weight: 800; font-size: 16px; cursor: pointer; border: 2px solid transparent; border-radius: 16px; transition: 0.2s; }
    .vote-box.selected { background: #9CE800; border-color: #9CE800; color: #000; box-shadow: 0 4px 12px rgba(156,232,0,0.3); }
    
    textarea, input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 16px; font-family: inherit; font-size: 14px; outline: none; }
    textarea:focus, input:focus { border-color: #9CE800; }
    .img-upload-btn { background: #f1f5f9; padding: 10px 20px; border-radius: 40px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; margin: 12px 0; }
    .preview-images { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
    .preview-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid #9CE800; }
    .add-feature-row { display: flex; gap: 12px; margin: 16px 0; }
    .small-btn { background: #9CE800; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 700; cursor: pointer; }
    .send-vote-btn { background: #0f172a; color: white; width: 100%; padding: 14px; border-radius: 40px; font-weight: 800; border: none; margin-top: 16px; cursor: pointer; transition: 0.2s; }
    .send-vote-btn:hover { background: #1e293b; }
    
    /* Distribution Bars */
    .stat-item { margin-bottom: 16px; cursor: pointer; }
    .stat-label { display: flex; justify-content: space-between; font-weight: 600; font-size: 13px; margin-bottom: 6px; }
    .bar-bg { background: #e2e8f0; border-radius: 20px; height: 32px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; background: #9CE800; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; font-weight: 800; font-size: 13px; color: #1e293b; }
    .draw-fill { background: #fbbf24; }
    
    /* Info Card */
    .info-card { background: #f8fafc; border-radius: 20px; padding: 20px; }
    .info-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
    .ai-analytics { background: linear-gradient(135deg, #e6f7e6, #d4edda); border-left: 4px solid #9CE800; padding: 16px; border-radius: 12px; margin-top: 16px; font-size: 14px; }
    
    /* Chat */
    .chat-container { background: white; border-radius: 24px; border: 1px solid #eef2f6; display: flex; flex-direction: column; height: 70vh; }
    .chat-header { padding: 16px; border-bottom: 1px solid #eef2f6; display: flex; justify-content: space-between; align-items: center; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-bubble { background: #f8fafc; border-radius: 18px; padding: 10px 14px; max-width: 85%; }
    .chat-username { font-weight: 800; font-size: 12px; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
    .chat-username.red { color: #dc2626; }
    .chat-username.blue { color: #3b82f6; }
    .chat-username.gray { color: #64748b; }
    .chat-text { font-size: 13px; word-break: break-word; }
    .chat-actions { display: flex; gap: 12px; margin-top: 6px; font-size: 10px; color: #94a3b8; }
    .chat-action { cursor: pointer; }
    .chat-input-area { padding: 16px; border-top: 1px solid #eef2f6; display: flex; gap: 12px; flex-wrap: wrap; }
    .chat-input { flex: 1; padding: 12px; border-radius: 40px; border: 1px solid #ddd; }
    .chat-send { background: #9CE800; border: none; padding: 0 24px; border-radius: 40px; font-weight: 800; cursor: pointer; }
    .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 12px; background: white; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); margin-bottom: 12px; max-height: 200px; overflow-y: auto; }
    .emoji-item { font-size: 28px; cursor: pointer; text-align: center; padding: 6px; transition: 0.1s; border-radius: 12px; }
    .emoji-item:hover { background: #f0f0f0; transform: scale(1.1); }
    .icon-btn { background: #f1f5f9; border: none; padding: 10px 16px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 32px; padding: 24px; max-height: 70vh; overflow-y: auto; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 60px; font-size: 13px; z-index: 1100; animation: fadeOut 2s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
  </style>
</head>
<body>
<div class="app-container">
  <header class="main-header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='index.html'"><span class="iconify" data-icon="mdi:arrow-left"></span> Back</button>
      <div class="brand"><span class="ora">ORA</span><span class="fut">FUT</span></div>
    </div>
    <div class="header-right">
      <div class="search-wrapper"><div class="search-bar"><span class="iconify" data-icon="mdi:magnify"></span><input type="text" id="searchInput" placeholder="Search matches..."></div><div id="searchResults" class="search-results"></div></div>
      <button class="account-btn" id="loginBtn"><span class="iconify" data-icon="mdi:account-circle-outline"></span> Login</button>
    </div>
  </header>

  <div class="hero-section">
    <div class="hero-bg"><img id="bgLogoA" src=""><img id="bgLogoB" src=""></div>
    <div class="teams-container">
      <div class="team-card"><div class="team-logo" id="heroLogoA"><img src=""></div><div class="team-name" id="teamAName">Team A</div></div>
      <div class="vs-text">VS</div>
      <div class="team-card"><div class="team-logo" id="heroLogoB"><img src=""></div><div class="team-name" id="teamBName">Team B</div></div>
    </div>
  </div>

  <div class="status-box"><div class="status-light"><div class="led" id="statusLed"></div><span class="status-text" id="statusText">BE READY</span></div></div>

  <div class="tab-bar">
    <div class="tab-item active" data-tab="vote">VOTE</div>
    <div class="tab-item" data-tab="analysis">ANALYSIS</div>
    <div class="tab-item" data-tab="info">INFO</div>
    <div class="tab-item" data-tab="chat">CHAT</div>
  </div>

  <div class="content-grid">
    <div>
      <div id="voteTab" class="tab-pane"></div>
      <div id="analysisTab" class="tab-pane" style="display:none;"></div>
      <div id="infoTab" class="tab-pane" style="display:none;"></div>
    </div>
    <div id="chatTab" class="tab-pane" style="display:none;">
      <div class="chat-container">
        <div class="chat-header"><span><span class="iconify" data-icon="mdi:chat"></span> Live Chat</span><button id="fullscreenChat" class="icon-btn"><span class="iconify" data-icon="mdi:fullscreen"></span></button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <button id="emojiBtn" class="icon-btn"><span class="iconify" data-icon="mdi:emoticon-happy-outline"></span></button>
          <input type="text" id="chatInput" class="chat-input" placeholder="Type message...">
          <button id="sendChat" class="chat-send">Send</button>
        </div>
        <div style="padding:0 16px 16px; display:flex; gap:8px;"><button id="uploadChatImg" class="icon-btn"><span class="iconify" data-icon="mdi:image-plus"></span> Image</button><input type="file" id="chatImageFile" accept="image/*" style="display:none"></div>
        <div id="emojiPanel" class="emoji-grid" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>
<div id="reasonModal" class="modal"><div class="modal-content"><h3>💬 Voter Reasons</h3><div id="modalReasonList"></div><button onclick="closeModal()" style="margin-top:16px;padding:8px 24px;border-radius:40px;">Close</button></div></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script>
const firebaseConfig = { apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const IMGBB_KEY = "0f248e70fc4e7dffde307dd772823379";

const urlParams = new URLSearchParams(window.location.search);
const matchId = urlParams.get('id');
if(!matchId) { alert("No match specified"); window.location.href = 'index.html'; }

let currentUser = null;
let matchData = null;
let userVote = null;
let selectedVote = null;
let uploadedImages = [];
let extraFeatures = [];
let currentAnalysisType = 'team1';
let chatUnsub = null;

function showToast(msg, isError = false) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; t.style.background = isError ? '#dc2626' : '#1e293b'; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

async function loadMatch() {
  const doc = await db.collection('matches').doc(matchId).get();
  if(!doc.exists) { showToast("Match not found", true); return; }
  matchData = doc.data();
  document.getElementById('teamAName').innerText = matchData.teamAName || 'Team A';
  document.getElementById('teamBName').innerText = matchData.teamBName || 'Team B';
  document.getElementById('heroLogoA').innerHTML = `<img src="${matchData.teamALogo || 'https://placehold.co/100'}">`;
  document.getElementById('heroLogoB').innerHTML = `<img src="${matchData.teamBLogo || 'https://placehold.co/100'}">`;
  document.getElementById('bgLogoA').src = matchData.teamALogo;
  document.getElementById('bgLogoB').src = matchData.teamBLogo;
  
  const isEnded = matchData.status === 'completed' || matchData.status === 'ended';
  if(isEnded) { document.getElementById('statusLed').classList.add('red'); document.getElementById('statusText').innerText = 'ENDED'; }
  else document.getElementById('statusText').innerText = 'BE READY';
  
  await checkUserVote();
  renderVoteTab();
  renderInfoTab();
  renderAnalysisTab();
  initChat();
}

async function checkUserVote() {
  if(!currentUser) { userVote = null; return; }
  const snap = await db.collection('votes').where('matchId','==',matchId).where('userId','==',currentUser.uid).get();
  userVote = snap.empty ? null : snap.docs[0].data();
}

function renderVoteTab() {
  const container = document.getElementById('voteTab');
  if(userVote) {
    container.innerHTML = `<div class="card"><div style="text-align:center;"><span class="iconify" data-icon="mdi:check-circle" style="font-size:56px;color:#9CE800;"></span><h2 style="margin:16px 0">You voted for ${userVote.voteType === 'team1' ? matchData?.teamAName : (userVote.voteType === 'team2' ? matchData?.teamBName : 'Draw')}</h2><p>${userVote.reason || 'No reason provided'}</p>${userVote.imageUrl ? `<img src="${userVote.imageUrl}" style="width:100px;border-radius:16px;margin-top:12px;">` : ''}</div></div>`;
    return;
  }
  container.innerHTML = `
    <div class="card"><div class="section-title"><span class="iconify" data-icon="mdi:vote"></span> Cast Your Prediction</div>
    <div class="vote-boxes"><div class="vote-box" data-vote="team1">🏆 ${matchData?.teamAName} Win</div><div class="vote-box" data-vote="draw">🤝 Draw</div><div class="vote-box" data-vote="team2">🏆 ${matchData?.teamBName} Win</div></div>
    <textarea id="voteReason" rows="3" placeholder="Why do you think so? (optional)"></textarea>
    <div><div class="img-upload-btn" id="uploadImagesBtn"><span class="iconify" data-icon="mdi:image-plus"></span> Add images (optional, max 8)</div><input type="file" id="voteImages" multiple accept="image/*" style="display:none"><div id="imagePreview" class="preview-images"></div></div>
    <div><label style="font-weight:600;">Other features (optional)</label><div class="add-feature-row"><input type="text" id="featureInput" placeholder="e.g., Key player injured"><button id="addFeatureBtn" class="small-btn">Add</button></div><div id="featuresList"></div></div>
    <button id="submitVoteBtn" class="send-vote-btn">✅ SUBMIT VOTE</button></div>
  `;
  document.querySelectorAll('.vote-box').forEach(box => { box.onclick = () => { document.querySelectorAll('.vote-box').forEach(b => b.classList.remove('selected')); box.classList.add('selected'); selectedVote = box.dataset.vote; }; });
  let images = [];
  document.getElementById('uploadImagesBtn').onclick = () => document.getElementById('voteImages').click();
  document.getElementById('voteImages').onchange = async (e) => {
    for(let file of Array.from(e.target.files)) {
      if(images.length >= 8) { showToast("Max 8 images", true); break; }
      const fd = new FormData(); fd.append('image', file);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
      const data = await res.json();
      if(data.success) images.push(data.data.url);
    }
    document.getElementById('imagePreview').innerHTML = images.map(url => `<img src="${url}" class="preview-img">`).join('');
    uploadedImages = images;
  };
  document.getElementById('addFeatureBtn').onclick = () => { const inp = document.getElementById('featureInput'); if(inp.value.trim()) { extraFeatures.push(inp.value); document.getElementById('featuresList').innerHTML = extraFeatures.map(f => `<span style="background:#f1f5f9;padding:4px 12px;border-radius:20px;display:inline-block;margin:4px;">${f}</span>`).join(''); inp.value = ''; } };
  document.getElementById('submitVoteBtn').onclick = async () => { if(!selectedVote) { showToast("Select who will win", true); return; } if(!currentUser) { showToast("Please login first", true); return; } await db.collection('votes').add({ matchId, userId: currentUser.uid, userName: currentUser.displayName, voteType: selectedVote, reason: document.getElementById('voteReason').value, images: uploadedImages, features: extraFeatures, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); showToast("Vote submitted!"); userVote = { voteType: selectedVote }; renderVoteTab(); renderAnalysisTab(); renderInfoTab(); };
}

async function renderAnalysisTab() {
  const container = document.getElementById('analysisTab');
  container.innerHTML = `<div class="card"><div style="display:flex; gap:12px; margin-bottom:20px;"><button id="analysisTeam1Btn" style="flex:1;padding:12px;border-radius:40px;border:2px solid #9CE800;background:${currentAnalysisType==='team1'?'#9CE800':'white'};font-weight:800;">${matchData?.teamAName}</button><button id="analysisTeam2Btn" style="flex:1;padding:12px;border-radius:40px;border:2px solid #9CE800;background:${currentAnalysisType==='team2'?'#9CE800':'white'};font-weight:800;">${matchData?.teamBName}</button></div><div id="reasonsList"></div></div>`;
  document.getElementById('analysisTeam1Btn').onclick = () => { currentAnalysisType='team1'; renderAnalysisTab(); };
  document.getElementById('analysisTeam2Btn').onclick = () => { currentAnalysisType='team2'; renderAnalysisTab(); };
  const votesSnap = await db.collection('votes').where('matchId','==',matchId).where('voteType','==',currentAnalysisType).get();
  const reasons = []; votesSnap.forEach(d => { if(d.data().reason) reasons.push({ id: d.id, userName: d.data().userName || 'User', reason: d.data().reason, images: d.data().images || [] }); });
  if(reasons.length===0) { document.getElementById('reasonsList').innerHTML = '<div style="text-align:center;padding:40px;">No reasons yet</div>'; return; }
  document.getElementById('reasonsList').innerHTML = reasons.map(r => `<div class="analysis-item" style="background:#f8fafc;border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;" data-id="${r.id}"><div style="font-weight:800;">${r.userName}</div><div style="font-size:13px;color:#475569;margin-top:6px;">${r.reason.substring(0,60)}...</div><div id="exp-${r.id}" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #ddd;"><div>${r.reason}</div>${r.images.map(img => `<img src="${img}" style="width:60px;border-radius:8px;margin:4px;">`).join('')}<button class="send-to-chat" data-reason="${r.reason.replace(/"/g, '&quot;')}" style="margin-top:8px;background:#9CE80020;border:none;padding:6px 12px;border-radius:30px;cursor:pointer;">💬 Send to Chat</button></div></div>`).join('');
  document.querySelectorAll('.analysis-item').forEach(el => { const id = el.dataset.id; const expand = document.getElementById(`exp-${id}`); el.addEventListener('click', (e) => { e.stopPropagation(); expand.style.display = expand.style.display === 'none' ? 'block' : 'none'; }); const btn = el.querySelector('.send-to-chat'); if(btn) btn.onclick = async (e) => { e.stopPropagation(); await db.collection('chatMessages').add({ matchId, userId: currentUser?.uid || 'anon', userName: currentUser?.displayName || 'Guest', text: `📢 ${btn.dataset.reason}`, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); showToast("Sent to chat!"); }; });
}

async function renderInfoTab() {
  if(!matchData) return;
  const votesSnap = await db.collection('votes').where('matchId','==',matchId).get();
  const total = votesSnap.size;
  const team1Votes = votesSnap.docs.filter(v => v.data().voteType === 'team1').length;
  const team2Votes = votesSnap.docs.filter(v => v.data().voteType === 'team2').length;
  const isEnded = matchData.status === 'completed' || matchData.status === 'ended';
  const winnerText = isEnded ? (matchData.winner || (team1Votes > team2Votes ? matchData.teamAName : matchData.teamBName)) : 'Not yet decided';
  const aiMsg = isEnded ? `🔮 AI Analysis: ${team1Votes} people voted for ${matchData.teamAName}, ${team2Votes} for ${matchData.teamBName}. The crowd wisdom was ${Math.abs(team1Votes - team2Votes)} votes off.` : `📊 Live Insight: ${total} predictions so far. ${Math.round(team1Votes/total*100)||0}% believe ${matchData.teamAName} will win, ${Math.round(team2Votes/total*100)||0}% favor ${matchData.teamBName}. Momentum shifting!`;
  document.getElementById('infoTab').innerHTML = `<div class="card"><div class="info-line"><span>🏆 League</span><strong>${matchData.leagueName || 'Unknown'}</strong></div><div class="info-line"><span>⏱️ Match Time</span><strong>${matchData.startTime ? new Date(matchData.startTime.toDate()).toLocaleString() : 'TBD'}</strong></div><div class="info-line"><span>📌 Status</span><strong>${matchData.status || 'Upcoming'}</strong></div><div class="info-line"><span>🏅 Real Winner</span><strong>${winnerText}</strong></div><div class="info-line"><span>👥 Total Votes</span><strong>${total}</strong></div><div class="ai-analytics"><span class="iconify" data-icon="mdi:robot-outline"></span> ${aiMsg}</div></div>`;
}

// CHAT SYSTEM
async function initChat() {
  if(chatUnsub) chatUnsub();
  chatUnsub = db.collection('chatMessages').where('matchId','==',matchId).orderBy('createdAt','asc').onSnapshot(snap => renderChat(snap));
  document.getElementById('sendChat').onclick = sendChatMessage;
  document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key==='Enter') sendChatMessage(); });
  const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🥸','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠'];
  const panel = document.getElementById('emojiPanel');
  panel.innerHTML = emojis.map(e => `<div class="emoji-item">${e}</div>`).join('');
  document.querySelectorAll('.emoji-item').forEach(e => { e.onclick = () => { document.getElementById('chatInput').value += e.innerText; panel.style.display = 'none'; }; });
  document.getElementById('emojiBtn').onclick = () => { panel.style.display = panel.style.display === 'none' ? 'grid' : 'none'; };
  document.getElementById('uploadChatImg').onclick = () => document.getElementById('chatImageFile').click();
  document.getElementById('chatImageFile').onchange = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const fd = new FormData(); fd.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
    const data = await res.json();
    if(data.success) await db.collection('chatMessages').add({ matchId, userId: currentUser?.uid || 'anon', userName: currentUser?.displayName || 'Guest', text: "📷 Image", imageUrl: data.data.url, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    showToast("Image sent");
  };
}

async function renderChat(snap) {
  const container = document.getElementById('chatMessages');
  if(!container) return;
  const userVotesMap = new Map();
  const votesSnap = await db.collection('votes').where('matchId','==',matchId).get();
  votesSnap.forEach(v => userVotesMap.set(v.data().userId, v.data().voteType));
  const messages = []; snap.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
  container.innerHTML = messages.map(msg => {
    let color = 'gray';
    const vt = userVotesMap.get(msg.userId);
    if(vt === 'team1') color = 'red'; else if(vt === 'team2') color = 'blue';
    return `<div class="chat-bubble"><div class="chat-username ${color}"><span>${msg.userName || 'User'}</span><span style="font-size:10px;">${msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString() : ''}</span></div><div class="chat-text">${linkify(msg.text)}</div>${msg.imageUrl ? `<img src="${msg.imageUrl}" style="max-width:120px;border-radius:12px;margin-top:6px;">` : ''}<div class="chat-actions"><span class="chat-action" onclick="replyMsg('${msg.id}')">Reply</span><span class="chat-action" onclick="copyMsg('${msg.text.replace(/'/g, "\\'")}')">Copy</span>${msg.userId === currentUser?.uid ? `<span class="chat-action" onclick="editMsg('${msg.id}','${msg.text.replace(/'/g, "\\'")}')">Edit</span><span class="chat-action" onclick="deleteMsg('${msg.id}')">Delete</span>` : ''}</div></div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}
window.replyMsg = (id) => { document.getElementById('chatInput').value = `@user `; };
window.copyMsg = (text) => { navigator.clipboard.writeText(text); showToast("Copied!"); };
window.editMsg = async (id, old) => { const n = prompt("Edit:", old); if(n) await db.collection('chatMessages').doc(id).update({ text: n }); };
window.deleteMsg = async (id) => { if(confirm("Delete?")) await db.collection('chatMessages').doc(id).delete(); };
function linkify(t) { return t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#9CE800;">$1</a>'); }
async function sendChatMessage() { const inp = document.getElementById('chatInput'); if(!inp.value.trim()) return; if(!currentUser) { showToast("Login to chat", true); return; } await db.collection('chatMessages').add({ matchId, userId: currentUser.uid, userName: currentUser.displayName, text: inp.value, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); inp.value = ''; }

// Auth & Tabs
auth.onAuthStateChanged(async (user) => { currentUser = user; if(user) { document.getElementById('loginBtn').innerHTML = `<span class="iconify" data-icon="mdi:logout"></span> Logout`; document.getElementById('loginBtn').onclick = () => auth.signOut(); } else { document.getElementById('loginBtn').innerHTML = `<span class="iconify" data-icon="mdi:login"></span> Login`; document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } await loadMatch(); });
if(!auth.currentUser) auth.signInAnonymously().catch(()=>{ currentUser = null; loadMatch(); });

document.querySelectorAll('.tab-item').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); tab.classList.add('active'); const target = tab.dataset.tab; document.getElementById('voteTab').style.display = target === 'vote' ? 'block' : 'none'; document.getElementById('analysisTab').style.display = target === 'analysis' ? 'block' : 'none'; document.getElementById('infoTab').style.display = target === 'info' ? 'block' : 'none'; document.getElementById('chatTab').style.display = target === 'chat' ? 'block' : 'none'; if(target === 'analysis') renderAnalysisTab(); if(target === 'info') renderInfoTab(); }); });
window.closeModal = () => document.getElementById('reasonModal').style.display = 'none';
document.getElementById('fullscreenChat').onclick = () => document.querySelector('.chat-container').requestFullscreen();
</script>
