<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ORAFUT · Match Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #1a1e24; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Poppins', sans-serif; padding: 16px; }
    
    /* Phone Frame */
    .phone-frame { max-width: 400px; width: 100%; height: 85vh; min-height: 650px; background: #ffffff; border-radius: 44px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; position: relative; }
    .phone-frame::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; background: #ddd; border-radius: 10px; z-index: 10; }
    
    /* Header #252A2D */
    .main-header { background: #252A2D; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .back-btn { background: transparent; border: 1.5px solid #9CE800; color: #9CE800; border-radius: 30px; padding: 6px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .brand { font-size: 20px; font-weight: 800; font-style: italic; }
    .brand .ora { color: white; }
    .brand .fut { color: #9CE800; }
    .search-bar { background: rgba(255,255,255,0.12); border-radius: 30px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; flex: 1; max-width: 140px; }
    .search-bar .iconify { color: #9CE800; font-size: 14px; }
    .search-bar input { background: none; border: none; color: white; font-size: 12px; width: 100%; outline: none; }
    .search-bar input::placeholder { color: rgba(255,255,255,0.5); }
    
    /* Hero Section with Team Logos Background */
    .hero-section { background: linear-gradient(135deg, #0f1219 0%, #1a1f2c 100%); padding: 20px 16px; text-align: center; position: relative; overflow: hidden; }
    .hero-bg-logos { position: absolute; inset: 0; opacity: 0.15; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px; pointer-events: none; }
    .hero-bg-logos img { width: 70px; height: 70px; object-fit: contain; filter: blur(1px); }
    .teams-container { display: flex; align-items: center; justify-content: space-evenly; gap: 12px; position: relative; z-index: 2; }
    .team-card { text-align: center; }
    .team-logo-hero { width: 85px; height: 85px; background: #ffffff10; border-radius: 50%; backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; border: 2px solid #9CE800; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .team-logo-hero img { width: 70px; height: 70px; object-fit: contain; border-radius: 50%; }
    .team-name-hero { color: white; font-weight: 700; font-size: 14px; text-shadow: 0 1px 2px black; }
    .vs-text { font-size: 24px; font-weight: 900; color: #9CE800; text-shadow: 0 0 8px #9CE800; }
    
    /* Horizontal Tab Bar */
    .tab-bar { display: flex; background: #ffffff; border-bottom: 1px solid #eef2f6; padding: 0 12px; gap: 8px; flex-shrink: 0; }
    .tab-item { flex: 1; text-align: center; padding: 14px 0; font-weight: 700; font-size: 14px; color: #64748b; cursor: pointer; position: relative; transition: 0.2s; }
    .tab-item.active { color: #9CE800; }
    .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px; background: #9CE800; border-radius: 3px; }
    
    /* Scrollable Content */
    .content-area { flex: 1; overflow-y: auto; padding: 20px 16px; background: #f8fafc; }
    
    /* Cards & UI */
    .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #edf2f7; }
    .form-group { margin-bottom: 18px; }
    label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 6px; color: #1e293b; }
    select, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-family: inherit; font-size: 14px; background: white; outline: none; }
    select:focus, textarea:focus { border-color: #9CE800; }
    .image-upload-grid { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
    .img-upload-btn { background: #f1f5f9; padding: 10px; border-radius: 40px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .preview-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .preview-img-item { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 1px solid #ddd; }
    .add-feature-row { display: flex; gap: 8px; margin: 12px 0; }
    .add-feature-row input { flex: 1; padding: 10px; border-radius: 40px; border: 1px solid #ddd; }
    .small-btn { background: #9CE800; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 700; cursor: pointer; }
    .send-vote-btn { background: #0f172a; color: white; width: 100%; padding: 14px; border-radius: 40px; font-weight: 800; border: none; margin-top: 8px; cursor: pointer; }
    
    /* Analysis Items */
    .analysis-item { background: #f1f5f9; border-radius: 16px; padding: 12px; margin-bottom: 12px; cursor: pointer; transition: 0.1s; }
    .analysis-user { font-weight: 800; font-size: 13px; display: flex; justify-content: space-between; }
    .analysis-preview { font-size: 12px; color: #475569; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expanded-reason { margin-top: 12px; padding-top: 12px; border-top: 1px solid #ddd; display: none; }
    .expanded-reason.show { display: block; }
    .send-to-chat-btn { background: #9CE80020; border: none; padding: 6px 12px; border-radius: 30px; font-size: 11px; margin-top: 8px; cursor: pointer; }
    
    /* Chat Styles */
    .chat-container { display: flex; flex-direction: column; height: 100%; }
    .mini-player { background: #000; border-radius: 20px; margin-bottom: 12px; overflow: hidden; display: none; }
    .mini-player.active { display: block; }
    .youtube-embed { width: 100%; aspect-ratio: 16/9; border: none; }
    .chat-messages { max-height: 320px; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 10px; }
    .chat-bubble { background: white; border-radius: 18px; padding: 10px 14px; max-width: 90%; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #eef2f6; }
    .chat-username { font-weight: 800; font-size: 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chat-username.red { color: #dc2626; }
    .chat-username.blue { color: #3b82f6; }
    .chat-username.gray { color: #64748b; }
    .chat-text { font-size: 13px; word-break: break-word; }
    .chat-actions { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; }
    .chat-action { color: #94a3b8; cursor: pointer; }
    .chat-input-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .chat-input-row input { flex: 1; padding: 12px; border-radius: 40px; border: 1px solid #ddd; }
    .live-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 30px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
    
    /* Notifications */
    .toast-notify { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; font-size: 12px; z-index: 1000; animation: fadeUp 2s forwards; pointer-events: none; }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 10% { opacity: 1; transform: translateX(-50%) translateY(0); } 90% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    
    .info-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eef2f6; }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="main-header">
    <button class="back-btn" id="backBtn"><span class="iconify" data-icon="mdi:arrow-left"></span> Back</button>
    <div class="brand"><span class="ora">ORA</span><span class="fut">FUT</span></div>
    <div class="search-bar"><span class="iconify" data-icon="mdi:magnify"></span><input type="text" placeholder="Search..."></div>
  </div>
  
  <div class="hero-section" id="heroSection">
    <div class="hero-bg-logos" id="heroBgLogos"></div>
    <div class="teams-container">
      <div class="team-card"><div class="team-logo-hero" id="heroLogoA"><img src=""></div><div class="team-name-hero" id="heroNameA">Team A</div></div>
      <div class="vs-text">VS</div>
      <div class="team-card"><div class="team-logo-hero" id="heroLogoB"><img src=""></div><div class="team-name-hero" id="heroNameB">Team B</div></div>
    </div>
  </div>
  
  <div class="tab-bar">
    <div class="tab-item active" data-tab="vote">VOTE</div>
    <div class="tab-item" data-tab="analysis">ANALYSIS</div>
    <div class="tab-item" data-tab="info">INFO</div>
    <div class="tab-item" data-tab="chat">CHAT</div>
  </div>
  
  <div class="content-area" id="contentArea">
    <!-- VOTE TAB -->
    <div id="voteTab" class="tab-pane">
      <div class="card" id="voteCard"></div>
    </div>
    <!-- ANALYSIS TAB -->
    <div id="analysisTab" class="tab-pane" style="display:none;"></div>
    <!-- INFO TAB -->
    <div id="infoTab" class="tab-pane" style="display:none;"></div>
    <!-- CHAT TAB -->
    <div id="chatTab" class="tab-pane" style="display:none;">
      <div class="chat-container">
        <button id="liveStreamBtn" class="live-btn"><span class="iconify" data-icon="mdi:youtube"></span> LIVE STREAM</button>
        <div id="miniPlayer" class="mini-player"><iframe id="youtubeFrame" class="youtube-embed" src=""></iframe></div>
        <div class="chat-messages" id="chatMessagesList"></div>
        <div class="chat-input-row">
          <input type="text" id="chatMessageInput" placeholder="Type message...">
          <button id="sendChatMsgBtn" style="background:#9CE800;border:none;border-radius:40px;padding:0 18px;font-weight:800;">Send</button>
        </div>
        <div style="display:flex; gap:6px; margin-top:8px;"><button id="emojiChatBtn" style="background:#f1f5f9;border:none;border-radius:30px;padding:6px;">😊 Emoji</button><button id="uploadChatImgBtn" style="background:#f1f5f9;border:none;border-radius:30px;padding:6px;">📷 Image</button><input type="file" id="chatImageInput" accept="image/*" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script>
  // Firebase Config
  const firebaseConfig = { apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  const IMGBB_KEY = "0f248e70fc4e7dffde307dd772823379";
  
  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('id') || "testMatch";
  let currentUser = { uid: 'anon_' + Date.now(), displayName: 'Fan_' + Math.random().toString(36).substr(2,4), email: 'guest@local' };
  let matchData = null;
  let userVote = null;
  let uploadedImages = [];
  let additionalFeatures = [];
  let currentAnalysisType = 'team1'; // team1 or team2
  let chatMessagesUnsub = null;
  
  // Helper: show notification
  function showToast(msg, isError = false) { const toast = document.createElement('div'); toast.className = 'toast-notify'; toast.innerText = msg; toast.style.background = isError ? '#dc2626' : '#1e293b'; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2200); }
  
  // Load Match & User Vote
  async function loadMatch() {
    const doc = await db.collection('matches').doc(matchId).get();
    if(!doc.exists) { showToast("Match not found", true); return; }
    matchData = doc.data();
    document.getElementById('heroNameA').innerText = matchData.teamAName || 'Team A';
    document.getElementById('heroNameB').innerText = matchData.teamBName || 'Team B';
    document.getElementById('heroLogoA').innerHTML = `<img src="${matchData.teamALogo || 'https://placehold.co/100?text=Logo'}">`;
    document.getElementById('heroLogoB').innerHTML = `<img src="${matchData.teamBLogo || 'https://placehold.co/100?text=Logo'}">`;
    // Background logos
    const bgDiv = document.getElementById('heroBgLogos');
    bgDiv.innerHTML = `<img src="${matchData.teamALogo}" style="width:80px"><img src="${matchData.teamBLogo}" style="width:80px"><img src="${matchData.leagueLogo || ''}" style="width:80px">`;
    await checkUserVote();
    renderVoteTab();
    renderInfoTab();
    renderAnalysisTab();
    initChat();
  }
  
  async function checkUserVote() {
    const snap = await db.collection('votes').where('matchId','==',matchId).where('userId','==',currentUser.uid).get();
    if(!snap.empty) userVote = snap.docs[0].data();
    else userVote = null;
  }
  
  // VOTE TAB UI
  function renderVoteTab() {
    const container = document.getElementById('voteCard');
    if(userVote) {
      container.innerHTML = `<div style="text-align:center;padding:20px;"><span class="iconify" data-icon="mdi:check-circle" style="font-size:48px;color:#9CE800;"></span><h3>You voted for ${userVote.voteType === 'team1' ? matchData?.teamAName : (userVote.voteType === 'team2' ? matchData?.teamBName : 'Draw')}</h3><p>Reason: ${userVote.reason || 'No reason'}</p>${userVote.imageUrl ? `<img src="${userVote.imageUrl}" style="width:80px;border-radius:12px;">` : ''}</div>`;
      return;
    }
    container.innerHTML = `
      <div class="form-group"><label>Your Prediction</label><select id="voteSelect"><option value="team1">${matchData?.teamAName} Win</option><option value="draw">Draw</option><option value="team2">${matchData?.teamBName} Win</option></select></div>
      <div class="form-group"><label>Why do you think so? (optional)</label><textarea id="voteReason" rows="2" placeholder="Share your insight..."></textarea></div>
      <div><div class="img-upload-btn" id="uploadImagesBtn"><span class="iconify" data-icon="mdi:image-plus"></span> Upload Images (max 8)</div><input type="file" id="voteImagesInput" multiple accept="image/*" style="display:none"><div id="imagePreviewGrid" class="preview-images"></div></div>
      <div class="form-group"><label>Other features (add extra notes)</label><div class="add-feature-row"><input type="text" id="featureInput" placeholder="e.g., Key player missing"><button id="addFeatureBtn" class="small-btn">Add</button></div><div id="featuresList"></div></div>
      <button id="sendVoteFinalBtn" class="send-vote-btn">✅ SEND VOTE</button>
    `;
    let imagesArray = [];
    document.getElementById('uploadImagesBtn').onclick = () => document.getElementById('voteImagesInput').click();
    document.getElementById('voteImagesInput').onchange = async (e) => {
      const files = Array.from(e.target.files);
      if(imagesArray.length + files.length > 8) { showToast("Max 8 images", true); return; }
      for(let file of files) {
        const fd = new FormData(); fd.append('image', file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
        const data = await res.json();
        if(data.success) imagesArray.push(data.data.url);
      }
      const previewDiv = document.getElementById('imagePreviewGrid');
      previewDiv.innerHTML = imagesArray.map(url => `<img src="${url}" class="preview-img-item">`).join('');
    };
    document.getElementById('addFeatureBtn').onclick = () => {
      const inp = document.getElementById('featureInput');
      if(inp.value.trim()) { additionalFeatures.push(inp.value); document.getElementById('featuresList').innerHTML = additionalFeatures.map(f => `<div style="background:#f1f5f9;padding:6px 12px;border-radius:20px;margin:4px;display:inline-block;">${f}</div>`).join(''); inp.value = ''; }
    };
    document.getElementById('sendVoteFinalBtn').onclick = async () => {
      const selectedVote = document.getElementById('voteSelect').value;
      const reason = document.getElementById('voteReason').value;
      await db.collection('votes').add({ matchId, userId: currentUser.uid, userName: currentUser.displayName, voteType: selectedVote, reason, images: imagesArray, features: additionalFeatures, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast("Vote submitted!");
      userVote = { voteType: selectedVote, reason, imageUrl: imagesArray[0] };
      renderVoteTab();
      renderAnalysisTab();
    };
  }
  
  // ANALYSIS TAB with reasons + expand + send to chat
  async function renderAnalysisTab() {
    const container = document.getElementById('analysisTab');
    container.innerHTML = `<div style="display:flex; gap:12px; margin-bottom:20px;"><button id="analysisTeam1Btn" style="flex:1;padding:12px;border-radius:40px;border:2px solid #9CE800;background:${currentAnalysisType==='team1'?'#9CE800':'white'};font-weight:800;">${matchData?.teamAName}</button><button id="analysisTeam2Btn" style="flex:1;padding:12px;border-radius:40px;border:2px solid #9CE800;background:${currentAnalysisType==='team2'?'#9CE800':'white'};font-weight:800;">${matchData?.teamBName}</button></div><div id="reasonsListContainer"></div>`;
    document.getElementById('analysisTeam1Btn').onclick = () => { currentAnalysisType='team1'; renderAnalysisTab(); };
    document.getElementById('analysisTeam2Btn').onclick = () => { currentAnalysisType='team2'; renderAnalysisTab(); };
    const votesSnap = await db.collection('votes').where('matchId','==',matchId).where('voteType','==',currentAnalysisType).get();
    const reasons = [];
    votesSnap.forEach(d => { if(d.data().reason) reasons.push({ id: d.id, userName: d.data().userName || 'User', reason: d.data().reason, images: d.data().images || [] }); });
    const containerReasons = document.getElementById('reasonsListContainer');
    if(reasons.length===0) { containerReasons.innerHTML = '<div class="card">No reasons yet.</div>'; return; }
    containerReasons.innerHTML = reasons.map(r => `<div class="analysis-item" data-id="${r.id}"><div class="analysis-user"><span>${r.userName}</span><span class="analysis-preview">${r.reason.substring(0,50)}...</span></div><div class="expanded-reason" id="exp-${r.id}"><div>${r.reason}</div>${r.images.map(img => `<img src="${img}" style="width:60px;border-radius:8px;">`).join('')}<button class="send-to-chat-btn" data-reason="${r.reason.replace(/"/g, '&quot;')}">💬 Send to Chat</button></div></div>`).join('');
    document.querySelectorAll('.analysis-item').forEach(el => {
      const id = el.dataset.id;
      const expandDiv = document.getElementById(`exp-${id}`);
      el.addEventListener('click', (e) => { e.stopPropagation(); expandDiv.classList.toggle('show'); });
      const sendBtn = el.querySelector('.send-to-chat-btn');
      if(sendBtn) sendBtn.onclick = (e) => { e.stopPropagation(); sendReasonToChat(sendBtn.dataset.reason); };
    });
  }
  async function sendReasonToChat(text) { await db.collection('chatMessages').add({ matchId, userId: currentUser.uid, userName: currentUser.displayName, text: `📢 ${text}`, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); showToast("Sent to chat!"); }
  
  // INFO TAB
  function renderInfoTab() {
    if(!matchData) return;
    document.getElementById('infoTab').innerHTML = `<div class="card"><div class="info-line"><span>League</span><strong>${matchData.leagueName || 'Unknown'}</strong></div><div class="info-line"><span>Match Time</span><strong>${matchData.startTime ? new Date(matchData.startTime.toDate()).toLocaleString() : 'TBD'}</strong></div><div class="info-line"><span>Status</span><strong>${matchData.status || 'Upcoming'}</strong></div><div class="info-line"><span>Real Winner (if ended)</span><strong>${matchData.winner || '—'}</strong></div><div class="info-line"><span>Stadium</span><strong>${matchData.stadium || 'Not specified'}</strong></div></div>`;
  }
  
  // ADVANCED CHAT with Reply, Emoji, Edit, Delete, Copy, Images, Links
  let chatMessages = [];
  function initChat() {
    if(chatMessagesUnsub) chatMessagesUnsub();
    chatMessagesUnsub = db.collection('chatMessages').where('matchId','==',matchId).orderBy('createdAt','asc').onSnapshot(snap => {
      chatMessages = [];
      snap.forEach(doc => chatMessages.push({ id: doc.id, ...doc.data() }));
      renderChatMessages();
    });
    document.getElementById('sendChatMsgBtn').onclick = sendChatMessage;
    document.getElementById('chatMessageInput').addEventListener('keypress', (e) => { if(e.key==='Enter') sendChatMessage(); });
    document.getElementById('emojiChatBtn').onclick = () => { document.getElementById('chatMessageInput').value += '😊 '; };
    document.getElementById('uploadChatImgBtn').onclick = () => document.getElementById('chatImageInput').click();
    document.getElementById('chatImageInput').onchange = async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const fd = new FormData(); fd.append('image', file);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
      const data = await res.json();
      if(data.success) await db.collection('chatMessages').add({ matchId, userId: currentUser.uid, userName: currentUser.displayName, text: "📷 Image", imageUrl: data.data.url, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast("Image uploaded");
    };
    document.getElementById('liveStreamBtn').onclick = () => {
      const player = document.getElementById('miniPlayer');
      player.classList.toggle('active');
      if(player.classList.contains('active')) document.getElementById('youtubeFrame').src = matchData?.streamUrl || "https://www.youtube.com/embed/dQw4w9WgXcQ";
      else document.getElementById('youtubeFrame').src = "";
    };
  }
  
  function getUserColorClass(voteType) { if(voteType === 'team1') return 'red'; if(voteType === 'team2') return 'blue'; return 'gray'; }
  
  async function renderChatMessages() {
    const container = document.getElementById('chatMessagesList');
    if(!container) return;
    const userVotesMap = new Map();
    const votesSnap = await db.collection('votes').where('matchId','==',matchId).get();
    votesSnap.forEach(v => { userVotesMap.set(v.data().userId, v.data().voteType); });
    container.innerHTML = chatMessages.map(msg => {
      const voteType = userVotesMap.get(msg.userId);
      const colorClass = getUserColorClass(voteType);
      return `<div class="chat-bubble" data-msgid="${msg.id}"><div class="chat-username ${colorClass}"><span>${msg.userName || 'User'}</span><span style="font-size:9px;">${msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString() : ''}</span></div><div class="chat-text">${linkify(msg.text)}</div>${msg.imageUrl ? `<img src="${msg.imageUrl}" style="max-width:120px;border-radius:12px;margin-top:6px;">` : ''}<div class="chat-actions"><span class="chat-action" onclick="replyToMessage('${msg.id}')">Reply</span><span class="chat-action" onclick="copyMessage('${msg.text.replace(/'/g, "\\'")}')">Copy</span>${msg.userId === currentUser.uid ? `<span class="chat-action" onclick="editMessage('${msg.id}','${msg.text.replace(/'/g, "\\'")}')">Edit</span><span class="chat-action" onclick="deleteMessage('${msg.id}')">Delete</span>` : ''}</div></div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }
  window.replyToMessage = (id) => { const msg = chatMessages.find(m => m.id === id); if(msg) document.getElementById('chatMessageInput').value = `@${msg.userName} `; };
  window.copyMessage = (text) => { navigator.clipboard.writeText(text); showToast("Copied!"); };
  window.editMessage = async (id, oldText) => { const newText = prompt("Edit message:", oldText); if(newText) await db.collection('chatMessages').doc(id).update({ text: newText }); };
  window.deleteMessage = async (id) => { if(confirm("Delete?")) await db.collection('chatMessages').doc(id).delete(); };
  function linkify(text) { return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#9CE800;">$1</a>'); }
  async function sendChatMessage() { const input = document.getElementById('chatMessageInput'); if(!input.value.trim()) return; await db.collection('chatMessages').add({ matchId, userId: currentUser.uid, userName: currentUser.displayName, text: input.value, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); input.value = ''; }
  
  // Tab Switching
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('voteTab').style.display = target === 'vote' ? 'block' : 'none';
      document.getElementById('analysisTab').style.display = target === 'analysis' ? 'block' : 'none';
      document.getElementById('infoTab').style.display = target === 'info' ? 'block' : 'none';
      document.getElementById('chatTab').style.display = target === 'chat' ? 'block' : 'none';
      if(target === 'analysis') renderAnalysisTab();
    });
  });
  document.getElementById('backBtn').onclick = () => window.location.href = 'index.html';
  
  // Anonymous login
  auth.signInAnonymously().catch(() => { currentUser = { uid: 'anon', displayName: 'Guest' }; loadMatch(); }).then(user => { if(user) { currentUser = { uid: user.user.uid, displayName: 'Fan_' + user.user.uid.slice(-4) }; loadMatch(); } else loadMatch(); });
</script>
</body>
