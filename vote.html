<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ORAFUT · Vote</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; font-family: 'Poppins', sans-serif; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    :root { --vibrant-green: #9CE800; --dark-bg: #1A1A2E; --card-bg: #16213E; --accent: #E94560; }
    
    .header { background: var(--dark-bg); padding: 20px 30px; border-radius: 20px 20px 0 0; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border-bottom: 3px solid var(--vibrant-green); }
    .back-btn { background: transparent; border: 2px solid var(--vibrant-green); color: var(--vibrant-green); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; text-decoration: none; transition: all 0.2s; }
    .back-btn:hover { background: var(--vibrant-green); color: #000; transform: translateX(-5px); }
    .header h1 { color: white; font-size: 28px; font-weight: 800; }
    .header h1 span { color: var(--vibrant-green); }
    .match-status { margin-left: auto; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 14px; text-transform: uppercase; }
    .status-live { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
    .status-upcoming { background: #f59e0b; color: white; }
    .status-completed { background: #10b981; color: white; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    
    .match-hero { background: linear-gradient(135deg, var(--card-bg) 0%, #0F172A 100%); padding: 40px 30px; margin-bottom: 20px; border-radius: 0 0 20px 20px; }
    .teams-showcase { display: flex; align-items: center; justify-content: space-around; gap: 20px; }
    .team-block { text-align: center; flex: 1; }
    .team-logo-large { width: 120px; height: 120px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 4px solid var(--vibrant-green); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .team-logo-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
    .team-logo-large .iconify { font-size: 60px; color: #1A1A1A; }
    .team-name-hero { color: white; font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
    .team-league-hero { color: var(--vibrant-green); font-size: 14px; font-weight: 600; }
    .vs-circle { background: var(--vibrant-green); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(156,232,0,0.3); }
    .vs-circle span { color: #000; font-size: 28px; font-weight: 900; }
    .match-info-bar { display: flex; justify-content: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
    .info-item { display: flex; align-items: center; gap: 10px; color: #CCC; }
    .info-item .iconify { color: var(--vibrant-green); font-size: 20px; }
    
    .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
    
    .vote-panel { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .section-title { font-size: 20px; font-weight: 800; color: #1A1A1A; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .section-title .iconify { color: var(--vibrant-green); font-size: 24px; }
    .vote-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
    .vote-card { background: #F8F9FA; border: 3px solid #E9ECEF; border-radius: 16px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .vote-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .vote-card.selected { border-color: var(--vibrant-green); background: rgba(156,232,0,0.1); box-shadow: 0 8px 0 #6B9E00; }
    .vote-card .iconify { font-size: 36px; color: var(--vibrant-green); margin-bottom: 12px; }
    .vote-label { font-size: 14px; font-weight: 700; color: #1A1A1A; margin-bottom: 10px; }
    .vote-percent { font-size: 28px; font-weight: 900; color: var(--vibrant-green); margin-bottom: 5px; }
    .vote-count { font-size: 12px; color: #999; }
    .submit-vote-btn { width: 100%; background: var(--vibrant-green); border: none; color: #000; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 0 #6B9E00; transition: 0.15s; }
    .submit-vote-btn:hover:not(:disabled) { background: #A8F010; transform: translateY(-3px); box-shadow: 0 11px 0 #6B9E00; }
    .submit-vote-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #CCC; box-shadow: 0 8px 0 #999; }
    .voted-message { text-align: center; padding: 20px; background: rgba(156,232,0,0.1); border-radius: 16px; color: #1A1A1A; font-weight: 600; border: 2px solid var(--vibrant-green); }
    
    .stats-panel { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .stats-bar { margin-bottom: 20px; }
    .stats-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .stats-label { width: 40px; font-weight: 700; color: #1A1A1A; }
    .stats-bar-container { flex: 1; height: 30px; background: #E9ECEF; border-radius: 15px; overflow: hidden; position: relative; }
    .stats-bar-fill { height: 100%; background: linear-gradient(90deg, var(--vibrant-green) 0%, #7EB800 100%); border-radius: 15px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; color: #000; font-weight: 700; font-size: 12px; }
    .stats-count { width: 60px; text-align: right; font-weight: 700; color: #1A1A1A; }
    
    .stream-section { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .stream-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .stream-btn { flex: 1; padding: 14px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 700; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .youtube-btn { background: #FF0000; color: white; }
    .youtube-btn:hover { background: #CC0000; transform: translateY(-2px); }
    .iptv-btn { background: #6C5CE7; color: white; }
    .iptv-btn:hover { background: #5B4BC4; transform: translateY(-2px); }
    
    .chat-section { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .chat-messages { height: 300px; overflow-y: auto; padding: 15px; background: #F8F9FA; border-radius: 12px; margin-bottom: 15px; }
    .message { padding: 12px; background: white; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .message-user { font-weight: 700; color: var(--vibrant-green); font-size: 13px; }
    .message-time { font-size: 10px; color: #999; }
    .message-text { font-size: 14px; color: #333; line-height: 1.4; }
    .chat-input-area { display: flex; gap: 10px; }
    .chat-input { flex: 1; padding: 14px 16px; border: 2px solid #E9ECEF; border-radius: 12px; font-size: 14px; outline: none; }
    .chat-input:focus { border-color: var(--vibrant-green); }
    .chat-send { background: var(--vibrant-green); border: none; padding: 14px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 0 #6B9E00; transition: 0.15s; }
    .chat-send:hover { background: #A8F010; transform: translateY(-2px); box-shadow: 0 6px 0 #6B9E00; }
    
    .loading { text-align: center; padding: 60px; color: white; font-size: 18px; }
    .error-message { background: rgba(239,68,68,0.1); border: 2px solid #ef4444; color: white; padding: 20px; border-radius: 16px; text-align: center; }
    
    @media (max-width: 768px) {
      body { padding: 10px; }
      .header { padding: 16px; }
      .header h1 { font-size: 22px; }
      .match-status { margin-left: 0; width: 100%; text-align: center; }
      .team-logo-large { width: 80px; height: 80px; }
      .team-name-hero { font-size: 20px; }
      .vs-circle { width: 50px; height: 50px; }
      .vs-circle span { font-size: 18px; }
      .main-grid { grid-template-columns: 1fr; }
      .vote-options { grid-template-columns: 1fr; }
      .info-item { font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-btn">← BACK TO HOME</a>
    <h1>ORA<span>FUT</span> · MATCH CENTER</h1>
    <div class="match-status" id="matchStatus">LOADING...</div>
  </div>
  <div id="content"><div class="loading"><span class="iconify" data-icon="mdi:loading" style="animation: spin 1s linear infinite;"></span> Loading match details...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
(function(){
  "use strict";
  
  firebase.initializeApp({ apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" });
  const db = firebase.firestore();
  
  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('id');
  const content = document.getElementById('content');
  
  let anonymousId = localStorage.getItem('anonymousId') || 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('anonymousId', anonymousId);
  let match = null;
  let selectedVote = null;
  let hasVoted = false;

  async function loadMatch() {
    if (!matchId) { content.innerHTML = '<div class="error-message">No match specified</div>'; return; }
    
    try {
      var doc = await db.collection('matches').doc(matchId).get();
      if (!doc.exists) { content.innerHTML = '<div class="error-message">Match not found</div>'; return; }
      
      match = { id: doc.id, ...doc.data() };
      
      var votesSnap = await db.collection('votes').where('matchId', '==', matchId).get();
      var totalVotes = votesSnap.size;
      var teamAVotes = votesSnap.docs.filter(function(v) { return v.data().voteType === 'team1'; }).length;
      var drawVotes = votesSnap.docs.filter(function(v) { return v.data().voteType === 'draw'; }).length;
      var teamBVotes = votesSnap.docs.filter(function(v) { return v.data().voteType === 'team2'; }).length;
      
      match.voteCounts = { team1: teamAVotes, draw: drawVotes, team2: teamBVotes, total: totalVotes };
      match.percentages = {
        team1: totalVotes > 0 ? Math.round((teamAVotes / totalVotes) * 100) : 0,
        draw: totalVotes > 0 ? Math.round((drawVotes / totalVotes) * 100) : 0,
        team2: totalVotes > 0 ? Math.round((teamBVotes / totalVotes) * 100) : 0
      };
      
      var userVote = votesSnap.docs.find(function(v) { return v.data().anonymousId === anonymousId; });
      hasVoted = !!userVote;
      if (hasVoted) selectedVote = userVote.data().voteType;
      
      renderMatch();
      setupChat();
    } catch(e) {
      content.innerHTML = '<div class="error-message">Error loading match</div>';
    }
  }

  function renderMatch() {
    var status = match.status || 'upcoming';
    var statusClass = status === 'live' ? 'status-live' : (status === 'completed' ? 'status-completed' : 'status-upcoming');
    var statusText = status === 'live' ? '🔴 LIVE NOW' : (status === 'completed' ? '✓ COMPLETED' : '⏰ UPCOMING');
    document.getElementById('matchStatus').className = 'match-status ' + statusClass;
    document.getElementById('matchStatus').innerHTML = statusText;
    
    var startTime = match.startTime ? match.startTime.toDate() : new Date();
    var timeDisplay = startTime.toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    
    var html = '<div class="match-hero"><div class="teams-showcase"><div class="team-block"><div class="team-logo-large">' + 
      (match.teamALogo ? '<img src="' + match.teamALogo + '" alt="' + match.teamAName + '">' : '<span class="iconify" data-icon="mdi:shield-half-full"></span>') + 
      '</div><div class="team-name-hero">' + (match.teamAName || 'Team A') + '</div><div class="team-league-hero">' + (match.leagueName || '') + '</div></div>' +
      '<div class="vs-circle"><span>VS</span></div><div class="team-block"><div class="team-logo-large">' + 
      (match.teamBLogo ? '<img src="' + match.teamBLogo + '" alt="' + match.teamBName + '">' : '<span class="iconify" data-icon="mdi:shield-half-full"></span>') + 
      '</div><div class="team-name-hero">' + (match.teamBName || 'Team B') + '</div><div class="team-league-hero">' + (match.leagueName || '') + '</div></div></div>' +
      '<div class="match-info-bar"><div class="info-item"><span class="iconify" data-icon="mdi:calendar"></span><span>' + timeDisplay + '</span></div>' +
      '<div class="info-item"><span class="iconify" data-icon="mdi:trophy"></span><span>' + (match.leagueName || 'Friendly') + '</span></div>' +
      '<div class="info-item"><span class="iconify" data-icon="mdi:account-group"></span><span>' + match.voteCounts.total + ' Votes</span></div></div></div>';
    
    html += '<div class="main-grid"><div class="vote-panel"><div class="section-title"><span class="iconify" data-icon="mdi:vote"></span> CAST YOUR PREDICTION</div>';
    
    if (hasVoted) {
      html += '<div class="voted-message"><span class="iconify" data-icon="mdi:check-circle" style="font-size:40px;color:#9CE800;"></span><h3 style="margin:10px 0;">VOTE SUBMITTED!</h3><p>You predicted: <strong>' + 
        (selectedVote === 'team1' ? match.teamAName + ' WIN' : selectedVote === 'draw' ? 'DRAW' : match.teamBName + ' WIN') + '</strong></p></div>';
    } else {
      html += '<div class="vote-options">' +
        '<div class="vote-card" data-vote="team1"><span class="iconify" data-icon="mdi:soccer"></span><div class="vote-label">' + (match.teamAName || 'HOME') + '</div><div class="vote-percent">' + match.percentages.team1 + '%</div><div class="vote-count">' + match.voteCounts.team1 + ' votes</div></div>' +
        '<div class="vote-card" data-vote="draw"><span class="iconify" data-icon="mdi:handshake"></span><div class="vote-label">DRAW</div><div class="vote-percent">' + match.percentages.draw + '%</div><div class="vote-count">' + match.voteCounts.draw + ' votes</div></div>' +
        '<div class="vote-card" data-vote="team2"><span class="iconify" data-icon="mdi:soccer"></span><div class="vote-label">' + (match.teamBName || 'AWAY') + '</div><div class="vote-percent">' + match.percentages.team2 + '%</div><div class="vote-count">' + match.voteCounts.team2 + ' votes</div></div>' +
        '</div><button class="submit-vote-btn" id="submitVoteBtn">SUBMIT VOTE</button>';
    }
    
    html += '</div><div class="stats-panel"><div class="section-title"><span class="iconify" data-icon="mdi:chart-bar"></span> VOTE DISTRIBUTION</div><div class="stats-bar">' +
      '<div class="stats-item"><span class="stats-label">1</span><div class="stats-bar-container"><div class="stats-bar-fill" style="width:' + match.percentages.team1 + '%;">' + (match.percentages.team1 > 10 ? match.percentages.team1 + '%' : '') + '</div></div><span class="stats-count">' + match.voteCounts.team1 + '</span></div>' +
      '<div class="stats-item"><span class="stats-label">X</span><div class="stats-bar-container"><div class="stats-bar-fill" style="width:' + match.percentages.draw + '%;background:#FFB800;">' + (match.percentages.draw > 10 ? match.percentages.draw + '%' : '') + '</div></div><span class="stats-count">' + match.voteCounts.draw + '</span></div>' +
      '<div class="stats-item"><span class="stats-label">2</span><div class="stats-bar-container"><div class="stats-bar-fill" style="width:' + match.percentages.team2 + '%;">' + (match.percentages.team2 > 10 ? match.percentages.team2 + '%' : '') + '</div></div><span class="stats-count">' + match.voteCounts.team2 + '</span></div>' +
      '</div><div style="margin-top:20px;padding:15px;background:#F8F9FA;border-radius:12px;text-align:center;"><span style="font-weight:700;">Total Votes: </span><span style="font-size:24px;font-weight:900;color:#9CE800;">' + match.voteCounts.total + '</span></div></div></div>';
    
    if (match.youtubeUrl || match.iptvUrl) {
      html += '<div class="stream-section"><div class="section-title"><span class="iconify" data-icon="mdi:play-circle"></span> WATCH STREAM</div><div class="stream-buttons">';
      if (match.youtubeUrl) html += '<a href="' + match.youtubeUrl + '" target="_blank" class="stream-btn youtube-btn"><span class="iconify" data-icon="mdi:youtube"></span> YOUTUBE</a>';
      if (match.iptvUrl) html += '<a href="' + match.iptvUrl + '" target="_blank" class="stream-btn iptv-btn"><span class="iconify" data-icon="mdi:television"></span> IPTV</a>';
      html += '</div></div>';
    }
    
    html += '<div class="chat-section"><div class="section-title"><span class="iconify" data-icon="mdi:chat"></span> LIVE CHAT</div><div class="chat-messages" id="chatMessages"><div style="text-align:center;color:#999;">Loading messages...</div></div><div class="chat-input-area"><input type="text" class="chat-input" id="chatInput" placeholder="Type your message..."><button class="chat-send" id="sendMessageBtn"><span class="iconify" data-icon="mdi:send"></span></button></div></div>';
    
    content.innerHTML = html;
    
    if (!hasVoted) {
      document.querySelectorAll('.vote-card').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.vote-card').forEach(function(o) { o.classList.remove('selected'); });
          el.classList.add('selected');
          selectedVote = el.dataset.vote;
        });
      });
      document.getElementById('submitVoteBtn').addEventListener('click', submitVote);
    }
    
    document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
  }

  async function submitVote() {
    if (!selectedVote) { alert('Please select a vote option'); return; }
    try {
      await db.collection('votes').add({
        matchId: matchId, anonymousId: anonymousId, voteType: selectedVote,
        matchName: match.teamAName + ' vs ' + match.teamBName, sport: match.sport, league: match.league,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      location.reload();
    } catch(e) { alert('Error submitting vote'); }
  }

  function setupChat() {
    var container = document.getElementById('chatMessages');
    db.collection('messages').where('matchId', '==', matchId).orderBy('createdAt', 'asc').onSnapshot(function(snap) {
      var messages = [];
      snap.forEach(function(doc) { messages.push(doc.data()); });
      if (messages.length === 0) { container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">No messages yet. Start the conversation!</div>'; return; }
      var html = '';
      messages.forEach(function(msg) {
        html += '<div class="message"><div class="message-header"><span class="message-user">' + (msg.anonymousId ? 'User ' + msg.anonymousId.substr(0, 6) : 'Anonymous') + '</span><span class="message-time">' + (msg.createdAt ? msg.createdAt.toDate().toLocaleTimeString() : 'Just now') + '</span></div><div class="message-text">' + (msg.content || '') + '</div></div>';
      });
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    });
  }

  async function sendMessage() {
    var input = document.getElementById('chatInput');
    var content = input.value.trim();
    if (!content) return;
    input.value = '';
    try {
      await db.collection('messages').add({
        matchId: matchId, anonymousId: anonymousId, content: content,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) { alert('Error sending message'); }
  }

  loadMatch();
})();
</script>
</body>
</html>
