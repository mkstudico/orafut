<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ORAFUT · Vote & Predict</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7fb; font-family: 'Poppins', sans-serif; }
    .app-container { max-width: 1400px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
    
    /* Header */
    .main-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: #ffffff; border-bottom: 2px solid #e8eef2; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .back-btn { background: transparent; border: 2px solid #9CE800; color: #1a1a1a; font-size: 18px; cursor: pointer; padding: 6px 12px; border-radius: 10px; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .back-btn:hover { background: #9CE800; }
    .brand { font-size: 26px; font-weight: 800; font-style: italic; }
    .brand .ora { color: #1a1a1a; }
    .brand .fut { color: #9CE800; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .account-status { background: #f0f2f5; padding: 6px 16px; border-radius: 30px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .login-btn { background: #9CE800; border: none; padding: 6px 18px; border-radius: 30px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    
    /* Status */
    .status-box { text-align: center; padding: 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .status-light { display: inline-flex; align-items: center; gap: 10px; background: white; padding: 6px 20px; border-radius: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .led { width: 16px; height: 16px; border-radius: 50%; animation: pulseGreen 1.2s infinite; background: #9CE800; }
    @keyframes pulseGreen { 0% { opacity: 0.4; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.2); } }
    .led.red { background: #ef4444; animation: pulseRed 1s infinite; }
    @keyframes pulseRed { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    .status-text { font-weight: 800; font-size: 14px; }
    
    /* Cinematic Hero */
    .cinematic-hero { background: radial-gradient(circle at center, #0a0f1c 0%, #03060c 100%); padding: 40px 20px; display: flex; justify-content: center; align-items: center; gap: 40px; flex-wrap: wrap; box-shadow: 0 12px 30px rgba(0,0,0,0.3); position: relative; }
    .cinematic-hero::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 8px); pointer-events: none; }
    .hero-team { display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 2; }
    .hero-logo { width: 130px; height: 130px; filter: drop-shadow(0 0 20px rgba(156,232,0,0.4)); }
    .hero-logo img { width: 100%; height: 100%; object-fit: contain; }
    .hero-team-name { color: white; font-weight: 800; font-size: 18px; text-shadow: 0 0 10px #9CE800; }
    .hero-vs { font-size: 36px; font-weight: 900; color: rgba(255,255,255,0.7); text-shadow: 0 0 15px #9CE800; z-index: 2; }
    
    /* Layout */
    .content-grid { display: grid; grid-template-columns: 1fr 400px; gap: 24px; padding: 24px; background: #ffffff; }
    @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }
    
    .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #edf2f7; margin-bottom: 24px; }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; border-left: 5px solid #9CE800; padding-left: 14px; }
    
    .vote-options { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .vote-btn { flex: 1; padding: 14px; border: 2px solid #e2e8f0; border-radius: 60px; background: white; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .vote-btn:hover { border-color: #9CE800; background: #f9ffef; }
    .vote-btn.selected { background: #9CE800; border-color: #9CE800; color: #000; }
    
    .reason-area { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eef2f6; }
    .reason-textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 16px; font-family: inherit; margin-bottom: 12px; resize: vertical; }
    .image-upload-label { background: #f1f5f9; padding: 10px; border-radius: 40px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; display: inline-block; margin-right: 12px; }
    .preview-img { max-width: 80px; max-height: 80px; border-radius: 12px; margin-top: 8px; }
    .submit-vote-btn { background: #0f172a; color: white; padding: 12px 24px; border-radius: 40px; font-weight: 800; border: none; margin-top: 12px; cursor: pointer; width: 100%; }
    
    .distribution-bar { background: #f8fafc; border-radius: 20px; padding: 16px; margin: 16px 0; }
    .stat-item { margin-bottom: 12px; cursor: pointer; transition: 0.1s; }
    .stat-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .bar-bg { background: #e2e8f0; border-radius: 20px; overflow: hidden; height: 28px; }
    .bar-fill { height: 100%; width: 0%; background: #9CE800; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-weight: 800; font-size: 12px; }
    .draw-fill { background: #fbbf24; }
    
    .stream-wrapper { background: #000; border-radius: 20px; overflow: hidden; }
    .youtube-embed { width: 100%; aspect-ratio: 16 / 9; border: none; }
    .stream-placeholder { background: #0a0a0a; min-height: 280px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: #aaa; }
    
    /* ADVANCED CHAT */
    .chat-container { background: #ffffff; border-radius: 24px; border: 1px solid #eef2f6; display: flex; flex-direction: column; height: 75vh; position: sticky; top: 20px; }
    .chat-header { padding: 16px; border-bottom: 1px solid #eef2f6; display: flex; justify-content: space-between; align-items: center; background: #fafcff; border-radius: 24px 24px 0 0; }
    .chat-controls { display: flex; gap: 8px; }
    .chat-btn-icon { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: 0.1s; }
    .chat-btn-icon:hover { background: #eef2f6; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
    .chat-message { background: #f8fafc; border-radius: 16px; padding: 10px 14px; max-width: 85%; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .msg-user { font-weight: 800; font-size: 12px; color: #9CE800; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .msg-text { font-size: 13px; color: #1e293b; word-break: break-word; }
    .msg-img { max-width: 150px; border-radius: 12px; margin-top: 6px; cursor: pointer; }
    .msg-time { font-size: 9px; color: #94a3b8; margin-left: auto; }
    .chat-input-area { padding: 16px; border-top: 1px solid #eef2f6; display: flex; gap: 8px; flex-wrap: wrap; background: white; border-radius: 0 0 24px 24px; }
    .chat-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 40px; outline: none; font-family: inherit; }
    .chat-send { background: #9CE800; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 800; cursor: pointer; }
    .emoji-panel { display: none; position: absolute; bottom: 70px; background: white; border-radius: 20px; padding: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 100; flex-wrap: wrap; gap: 8px; width: 280px; }
    .emoji-panel.active { display: flex; }
    .emoji { font-size: 24px; cursor: pointer; padding: 4px; transition: 0.1s; }
    .emoji:hover { transform: scale(1.2); }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
    .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 32px; padding: 24px; max-height: 70vh; overflow-y: auto; }
    
    @media (max-width: 768px) { .hero-logo { width: 80px; height: 80px; } .hero-vs { font-size: 24px; } .hero-team-name { font-size: 12px; } }
  </style>
</head>
<body>
<div class="app-container">
  <header class="main-header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='index.html'"><span class="iconify" data-icon="mdi:arrow-left"></span> BACK</button>

  <div class="cinematic-hero" id="cinematicHero">
    <div class="hero-team"><div class="hero-logo" id="heroLogoA"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23222'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%239CE800' font-size='14'%3ETeam A%3C/text%3E%3C/svg%3E"></div><div class="hero-team-name" id="teamAName">Loading...</div></div>
    <div class="hero-vs">VS</div>
    <div class="hero-team"><div class="hero-logo" id="heroLogoB"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23222'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%239CE800' font-size='14'%3ETeam B%3C/text%3E%3C/svg%3E"></div><div class="hero-team-name" id="teamBName">Loading...</div></div>

  <div class="content-grid">
    <div>
      <div class="card">

        <div class="vote-options" id="voteOptions">
          <button class="vote-btn" data-vote="team1"><span class="iconify" data-icon="mdi:shield-check"></span> <span id="voteTeamAName">Team A</span></button>
          <button class="vote-btn" data-vote="draw"><span class="iconify" data-icon="mdi:hand-peace"></span> Draw</button>
          <button class="vote-btn" data-vote="team2"><span class="iconify" data-icon="mdi:shield-check"></span> <span id="voteTeamBName">Team B</span></button>
        </div>

          <textarea id="voteReason" class="reason-textarea" rows="2" placeholder="Why did you vote this way? (optional)"></textarea>
          <div><label class="image-upload-label"><span class="iconify" data-icon="mdi:image-plus"></span> Upload Image</label><input type="file" id="voteImage" accept="image/*" style="display:none"></div>
          <div id="imagePreview"></div>

        </div>
      </div>
      
      <div class="card">
        <div class="section-title"><span class="iconify" data-icon="mdi:chart-bar"></span> VOTE DISTRIBUTION</div>
        <div class="distribution-bar" id="distributionBar">
          <div class="stat-item" data-type="team1"><div class="stat-label"><span>🏆 <span id="statTeamAName">Team A</span></span><span id="percentTeam1">0%</span></div><div class="bar-bg"><div class="bar-fill" id="barTeam1" style="width:0%"></div></div></div>
          <div class="stat-item" data-type="draw"><div class="stat-label"><span>🤝 Draw</span><span id="percentDraw">0%</span></div><div class="bar-bg"><div class="bar-fill draw-fill" id="barDraw" style="width:0%"></div></div></div>
          <div class="stat-item" data-type="team2"><div class="stat-label"><span>🏆 <span id="statTeamBName">Team B</span></span><span id="percentTeam2">0%</span></div><div class="bar-bg"><div class="bar-fill" id="barTeam2" style="width:0%"></div></div></div>
        </div>
      </div>
      
      <div class="card">
        <div class="section-title"><span class="iconify" data-icon="mdi:youtube-tv"></span> STREAM (Login to watch)</div>
        <div class="stream-wrapper" id="streamWrapper"><div class="stream-placeholder"><span class="iconify" data-icon="mdi:lock-outline" style="font-size:48px;"></span><span>Login required</span></div></div>
      </div>
    </div>
    
    <div>
      <div class="chat-container">
        <div class="chat-header">
          <span><span class="iconify" data-icon="mdi:chat"></span> LIVE CHAT · <span id="onlineCount">0</span> online</span>
          <div class="chat-controls">
            <button id="clearChatBtn" class="chat-btn-icon" title="Clear chat (admin)"><span class="iconify" data-icon="mdi:delete-sweep"></span></button>
            <button id="fullscreenChatBtn" class="chat-btn-icon" title="Fullscreen"><span class="iconify" data-icon="mdi:fullscreen"></span></button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" style="position:relative;">
          <button id="emojiBtn" class="chat-btn-icon" style="background:#f1f5f9;border-radius:40px;padding:0 15px;">😊</button>
          <div id="emojiPanel" class="emoji-panel">😀😃😄😁😆😅😂🤣😊😇🙂🙃😉😌😍🥰😘😗😙😚😋😛😝😜🤪🤨🧐🤓😎🥸🤩🥳😏😒😞😔😟😕🙁☹️😣😖😫😩🥺😢😭😤😠😡🤬🤯😳🥵🥶😱😨😰😥😓🤗🤔🤭🤫🤥😶😐😑😬🙄😯😦😧😮😲🥱😴🤤😪😵🤐🥴🤢🤮🤧😷🤒🤕🤑🤠</div>
          <input type="text" id="chatInput" class="chat-input" placeholder="Type message...">
          <button id="sendChatBtn" class="chat-send">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="reasonModal" class="modal"><div class="modal-content"><h3>💬 Voter Reasons</h3><div id="modalReasonList"></div><button onclick="closeModal()" style="margin-top:16px;padding:8px;border-radius:40px;">Close</button></div></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script>
  const firebaseConfig = { apiKey: "AIzaSyDMzQe4_sHxVX2rgbgCF5E9DDWbbp9m7tc", authDomain: "orafut-58b5f.firebaseapp.com", projectId: "orafut-58b5f", storageBucket: "orafut-58b5f.firebasestorage.app", messagingSenderId: "500581059835", appId: "1:500581059835:web:7be0994b65ff21dae0b45e" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('id');
  if(!matchId) { alert("No match specified"); window.location.href = 'index.html'; }
  
  let currentUser = null;
  let matchData = null;
  let selectedVote = null;
  let uploadedImageUrl = null;
  const IMGBB_KEY = "0f248e70fc4e7dffde307dd772823379";
  
  // DOM
  const statusLed = document.getElementById('statusLed');
  const statusText = document.getElementById('statusText');
  const heroLogoA = document.getElementById('heroLogoA');
  const heroLogoB = document.getElementById('heroLogoB');
  const teamANameSpan = document.getElementById('teamAName');
  const teamBNameSpan = document.getElementById('teamBName');
  const voteTeamAName = document.getElementById('voteTeamAName');
  const voteTeamBName = document.getElementById('voteTeamBName');
  const statTeamAName = document.getElementById('statTeamAName');
  const statTeamBName = document.getElementById('statTeamBName');
  const voteBtns = document.querySelectorAll('.vote-btn');
  const reasonArea = document.getElementById('reasonArea');
  const submitVoteBtn = document.getElementById('submitVoteBtn');
  const voteReason = document.getElementById('voteReason');
  const voteImageInput = document.getElementById('voteImage');
  const imagePreview = document.getElementById('imagePreview');
  const loginTrigger = document.getElementById('loginTriggerBtn');
  const userDisplaySpan = document.getElementById('userDisplay');
  const streamWrapper = document.getElementById('streamWrapper');
  const chatMessagesDiv = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendChatBtn = document.getElementById('sendChatBtn');
  const emojiBtn = document.getElementById('emojiBtn');
  const emojiPanel = document.getElementById('emojiPanel');
  const fullscreenBtn = document.getElementById('fullscreenChatBtn');
  const clearChatBtn = document.getElementById('clearChatBtn');
  const onlineCountSpan = document.getElementById('onlineCount');
  
  let isMatchEnded = false;
  let onlineUsers = new Set();
  
  // Simple anonymous login (Firestore only)
  async function anonymousLogin() {
    const anonId = localStorage.getItem('anonVoteId');
    if(anonId) {
      currentUser = { uid: anonId, email: 'guest@temp.com', displayName: 'Guest_' + anonId.slice(-5) };
      userDisplaySpan.innerText = currentUser.displayName;
      loginTrigger.innerHTML = '<span class="iconify" data-icon="mdi:logout"></span> Logout';
      loginTrigger.onclick = () => { localStorage.removeItem('anonVoteId'); window.location.reload(); };
      await loadMatchData();
      await loadChat();
      return;
    }
    const newId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
    localStorage.setItem('anonVoteId', newId);
    currentUser = { uid: newId, email: 'guest@temp.com', displayName: 'Fan_' + newId.slice(-5) };
    userDisplaySpan.innerText = currentUser.displayName;
    loginTrigger.innerHTML = '<span class="iconify" data-icon="mdi:logout"></span> Logout';
    loginTrigger.onclick = () => { localStorage.removeItem('anonVoteId'); window.location.reload(); };
    await loadMatchData();
    await loadChat();
  }
  
  loginTrigger.onclick = () => {
    if(currentUser && currentUser.uid) {
      localStorage.removeItem('anonVoteId');
      window.location.reload();
    } else {
      anonymousLogin();
    }
  };
  
  async function loadMatchData() {
    const doc = await db.collection('matches').doc(matchId).get();
    if(!doc.exists) return;
    matchData = doc.data();
    const teamA = matchData.teamAName || 'Team A';
    const teamB = matchData.teamBName || 'Team B';
    teamANameSpan.innerText = teamA;
    teamBNameSpan.innerText = teamB;
    voteTeamAName.innerText = teamA;
    voteTeamBName.innerText = teamB;
    statTeamAName.innerText = teamA;
    statTeamBName.innerText = teamB;
    heroLogoA.innerHTML = `<img src="${matchData.teamALogo || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%23222\'/%3E%3Ctext x=\'50\' y=\'55\' text-anchor=\'middle\' fill=\'%239CE800\' font-size=\'12\'%3E${teamA[0]}%3C/text%3E%3C/svg%3E'}">`;
    heroLogoB.innerHTML = `<img src="${matchData.teamBLogo || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%23222\'/%3E%3Ctext x=\'50\' y=\'55\' text-anchor=\'middle\' fill=\'%239CE800\' font-size=\'12\'%3E${teamB[0]}%3C/text%3E%3C/svg%3E'}">`;
    
    const status = matchData.status || 'upcoming';
    isMatchEnded = (status === 'completed' || status === 'ended');
    if(isMatchEnded) {
      statusLed.classList.add('red');
      statusLed.style.animation = 'none';
      statusText.innerText = 'ENDED';
    } else {
      statusText.innerText = 'BE READY';
    }
    await loadVotes();
    setupVoteListeners();
    loadStream();
  }
  
  async function loadVotes() {
    const votesSnap = await db.collection('votes').where('matchId', '==', matchId).get();
    let team1=0, draw=0, team2=0;
    votesSnap.forEach(v => { const t = v.data().voteType; if(t==='team1') team1++; else if(t==='draw') draw++; else if(t==='team2') team2++; });
    const total = team1+draw+team2 || 1;
    const p1 = Math.round(team1/total*100);
    const pDraw = Math.round(draw/total*100);
    const p2 = Math.round(team2/total*100);
    document.getElementById('percentTeam1').innerText = p1+'%';
    document.getElementById('percentTeam2').innerText = p2+'%';
    document.getElementById('percentDraw').innerText = pDraw+'%';
    document.getElementById('barTeam1').style.width = p1+'%';
    document.getElementById('barTeam2').style.width = p2+'%';
    document.getElementById('barDraw').style.width = pDraw+'%';
    if(p1>0) document.getElementById('barTeam1').innerText = p1+'%';
    if(pDraw>0) document.getElementById('barDraw').innerText = pDraw+'%';
    if(p2>0) document.getElementById('barTeam2').innerText = p2+'%';
  }
  
  async function submitVote() {
    if(!currentUser) { alert("Login first"); return; }
    if(!selectedVote) { alert("Select a prediction"); return; }
    if(isMatchEnded) { alert("Match ended"); return; }
    const existing = await db.collection('votes').where('matchId','==',matchId).where('userId','==',currentUser.uid).get();
    if(!existing.empty) { alert("Already voted"); return; }
    let reason = voteReason.value.trim();
    let imageUrl = uploadedImageUrl;
    await db.collection('votes').add({
      matchId, userId: currentUser.uid, userEmail: currentUser.email, voteType: selectedVote,
      reason: reason || null, imageUrl, userName: currentUser.displayName,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Vote submitted!");
    voteReason.value = ''; uploadedImageUrl = null; imagePreview.innerHTML = '';
    await loadVotes();
  }
  
  voteImageInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
    const data = await res.json();
    if(data.success) { uploadedImageUrl = data.data.url; imagePreview.innerHTML = `<img src="${uploadedImageUrl}" class="preview-img">`; }
    else alert("Upload failed");
  });
  
  function setupVoteListeners() {
    voteBtns.forEach(btn => {
      btn.onclick = () => {
        if(isMatchEnded) { alert("Match ended"); return; }
        if(!currentUser) { alert("Login to vote"); return; }
        selectedVote = btn.dataset.vote;
        voteBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        reasonArea.style.display = 'block';
      };
    });
    submitVoteBtn.onclick = submitVote;
    
    document.querySelectorAll('.stat-item').forEach(el => {
      el.onclick = async () => {
        if(!currentUser) { alert("Login to see reasons"); return; }
        const type = el.dataset.type;
        const votesSnap = await db.collection('votes').where('matchId','==',matchId).where('voteType','==',type).get();
        const reasonsList = [];
        votesSnap.forEach(v => { const d=v.data(); if(d.reason || d.imageUrl) reasonsList.push({ reason: d.reason, image: d.imageUrl, user: d.userName || d.userEmail }); });
        const modalList = document.getElementById('modalReasonList');
        if(reasonsList.length===0) modalList.innerHTML = '<div>No reasons added</div>';
        else modalList.innerHTML = reasonsList.map(r => `<div style="border-bottom:1px solid #eee;padding:12px 0;"><strong>${r.user?.split('@')[0] || 'User'}</strong><div>${r.reason || ''}</div>${r.image ? `<img src="${r.image}" style="max-width:100px;border-radius:8px;margin-top:6px;">` : ''}</div>`).join('');
        document.getElementById('reasonModal').style.display = 'flex';
      };
    });
  }
  
  function loadStream() {
    if(!currentUser) return;
    const streamUrl = matchData?.streamUrl || '';
    let embedHtml = '';
    if(streamUrl.includes('youtube.com/watch?v=')) {
      let videoId = streamUrl.split('v=')[1]?.split('&')[0];
      if(videoId) embedHtml = `<iframe class="youtube-embed" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
    } else if(streamUrl.includes('youtu.be/')) {
      let videoId = streamUrl.split('/').pop();
      embedHtml = `<iframe class="youtube-embed" src="https://www.youtube.com/embed/${videoId}" frameborder="0"></iframe>`;
    } else if(streamUrl.includes('embed')) embedHtml = `<iframe class="youtube-embed" src="${streamUrl}" frameborder="0"></iframe>`;
    else embedHtml = `<div class="stream-placeholder">No stream available</div>`;
    streamWrapper.innerHTML = embedHtml || `<div class="stream-placeholder">No stream</div>`;
  }
  
  // ADVANCED CHAT with 10+ features
  async function loadChat() {
    if(!currentUser) return;
    const snap = await db.collection('chatMessages').where('matchId','==',matchId).orderBy('createdAt','asc').limit(200).get();
    chatMessagesDiv.innerHTML = '';
    snap.forEach(doc => appendChatMessage(doc.data()));
    db.collection('chatMessages').where('matchId','==',matchId).orderBy('createdAt','asc').onSnapshot(snap => {
      snap.docChanges().forEach(change => { if(change.type === 'added') appendChatMessage(change.doc.data()); });
    });
    // Online presence
    const presenceRef = db.collection('presence').doc(currentUser.uid);
    presenceRef.set({ online: true, lastSeen: Date.now(), matchId });
    presenceRef.onDisconnect().set({ online: false, lastSeen: Date.now() });
    db.collection('presence').where('matchId','==',matchId).where('online','==',true).onSnapshot(snap => { onlineCountSpan.innerText = snap.size; });
  }
  
  function appendChatMessage(msg) {
    const div = document.createElement('div');
    div.className = 'chat-message';
    const time = msg.createdAt?.toDate?.() ? new Date(msg.createdAt.toDate()).toLocaleTimeString() : '';
    div.innerHTML = `<div class="msg-user"><span class="iconify" data-icon="mdi:account-circle"></span> ${msg.userName || 'User'} <span class="msg-time">${time}</span></div><div class="msg-text">${escapeHtml(msg.text)}</div>${msg.imageUrl ? `<img src="${msg.imageUrl}" class="msg-img" onclick="window.open(this.src)">` : ''}`;
    chatMessagesDiv.appendChild(div);
    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
  }
  
  async function sendChatMessage() {
    if(!currentUser) { alert("Login to chat"); return; }
    let text = chatInput.value.trim();
    if(!text) return;
    await db.collection('chatMessages').add({
      matchId, userId: currentUser.uid, userName: currentUser.displayName || 'Fan',
      text, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    chatInput.value = '';
  }
  
  async function clearChat() {
    if(!currentUser || !confirm("Admin only? Clear all messages?")) return;
    const snap = await db.collection('chatMessages').where('matchId','==',matchId).get();
    snap.forEach(doc => doc.ref.delete());
  }
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  sendChatBtn.onclick = sendChatMessage;
  chatInput.addEventListener('keypress', (e) => { if(e.key==='Enter') sendChatMessage(); });
  emojiBtn.onclick = (e) => { e.stopPropagation(); emojiPanel.classList.toggle('active'); };
  document.querySelectorAll('.emoji').forEach(emoji => { emoji.onclick = () => { chatInput.value += emoji.innerText; chatInput.focus(); }; });
  document.addEventListener('click', () => emojiPanel.classList.remove('active'));
  fullscreenBtn.onclick = () => { document.querySelector('.chat-container').requestFullscreen(); };
  clearChatBtn.onclick = clearChat;
  
  function closeModal() { document.getElementById('reasonModal').style.display = 'none'; }
  window.closeModal = closeModal;
  
  anonymousLogin();
</script>
</body>
</html>
